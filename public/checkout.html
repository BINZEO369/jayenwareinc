<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - JABIYEN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #000000;
            --accent: #ffffff;
            --bg-color: #fafafa;
            --border-color: #e5e5e5;
            --font-heading: 'Manrope', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-color);
            color: var(--primary);
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3 {
            font-family: var(--font-heading);
        }

        /* Premium Form Inputs */
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: #ffffff;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.05);
        }

        .checkout-btn {
            background-color: var(--primary);
            color: var(--accent);
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 12px;
            transition: transform 0.2s ease, background-color 0.3s ease;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .checkout-btn:hover {
            background-color: #1a1a1a;
            transform: translateY(-2px);
        }

        .checkout-btn:disabled {
            background-color: #a3a3a3;
            cursor: not-allowed;
            transform: none;
        }

        /* Custom Scrollbar for summary */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 10px; }
        
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #000;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <nav class="bg-white border-b border-gray-200 py-4 px-6 flex justify-center items-center sticky top-0 z-50">
        <a href="/" class="flex items-center gap-3 no-underline text-black">
            <img src="/logo.png" class="w-8 h-8 rounded-xl border border-gray-100 shadow-sm" alt="Logo" onerror="this.src='https://via.placeholder.com/32'">
            <span class="font-black text-xl tracking-widest uppercase">JABIYEN</span>
        </a>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8 md:py-12">
        
        <div id="empty-cart-message" class="hidden text-center py-20">
            <h2 class="text-2xl font-bold mb-4">Your Vault is Empty</h2>
            <p class="text-gray-500 mb-8">You haven't added anything to your cart yet.</p>
            <a href="/" class="inline-block bg-black text-white px-8 py-4 rounded-xl font-bold uppercase tracking-widest text-xs">Return to Shop</a>
        </div>

        <div id="checkout-content" class="grid grid-cols-1 lg:grid-cols-12 gap-10 hidden">
            
            <div class="lg:col-span-7 space-y-8">
                
                <form id="checkout-form" class="space-y-8">
                    <section class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                        <h2 class="text-xl font-bold mb-5 tracking-tight">Contact Information</h2>
                        <div class="grid grid-cols-1 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Email Address</label>
                                <input type="email" name="email" required class="form-input" placeholder="yasin@example.com">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Phone Number</label>
                                <input type="tel" name="phone" required class="form-input" placeholder="+880 1XXX-XXXXXX">
                            </div>
                        </div>
                    </section>

                    <section class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                        <h2 class="text-xl font-bold mb-5 tracking-tight">Shipping Address</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="md:col-span-2">
                                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Full Name</label>
                                <input type="text" name="fullName" required class="form-input" placeholder="Your full name">
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Street Address</label>
                                <input type="text" name="address" required class="form-input" placeholder="House/Road/Block details">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">City</label>
                                <input type="text" name="city" required class="form-input" placeholder="Dhaka">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Postal Code</label>
                                <input type="text" name="zip" required class="form-input" placeholder="1205">
                            </div>
                        </div>
                    </section>

                    <section class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                        <h2 class="text-xl font-bold mb-5 tracking-tight">Payment Method</h2>
                        <div class="space-y-3">
                            <label class="flex items-center gap-3 p-4 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition">
                                <input type="radio" name="paymentMethod" value="cod" checked class="w-5 h-5 accent-black">
                                <span class="font-semibold text-sm">Cash on Delivery (COD)</span>
                            </label>
                            <label class="flex items-center gap-3 p-4 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50 transition opacity-50">
                                <input type="radio" name="paymentMethod" value="online" disabled class="w-5 h-5">
                                <span class="font-semibold text-sm">Online Payment (Coming Soon)</span>
                            </label>
                        </div>
                    </section>
                    
                    <input type="hidden" name="cartData" id="cartDataInput">

                    <button type="submit" id="submit-btn" class="checkout-btn">
                        <span>Place Order</span>
                        <div class="loader" id="btn-loader"></div>
                    </button>
                </form>
            </div>

            <div class="lg:col-span-5 relative">
                <div class="sticky top-24 bg-gray-50 p-6 md:p-8 rounded-3xl border border-gray-200">
                    <h2 class="text-xl font-bold mb-6 tracking-tight">Order Summary</h2>
                    
                    <div id="checkout-items" class="space-y-4 max-h-[400px] overflow-y-auto custom-scroll pr-2 mb-6">
                        </div>

                    <div class="space-y-3 border-t border-gray-200 pt-6">
                        <div class="flex justify-between text-sm text-gray-600">
                            <span>Subtotal</span>
                            <span id="summary-subtotal" class="font-medium text-black">৳0.00</span>
                        </div>
                        <div class="flex justify-between text-sm text-gray-600">
                            <span>Shipping (Standard)</span>
                            <span id="summary-shipping" class="font-medium text-black">৳100.00</span>
                        </div>
                        <div class="flex justify-between text-lg font-black border-t border-gray-200 pt-4 mt-2">
                            <span>Total</span>
                            <span id="summary-total">৳0.00</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ১. লোকাল স্টোরেজ থেকে কার্ট ডেটা রিট্রিভ করা
            let cart = JSON.parse(localStorage.getItem('jabiyen_cart') || '[]');
            const shippingCost = 100.00; // ডিফল্ট শিপিং চার্জ

            const emptyMessage = document.getElementById('empty-cart-message');
            const checkoutContent = document.getElementById('checkout-content');
            const itemsContainer = document.getElementById('checkout-items');
            const form = document.getElementById('checkout-form');
            const submitBtn = document.getElementById('submit-btn');
            const btnLoader = document.getElementById('btn-loader');

            // ২. কার্ট চেক করা (খালি থাকলে ফর্ম হাইড করা)
            if (cart.length === 0) {
                emptyMessage.classList.remove('hidden');
                checkoutContent.classList.add('hidden');
                return;
            } else {
                emptyMessage.classList.add('hidden');
                checkoutContent.classList.remove('hidden');
            }

            // ৩. কার্ট আইটেমগুলো ডানপাশের অর্ডারে রেন্ডার করা
            let subtotal = 0;
            itemsContainer.innerHTML = cart.map(item => {
                const itemTotal = item.price * (item.quantity || 1);
                subtotal += itemTotal;
                
                // ভেরিয়েন্ট টেক্সট তৈরি করা (Color & Size)
                let variants = [];
                if(item.color_name) variants.push(item.color_name);
                if(item.size_name) variants.push(item.size_name);
                const variantText = variants.length ? `<p class="text-xs text-gray-500 mt-1">${variants.join(' • ')}</p>` : '';

                return `
                <div class="flex items-center gap-4 bg-white p-3 rounded-xl border border-gray-100 shadow-sm">
                    <div class="relative">
                        <img src="${item.img || 'https://via.placeholder.com/64'}" alt="${item.title}" class="w-16 h-16 object-cover rounded-lg border border-gray-100">
                        <span class="absolute -top-2 -right-2 bg-black text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full">${item.quantity || 1}</span>
                    </div>
                    <div class="flex-grow min-w-0">
                        <h4 class="text-sm font-bold truncate text-gray-900">${item.title}</h4>
                        ${variantText}
                    </div>
                    <div class="font-bold text-sm whitespace-nowrap">
                        ৳${itemTotal.toFixed(2)}
                    </div>
                </div>`;
            }).join('');

            // ৪. টোটাল হিসাব আপডেট করা
            const total = subtotal + shippingCost;
            document.getElementById('summary-subtotal').innerText = `৳${subtotal.toFixed(2)}`;
            document.getElementById('summary-shipping').innerText = `৳${shippingCost.toFixed(2)}`;
            document.getElementById('summary-total').innerText = `৳${total.toFixed(2)}`;

            // হিডেন ইনপুটে কার্ট ডেটা রাখা, যাতে ফর্মে সাবমিট হয়
            document.getElementById('cartDataInput').value = JSON.stringify(cart);

            // ৫. ফর্ম সাবমিশন লজিক এবং API এন্ডপয়েন্ট ইন্টিগ্রেশন
            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                // UI State Update (Loading)
                submitBtn.disabled = true;
                submitBtn.querySelector('span').innerText = 'Processing...';
                btnLoader.style.display = 'block';

                const formData = new FormData(form);
                const orderData = Object.fromEntries(formData.entries());
                
                // অর্ডার ডেটার সাথে সাবটোটাল এবং টোটাল যুক্ত করা
                orderData.subtotal = subtotal;
                orderData.shipping = shippingCost;
                orderData.total = total;
                // স্ট্রিং থেকে পুনরায় অ্যারে করে পাঠানো
                orderData.cartData = JSON.parse(orderData.cartData); 

                try {
                    /* ==============================================================
                       API ENDPOINT (আপনার ব্যাকএন্ড API এখানে বসাবেন)
                       উদাহরণস্বরূপ: '/api/orders' অথবা 'https://yourdomain.com/api/checkout'
                       ============================================================== */
                    const response = await fetch('/api/checkout', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(orderData)
                    });

                    // API Call Mocking (যেহেতু রিয়েল এন্ডপয়েন্ট নেই, তাই setTimeout ব্যবহার করা হয়েছে)
                    await new Promise(resolve => setTimeout(resolve, 1500)); 

                    // যদি রেসপন্স সাকসেস হয়
                    // if (!response.ok) throw new Error('Order submission failed');

                    // অর্ডার প্লেস হওয়ার পর লোকাল স্টোরেজ ক্লিয়ার করা
                    localStorage.removeItem('jabiyen_cart');
                    
                    // সাকসেস মেসেজ বা থ্যাংক ইউ পেজে রিডাইরেক্ট করা
                    alert('Order Placed Successfully! Your premium collection is on its way.');
                    window.location.href = '/'; // অথবা '/thank-you'
                    
                } catch (error) {
                    console.error('Checkout Error:', error);
                    alert('Something went wrong! Please try again.');
                    
                    // Reset Button State
                    submitBtn.disabled = false;
                    submitBtn.querySelector('span').innerText = 'Place Order';
                    btnLoader.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
