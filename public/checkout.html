<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #000000;
            --background: #fbfbfd;
            --surface: #ffffff;
            --border: #d2d2d7;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --error: #ff3b30;
            --success: #34c759;
            --radius: 12px;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--background);
            color: var(--text-main);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .checkout-container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 40px;
        }

        @media (max-width: 768px) {
            .checkout-container {
                grid-template-columns: 1fr;
                flex-direction: column-reverse;
                display: flex;
            }
        }

        h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        .section {
            background: var(--surface);
            padding: 32px;
            border-radius: var(--radius);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            margin-bottom: 24px;
        }

        /* Form Styles */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-col-full {
            grid-column: span 2;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            font-family: var(--font-family);
            transition: all 0.2s ease;
            background: var(--background);
            color: var(--text-main);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.05);
            background: var(--surface);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            cursor: pointer;
        }
        
        .checkbox-group input {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        /* Cart Summary Styles */
        .cart-summary {
            background: var(--surface);
            padding: 32px;
            border-radius: var(--radius);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            position: sticky;
            top: 24px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding-bottom: 16px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .cart-item img {
            width: 64px;
            height: 64px;
            object-fit: cover;
            border-radius: 8px;
            background: var(--background);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .item-details {
            flex-grow: 1;
        }

        .item-title {
            font-weight: 600;
            font-size: 14px;
        }

        .item-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .item-price {
            font-weight: 600;
            font-size: 14px;
        }

        .totals {
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--text-muted);
        }

        .total-row.final {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: var(--surface);
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 24px;
            transition: transform 0.2s, box-shadow 0.2s;
            letter-spacing: 0.5px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        .btn-submit:disabled {
            background: var(--border);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Overlay Loader */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s;
            flex-direction: column;
            gap: 16px;
        }
        #loader.active {
            visibility: visible;
            opacity: 1;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Notification */
        .notification {
            padding: 16px 24px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: none;
            font-weight: 500;
            font-size: 14px;
        }
        .notification.error { background: #ffe5e5; color: var(--error); display: block; }
        .notification.success { background: #e5f9e5; color: var(--success); display: block; }

    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="font-weight: 600; color: var(--text-main);">Processing your secure order...</p>
    </div>

    <form id="checkout-form" class="checkout-container">
        
        <div class="form-sections">
            <div id="notification-area" class="notification"></div>

            <div class="section">
                <h2>Contact Information</h2>
                <div class="form-row">
                    <div class="input-group form-col-full">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="yasin@example.com">
                    </div>
                    <div class="input-group form-col-full">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" required placeholder="+880 1XXX-XXXXXX">
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>Shipping Address</h2>
                <div class="form-row">
                    <div class="input-group form-col-full">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" required placeholder="Your full name">
                    </div>
                    <div class="input-group">
                        <label for="country">Country / Region</label>
                        <select id="country" required>
                            <option value="Bangladesh">Bangladesh</option>
                            <option value="International">International</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="city">City / District</label>
                        <input type="text" id="city" required placeholder="e.g. Dhaka">
                    </div>
                    <div class="input-group form-col-full">
                        <label for="street">Street Address</label>
                        <input type="text" id="street" required placeholder="House number and street name">
                    </div>
                    <div class="input-group">
                        <label for="apartment">Apartment, suite, etc. (optional)</label>
                        <input type="text" id="apartment" placeholder="Apartment, suite, unit etc.">
                    </div>
                    <div class="input-group">
                        <label for="zip">Postal Code</label>
                        <input type="text" id="zip" required placeholder="e.g. 1212">
                    </div>
                    <div class="input-group form-col-full">
                        <label for="state">State / Division</label>
                        <input type="text" id="state" required placeholder="e.g. Dhaka Division">
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>Shipping Method</h2>
                <div class="form-row">
                    <div class="input-group form-col-full">
                        <select id="shipping_method">
                            <option value="standard">Standard Delivery (3-5 Days)</option>
                            <option value="express">Express Delivery (1-2 Days)</option>
                        </select>
                    </div>
                </div>
                
                <h2 style="margin-top: 24px;">Order Notes (Optional)</h2>
                <div class="form-row">
                    <div class="input-group form-col-full">
                        <textarea id="notes" placeholder="Notes about your order, e.g. special notes for delivery."></textarea>
                    </div>
                </div>
            </div>
        </div>

        <div class="cart-summary">
            <h2>Order Summary</h2>
            <div id="checkout-cart-items">
                </div>
            
            <div class="totals">
                <div class="total-row">
                    <span>Subtotal</span>
                    <span id="summary-subtotal">৳ 0.00</span>
                </div>
                <div class="total-row">
                    <span>Shipping</span>
                    <span>Calculated at next step</span>
                </div>
                <div class="total-row final">
                    <span>Total</span>
                    <span id="summary-total">৳ 0.00</span>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">Place Order</button>
            <p style="text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 16px;">
                <svg style="vertical-align: middle; margin-right: 4px;" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                Guaranteed safe & secure checkout
            </p>
        </div>

    </form>

    <script>
        // ==========================================
        // 1. Supabase Initialization
        // ==========================================
        const SUPABASE_URL = "https://kfncdapeswlnwsackkdy.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmbmNkYXBlc3dsbndzYWNra2R5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMzY5NjgsImV4cCI6MjA5NTYxMjk2OH0.w0JCxkp0GHhwBboSQXYjA3lqUKEWtgbOgq07D554wK8";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ==========================================
        // 2. Fetch LocalStorage Cart Data
        // ==========================================
        let cart = JSON.parse(localStorage.getItem('jabiyen_cart') || '[]');
        
        function renderCheckoutCart() {
            const container = document.getElementById('checkout-cart-items');
            const subtotalEl = document.getElementById('summary-subtotal');
            const totalEl = document.getElementById('summary-total');
            const submitBtn = document.getElementById('submit-btn');

            if (cart.length === 0) {
                container.innerHTML = '<p style="font-size: 14px; color: var(--text-muted); text-align: center; padding: 20px 0;">Your vault is empty. Please add items to cart.</p>';
                submitBtn.disabled = true;
                return;
            }

            let subtotal = 0;
            let html = '';

            cart.forEach(item => {
                const itemTotal = item.price * (item.quantity || 1);
                subtotal += itemTotal;

                let variantText = [];
                if(item.color_name) variantText.push(item.color_name);
                if(item.size_name) variantText.push(item.size_name);
                const variantDisplay = variantText.length > 0 ? variantText.join(' / ') : 'Default';

                html += `
                <div class="cart-item">
                    <img src="${item.img || '/logo.png'}" alt="${item.title}" onerror="this.src='/logo.png'">
                    <div class="item-details">
                        <div class="item-title">${item.title}</div>
                        <div class="item-meta">${variantDisplay} &times; ${item.quantity || 1}</div>
                    </div>
                    <div class="item-price">৳${itemTotal.toFixed(2)}</div>
                </div>`;
            });

            container.innerHTML = html;
            subtotalEl.innerText = `৳${subtotal.toFixed(2)}`;
            totalEl.innerText = `৳${subtotal.toFixed(2)}`;
        }

        // Initialize cart display
        renderCheckoutCart();

        // ==========================================
        // 3. Form Submission & Database Insertion
        // ==========================================
        function showNotification(msg, type) {
            const notif = document.getElementById('notification-area');
            notif.innerText = msg;
            notif.className = `notification ${type}`;
            notif.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        document.getElementById('checkout-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (cart.length === 0) {
                showNotification("Cart is empty!", "error");
                return;
            }

            document.getElementById('loader').classList.add('active');
            document.getElementById('notification-area').style.display = 'none';

            // Gather Customer Order Data matching SQL Table
            const orderData = {
                customer_name: document.getElementById('name').value,
                customer_email: document.getElementById('email').value,
                customer_phone: document.getElementById('phone').value,
                country: document.getElementById('country').value,
                street_address: document.getElementById('street').value,
                apartment: document.getElementById('apartment').value || null,
                city: document.getElementById('city').value,
                state_region: document.getElementById('state').value,
                zip_code: document.getElementById('zip').value,
                billing_same_as_shipping: true,
                shipping_method: document.getElementById('shipping_method').value,
                notes: document.getElementById('notes').value || null
                // order_number and created_at are generated automatically by SQL Trigger/Default
            };

            try {
                // Insert into customer_orders
                const { data: insertedOrder, error: orderError } = await supabase
                    .from('customer_orders')
                    .insert(orderData)
                    .select('id, order_number')
                    .single();

                if (orderError) throw orderError;

                // Prepare Order Items data matching SQL Table
                const itemsData = cart.map(item => ({
                    order_id: insertedOrder.id,
                    product_id: item.product_id,
                    variant_id: item.variant_id || null,
                    color_id: item.color_id || null,
                    size_id: item.size_id || null,
                    color_name: item.color_name || null,
                    size_name: item.size_name || null,
                    product_title: item.title,
                    variant_sku: item.sku || null,
                    variant_barcode: item.variant_barcode || item.main_barcode || null,
                    quantity: item.quantity || 1,
                    price: item.price
                }));

                // Insert into order_items
                const { error: itemsError } = await supabase
                    .from('order_items')
                    .insert(itemsData);

                if (itemsError) throw itemsError;

                // Success Actions
                localStorage.removeItem('jabiyen_cart'); 
                document.getElementById('loader').classList.remove('active');
                
                // Show Success & Redirect (Or transform form to Success message)
                document.querySelector('.checkout-container').innerHTML = `
                    <div class="section" style="text-align: center; grid-column: span 2; padding: 60px 20px;">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 20px;"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                        <h1 style="font-size: 32px; margin-bottom: 12px;">Order Placed Successfully!</h1>
                        <p style="color: var(--text-muted); font-size: 16px; margin-bottom: 24px;">Your order number is <strong>${insertedOrder.order_number}</strong>.</p>
                        <a href="/" style="display: inline-block; padding: 12px 24px; background: var(--primary); color: white; text-decoration: none; border-radius: 8px; font-weight: 600;">Return to Store</a>
                    </div>
                `;
                
            } catch (error) {
                console.error("Order processing error:", error);
                document.getElementById('loader').classList.remove('active');
                showNotification(error.message || "Something went wrong. Please try again.", "error");
            }
        });
    </script>
</body>
</html>
