<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | JAYENWARE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F5F5F7;
            color: #1d1d1f;
        }
        .input-field {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #d2d2d7;
            border-radius: 0.5rem;
            outline: none;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }
        .input-field:focus {
            border-color: #0071e3;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
        }
    </style>
</head>
<body class="antialiased min-h-screen pb-12">

    <header class="bg-white/80 backdrop-blur-md border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-semibold tracking-widest uppercase">JAYENWARE</h1>
            <span class="text-sm text-gray-500 flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                Secure Checkout
            </span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 mt-8">
        <form id="checkoutForm" class="flex flex-col lg:flex-row gap-10">
            
            <div class="flex-1 space-y-8">
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                    <h2 class="text-xl font-medium mb-6">Contact Information</h2>
                    <div class="space-y-4">
                        <div>
                            <input type="email" id="email" required placeholder="Email Address" class="input-field">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="fullName" required placeholder="Full Name" class="input-field">
                            <input type="tel" id="phone" required placeholder="Phone Number" class="input-field">
                        </div>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                    <h2 class="text-xl font-medium mb-6">Shipping Address</h2>
                    <div class="space-y-4">
                        <select id="country" required class="input-field bg-white">
                            <option value="Bangladesh">Bangladesh</option>
                            <option value="United States">United States</option>
                        </select>
                        <div class="grid grid-cols-3 gap-4">
                            <input type="text" id="street" required placeholder="Street Address" class="input-field col-span-2">
                            <input type="text" id="apartment" placeholder="Apt, Suite (Opt)" class="input-field">
                        </div>
                        <div class="grid grid-cols-3 gap-4">
                            <input type="text" id="city" required placeholder="City" class="input-field">
                            <input type="text" id="state" required placeholder="State / Region" class="input-field">
                            <input type="text" id="zip" required placeholder="Zip Code" class="input-field">
                        </div>
                    </div>
                </div>
            </div>

            <div class="w-full lg:w-[400px]">
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 sticky top-24">
                    <h2 class="text-xl font-medium mb-6">Order Summary</h2>
                    
                    <div class="space-y-4 mb-6 border-b border-gray-100 pb-6">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-4">
                                <div class="w-16 h-16 bg-gray-100 rounded-lg flex items-center justify-center text-gray-400">
                                    Img
                                </div>
                                <div>
                                    <h3 class="font-medium text-sm">Premium Custom T-Shirt</h3>
                                    <p class="text-xs text-gray-500">Color: Midnight Black | Size: L</p>
                                    <p class="text-xs text-gray-500 mt-1">Qty: 1</p>
                                </div>
                            </div>
                            <span class="font-medium text-sm">৳1,500</span>
                        </div>
                    </div>

                    <div class="space-y-3 text-sm text-gray-600 mb-6">
                        <div class="flex justify-between">
                            <span>Subtotal</span>
                            <span>৳1,500</span>
                        </div>
                        <div class="flex justify-between">
                            <span>Shipping (Standard)</span>
                            <span>৳60</span>
                        </div>
                    </div>
                    
                    <div class="flex justify-between font-semibold text-lg border-t border-gray-100 pt-4 mb-8">
                        <span>Total</span>
                        <span>৳1,560</span>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-[#1d1d1f] hover:bg-black text-white py-4 rounded-xl font-medium transition-colors flex justify-center items-center gap-2">
                        <span>Place Order</span>
                    </button>
                    
                    <p id="statusMessage" class="text-center text-sm mt-4 hidden"></p>
                </div>
            </div>
        </form>
    </main>

    <script>
        // আপনার দেওয়া Supabase ক্রেডেনশিয়াল
        const SUPABASE_URL = "https://kfncdapeswlnwsackkdy.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmbmNkYXBlc3dsbndzYWNra2R5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMzY5NjgsImV4cCI6MjA5NTYxMjk2OH0.w0JCxkp0GHhwBboSQXYjA3lqUKEWtgbOgq07D554wK8";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const form = document.getElementById('checkoutForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');

        // ডেমো কার্ট ডেটা (বাস্তবে এটি আপনার লোকাল স্টোরেজ বা স্টেট থেকে আসবে)
        const cartItems = [
            {
                product_title: 'Premium Custom T-Shirt',
                color_name: 'Midnight Black',
                size_name: 'L',
                quantity: 1,
                price: 1500
            }
        ];
        
        const summaryData = {
            subtotal: 1500,
            shipping_charge: 60,
            discount: 0,
            total: 1560
        };

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI Update: Loading State
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                Processing...
            `;
            submitBtn.disabled = true;
            statusMessage.classList.add('hidden');

            try {
                // ১. Customer Orders টেবিলে ডেটা ইনসার্ট
                const orderPayload = {
                    customer_name: document.getElementById('fullName').value,
                    customer_email: document.getElementById('email').value,
                    customer_phone: document.getElementById('phone').value,
                    country: document.getElementById('country').value,
                    street_address: document.getElementById('street').value,
                    apartment: document.getElementById('apartment').value,
                    city: document.getElementById('city').value,
                    state_region: document.getElementById('state').value,
                    zip_code: document.getElementById('zip').value,
                    shipping_method: 'standard',
                    order_status: 'pending'
                };

                // .select().single() ব্যবহার করে ইনসার্ট হওয়া row-এর id বের করে আনছি
                const { data: insertedOrder, error: orderError } = await supabase
                    .from('customer_orders')
                    .insert([orderPayload])
                    .select()
                    .single();

                if (orderError) throw orderError;

                const newOrderId = insertedOrder.id;

                // ২. Order Items টেবিলে ডেটা ইনসার্ট
                const itemsPayload = cartItems.map(item => ({
                    order_id: newOrderId,
                    product_title: item.product_title,
                    color_name: item.color_name,
                    size_name: item.size_name,
                    quantity: item.quantity,
                    price: item.price
                }));

                const { error: itemsError } = await supabase
                    .from('order_items')
                    .insert(itemsPayload);

                if (itemsError) throw itemsError;

                // ৩. Order Summary টেবিলে ডেটা ইনসার্ট
                const summaryPayload = {
                    order_id: newOrderId,
                    subtotal: summaryData.subtotal,
                    shipping_charge: summaryData.shipping_charge,
                    discount: summaryData.discount,
                    total: summaryData.total
                };

                const { error: summaryError } = await supabase
                    .from('order_summary')
                    .insert([summaryPayload]);

                if (summaryError) throw summaryError;

                // Success Message
                statusMessage.textContent = `Order placed successfully! Order No: ${insertedOrder.order_number}`;
                statusMessage.className = "text-center text-sm mt-4 text-green-600 font-medium block";
                form.reset();

            } catch (error) {
                console.error("Error saving order:", error);
                statusMessage.textContent = "Failed to place order. Please check the console.";
                statusMessage.className = "text-center text-sm mt-4 text-red-600 font-medium block";
            } finally {
                // UI Update: Reset Button
                submitBtn.innerHTML = originalBtnText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
