<!DOCTYPE html>
<html lang="en-BD" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Product Details | JAYENWARE</title>
    <meta name="description" content="Discover detailed product specifications, fabric, fit, and more at JAYENWARE.">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png">
    <link rel="apple-touch-icon" href="/logo.png">
    <link rel="canonical" id="canonical-url" href="https://www.jayenware.shop/product/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    },
                    colors: {
                        primary: '#1d1d1f',
                        accent: '#86868b',
                        soft: '#f5f5f7',
                        blue: '#007aff'
                    }
                }
            }
        }
    </script>
    
    <style>
        :root {
            --primary: #1d1d1f;
            --accent: #86868b;
            --soft: #f5f5f7;
            --blue: #007aff;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #fff;
            color: #1d1d1f;
            -webkit-font-smoothing: antialiased;
        }
        
        img { 
            max-width: 100%; 
            height: auto; 
            display: block;
            user-select: none;
            -webkit-user-drag: none;
        }
        
        /* ==================== PRODUCT DETAILS LAYOUT ==================== */
        .product-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        @media (min-width: 1024px) {
            .product-container {
                grid-template-columns: 1fr 1fr;
                gap: 60px;
                padding: 40px 40px 60px;
            }
        }
        
        @media (min-width: 1400px) {
            .product-container {
                gap: 80px;
                padding: 60px 60px 80px;
            }
        }
        
        /* ==================== IMAGE GALLERY ==================== */
        .gallery-section {
            position: relative;
            width: 100%;
        }
        
        .main-image-wrapper {
            position: relative;
            width: 100%;
            background: #fafafa;
            overflow: hidden;
            cursor: crosshair;
            aspect-ratio: 3/4;
        }
        
        @media (min-width: 1024px) {
            .main-image-wrapper {
                border-radius: 20px;
                position: sticky;
                top: 20px;
                aspect-ratio: auto;
                min-height: 500px;
                max-height: 80vh;
            }
        }
        
        .main-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.1s ease-out, opacity 0.3s ease;
        }
        
        .main-image-wrapper.zoomed .main-image {
            transform: scale(2.2);
        }
        
        .thumbnail-strip {
            display: flex;
            gap: 8px;
            padding: 12px 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        
        .thumbnail-strip::-webkit-scrollbar {
            display: none;
        }
        
        @media (min-width: 1024px) {
            .thumbnail-strip {
                gap: 10px;
                padding: 16px 0;
            }
        }
        
        .thumbnail-btn {
            width: 64px;
            height: 64px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid transparent;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s ease;
            opacity: 0.6;
        }
        
        .thumbnail-btn:hover {
            opacity: 0.9;
        }
        
        .thumbnail-btn.active {
            opacity: 1;
            border-color: #1d1d1f;
        }
        
        .thumbnail-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        @media (min-width: 1024px) {
            .thumbnail-btn {
                width: 72px;
                height: 72px;
                border-radius: 12px;
            }
        }
        
        /* ==================== PRODUCT INFO ==================== */
        .info-section {
            padding: 20px;
        }
        
        @media (min-width: 1024px) {
            .info-section {
                padding: 0;
                max-width: 560px;
            }
        }
        
        .product-breadcrumb {
            font-size: 12px;
            color: #86868b;
            margin-bottom: 12px;
            font-weight: 500;
        }
        
        .product-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.2;
            margin-bottom: 8px;
        }
        
        @media (min-width: 1024px) {
            .product-title {
                font-size: 32px;
            }
        }
        
        .product-short-desc {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .price-row {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .current-price {
            font-size: 28px;
            font-weight: 700;
        }
        
        .old-price {
            font-size: 16px;
            color: #86868b;
            text-decoration: line-through;
        }
        
        .stock-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 24px;
        }
        
        .stock-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: pulse-dot 2s infinite;
        }
        
        .stock-dot.out-of-stock {
            background: #ef4444;
            animation: none;
        }
        
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .section-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #86868b;
            margin-bottom: 12px;
        }
        
        /* Color Swatches */
        .color-swatches {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 24px;
        }
        
        .color-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #e5e5e5;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            padding: 0;
            background: none;
        }
        
        .color-btn:hover {
            border-color: #1d1d1f;
            transform: scale(1.1);
        }
        
        .color-btn.selected {
            border-color: #1d1d1f;
            box-shadow: 0 0 0 2px #fff, 0 0 0 4px #1d1d1f;
        }
        
        .color-btn .swatch-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: block;
            border: 1px solid rgba(0,0,0,0.08);
        }
        
        .color-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        @media (min-width: 1024px) {
            .color-btn {
                width: 40px;
                height: 40px;
            }
        }
        
        /* Size Buttons */
        .size-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }
        
        .size-btn {
            padding: 10px 20px;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #fff;
            color: #1d1d1f;
            min-width: 48px;
            text-align: center;
        }
        
        .size-btn:hover {
            border-color: #1d1d1f;
        }
        
        .size-btn.selected {
            background: #1d1d1f;
            color: #fff;
            border-color: #1d1d1f;
        }
        
        .size-btn.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            text-decoration: line-through;
            pointer-events: none;
        }
        
        /* Variant Info */
        .variant-info {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            font-size: 12px;
            color: #86868b;
            margin-bottom: 24px;
            padding: 12px 16px;
            background: #f9fafb;
            border-radius: 10px;
        }
        
        .variant-info strong {
            color: #1d1d1f;
        }
        
        /* Add to Cart Button */
        .add-to-cart-btn {
            width: 100%;
            padding: 16px 32px;
            background: #1d1d1f;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
            margin-bottom: 12px;
        }
        
        .add-to-cart-btn:hover {
            background: #000;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }
        
        .add-to-cart-btn:active {
            transform: scale(0.98);
        }
        
        .add-to-cart-btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .buy-now-btn {
            width: 100%;
            padding: 16px 32px;
            background: #fff;
            color: #1d1d1f;
            border: 1.5px solid #e5e5e5;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
            margin-bottom: 32px;
        }
        
        .buy-now-btn:hover {
            border-color: #1d1d1f;
            background: #fafafa;
        }
        
        .wishlist-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            border: 1px solid #e5e5e5;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #1d1d1f;
            margin-bottom: 32px;
        }
        
        .wishlist-btn:hover {
            border-color: #1d1d1f;
        }
        
        .wishlist-btn.wished {
            color: #ef4444;
            border-color: #fecaca;
            background: #fef2f2;
        }
        
        /* Accordion */
        .accordion {
            border-top: 1px solid #f0f0f0;
        }
        
        .accordion-header {
            width: 100%;
            padding: 16px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #1d1d1f;
            text-align: left;
        }
        
        .accordion-header i {
            transition: transform 0.3s ease;
            font-size: 12px;
        }
        
        .accordion-header.open i {
            transform: rotate(180deg);
        }
        
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }
        
        .accordion-content.open {
            max-height: 2000px;
        }
        
        .accordion-inner {
            padding-bottom: 20px;
            font-size: 14px;
            color: #6b7280;
            line-height: 1.8;
        }
        
        /* Specs Grid */
        .specs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .spec-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: #fafafa;
            border-radius: 12px;
            font-size: 13px;
        }
        
        .spec-item i {
            font-size: 18px;
            color: #1d1d1f;
        }
        
        /* Barcode */
        .barcode-container {
            display: flex;
            justify-content: center;
            padding: 20px;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #f0f0f0;
        }
        
        /* Review Stars */
        .stars-display {
            color: #ff9500;
            font-size: 14px;
            letter-spacing: 2px;
        }
        
        .star-rating-input {
            direction: rtl;
            display: inline-flex;
            gap: 4px;
        }
        
        .star-rating-input input {
            display: none;
        }
        
        .star-rating-input label {
            color: #d2d2d7;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .star-rating-input input:checked ~ label,
        .star-rating-input label:hover,
        .star-rating-input label:hover ~ label {
            color: #ff9500;
        }
        
        /* Review Card */
        .review-card {
            padding: 20px;
            background: #fafafa;
            border-radius: 14px;
            margin-bottom: 12px;
        }
        
        /* Related Products */
        .related-section {
            padding: 40px 20px;
            border-top: 1px solid #f0f0f0;
        }
        
        .related-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        @media (min-width: 768px) {
            .related-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        .related-card {
            text-decoration: none;
            color: inherit;
            transition: transform 0.3s ease;
        }
        
        .related-card:hover {
            transform: translateY(-4px);
        }
        
        .related-card img {
            width: 100%;
            aspect-ratio: 3/4;
            object-fit: cover;
            border-radius: 12px;
            background: #fafafa;
        }
        
        .related-card h4 {
            font-size: 13px;
            font-weight: 600;
            margin-top: 8px;
        }
        
        .related-card .price {
            font-size: 14px;
            font-weight: 700;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1d1d1f;
            color: #fff;
            padding: 14px 28px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        /* Video Section */
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .video-controls {
            position: absolute;
            bottom: 16px;
            right: 16px;
            display: flex;
            gap: 8px;
        }
        
        .video-control-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        .video-control-btn:hover {
            background: rgba(0,0,0,0.7);
        }
        
        /* Banner */
        .banner-card {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            cursor: pointer;
            background: #000;
            aspect-ratio: 16/9;
        }
        
        .banner-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        
        .banner-card:hover img {
            transform: scale(1.03);
        }
        
        .banner-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 40px 28px;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            color: #fff;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased">

    <script src="/components.js"></script>

    <main id="product-page-content" style="min-height: 80vh;">
        <div id="product-not-found" style="display:none;text-align:center;padding:120px 20px;">
            <i class="fa-solid fa-box-open" style="font-size:56px;color:#e5e5e5;margin-bottom:20px;"></i>
            <h2 style="font-size:22px;font-weight:700;margin-bottom:8px;">Product Not Found</h2>
            <p style="color:#86868b;margin-bottom:28px;">This product doesn't exist or has been removed.</p>
            <a href="/products" style="display:inline-block;padding:14px 32px;background:#1d1d1f;color:#fff;border-radius:100px;font-weight:600;font-size:13px;text-decoration:none;">Browse Products</a>
        </div>
        <div id="product-detail-content"></div>
    </main>

    <div id="global-toast" class="toast"></div>

    <script>
        (function() {
            const API_BASE = '/api';
            
            async function apiFetch(endpoint) {
                try {
                    const res = await fetch(`${API_BASE}${endpoint}`);
                    if (!res.ok) return res.status === 404 ? null : [];
                    return await res.json();
                } catch(e) { return null; }
            }
            
            async function apiPost(endpoint, body) {
                try {
                    const res = await fetch(`${API_BASE}${endpoint}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    return await res.json();
                } catch(e) { throw e; }
            }
            
            let currentProduct = null;
            let allProducts = [];
            let productColors = [];
            let colorSizes = [];
            let productVariants = [];
            let allReviews = [];
            let productVideos = [];
            let productBanners = [];
            let selectedColorId = null;
            let selectedSizeId = null;
            let selectedVariant = null;
            let allImages = [];
            let barcodeGenerated = false;
            
            function showToast(msg, type = 'success') {
                const toast = document.getElementById('global-toast');
                toast.textContent = msg;
                toast.className = 'toast show';
                if (type === 'error') toast.style.background = '#ef4444';
                else toast.style.background = '#1d1d1f';
                setTimeout(() => { toast.classList.remove('show'); }, 2500);
            }
            
            function getSlugFromURL() {
                let slug = window.location.pathname.replace(/^\/product\//, '').replace(/\/$/, '');
                return slug.split('?')[0].split('#')[0] || null;
            }
            
            function getVariant(colorId, sizeId) {
                return productVariants.find(v => v.color_id == colorId && v.size_id == sizeId) || null;
            }
            
            function updateUI() {
                updateSizeButtons();
                updatePrice();
                updateVariantInfo();
                updateStockIndicator();
            }
            
            window.selectColor = function(colorId) {
                selectedColorId = colorId;
                selectedSizeId = null;
                selectedVariant = null;
                
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
                document.querySelector(`.color-btn[data-color-id="${colorId}"]`)?.classList.add('selected');
                
                const color = productColors.find(c => c.id == colorId);
                document.getElementById('selected-color-name').textContent = color?.color_name || 'Select';
                
                if (color?.color_image) {
                    const mainImg = document.getElementById('main-product-image');
                    if (mainImg) {
                        mainImg.style.opacity = '0';
                        setTimeout(() => { mainImg.src = color.color_image; mainImg.style.opacity = '1'; }, 150);
                    }
                    updateThumbnailSelection(color.color_image);
                }
                
                updateUI();
            };
            
            window.selectSize = function(sizeId) {
                selectedSizeId = sizeId;
                
                document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
                document.querySelector(`.size-btn[data-size-id="${sizeId}"]`)?.classList.add('selected');
                
                const size = colorSizes.find(s => s.id == sizeId);
                document.getElementById('selected-size-name').textContent = size?.size_name || 'Select';
                
                if (selectedColorId && selectedSizeId) {
                    selectedVariant = getVariant(selectedColorId, selectedSizeId);
                }
                
                updateUI();
            };
            
            window.selectThumbnail = function(imgSrc) {
                const mainImg = document.getElementById('main-product-image');
                if (mainImg) {
                    mainImg.style.opacity = '0';
                    setTimeout(() => { mainImg.src = imgSrc; mainImg.style.opacity = '1'; }, 150);
                }
                document.querySelectorAll('.thumbnail-btn').forEach(t => t.classList.remove('active'));
                document.querySelector(`.thumbnail-btn[data-src="${imgSrc}"]`)?.classList.add('active');
            };
            
            function updateThumbnailSelection(src) {
                document.querySelectorAll('.thumbnail-btn').forEach(t => {
                    t.classList.toggle('active', t.getAttribute('data-src') === src);
                });
            }
            
            function updateSizeButtons() {
                const container = document.getElementById('size-buttons-container');
                if (!container || !selectedColorId) return;
                
                const sizes = colorSizes.filter(s => s.color_id == selectedColorId);
                if (!sizes.length) {
                    container.innerHTML = '<p style="font-size:12px;color:#9ca3af;">No sizes available</p>';
                    return;
                }
                
                container.innerHTML = sizes.map(s => {
                    const v = getVariant(selectedColorId, s.id);
                    const available = v && v.stock > 0 && v.is_active;
                    return `<button data-size-id="${s.id}" class="size-btn ${!available ? 'disabled' : ''}" onclick="${available ? `selectSize(${s.id})` : ''}" ${!available ? 'disabled' : ''}>${s.size_name}</button>`;
                }).join('');
                
                selectedSizeId = null;
                selectedVariant = null;
                document.getElementById('selected-size-name').textContent = 'Select Size';
            }
            
            function updatePrice() {
                const priceEl = document.getElementById('variant-price');
                const oldPriceEl = document.getElementById('variant-old-price');
                
                if (selectedVariant) {
                    priceEl.textContent = `৳ ${selectedVariant.price}`;
                    if (oldPriceEl && selectedVariant.old_price) {
                        oldPriceEl.textContent = `৳ ${selectedVariant.old_price}`;
                        oldPriceEl.style.display = 'inline';
                    } else if (oldPriceEl) {
                        oldPriceEl.style.display = 'none';
                    }
                } else if (selectedColorId) {
                    const variants = productVariants.filter(v => v.color_id == selectedColorId && v.is_active);
                    if (variants.length) {
                        const min = Math.min(...variants.map(v => v.price));
                        const max = Math.max(...variants.map(v => v.price));
                        priceEl.textContent = `৳ ${min === max ? min : `${min} - ${max}`}`;
                    } else {
                        priceEl.textContent = `৳ ${currentProduct?.price || 0}`;
                    }
                    if (oldPriceEl) oldPriceEl.style.display = 'none';
                } else {
                    priceEl.textContent = `৳ ${currentProduct?.price || 0}`;
                    if (oldPriceEl && currentProduct?.old_price) {
                        oldPriceEl.textContent = `৳ ${currentProduct.old_price}`;
                        oldPriceEl.style.display = 'inline';
                    } else if (oldPriceEl) {
                        oldPriceEl.style.display = 'none';
                    }
                }
            }
            
            function updateVariantInfo() {
                const infoEl = document.getElementById('variant-info-row');
                if (!infoEl) return;
                
                if (selectedVariant) {
                    let html = '';
                    if (selectedVariant.sku) html += `<span>SKU: <strong>${selectedVariant.sku}</strong></span>`;
                    if (selectedVariant.barcode) html += `<span>Barcode: <strong>${selectedVariant.barcode}</strong></span>`;
                    if (selectedVariant.weight) html += `<span>Weight: <strong>${selectedVariant.weight}g</strong></span>`;
                    infoEl.innerHTML = html || 'Variant selected';
                    infoEl.style.display = 'flex';
                } else {
                    infoEl.style.display = 'none';
                }
            }
            
            function updateStockIndicator() {
                const dot = document.getElementById('stock-dot');
                const text = document.getElementById('stock-text');
                const addBtn = document.getElementById('add-to-cart-btn');
                const buyBtn = document.getElementById('buy-now-btn');
                
                if (selectedVariant) {
                    const out = selectedVariant.stock <= 0;
                    if (dot) dot.className = 'stock-dot' + (out ? ' out-of-stock' : '');
                    if (text) {
                        text.textContent = out ? 'Out of Stock' : 'In Stock';
                        text.style.color = out ? '#ef4444' : '#16a34a';
                    }
                    if (addBtn) addBtn.disabled = out;
                    if (buyBtn) buyBtn.disabled = out;
                } else if (selectedColorId) {
                    if (dot) dot.className = 'stock-dot';
                    if (text) { text.textContent = 'Select size'; text.style.color = '#d97706'; }
                    if (addBtn) addBtn.disabled = true;
                    if (buyBtn) buyBtn.disabled = true;
                } else {
                    if (dot) dot.className = 'stock-dot';
                    if (text) { text.textContent = 'Select options'; text.style.color = '#d97706'; }
                    if (addBtn) addBtn.disabled = true;
                    if (buyBtn) buyBtn.disabled = true;
                }
            }
            
            window.addToCart = function(buyNow = false) {
                if (!currentProduct) return;
                if (productColors.length > 0 && !selectedVariant) {
                    if (!selectedColorId) return showToast('Please select a color', 'error');
                    if (!selectedSizeId) return showToast('Please select a size', 'error');
                }
                if (selectedVariant && selectedVariant.stock <= 0) return showToast('Out of stock', 'error');
                
                let price = currentProduct.price;
                let variantId = null, variantName = null;
                if (selectedVariant) {
                    variantId = selectedVariant.id;
                    variantName = selectedVariant.name;
                    price = selectedVariant.price;
                }
                
                if (typeof cart === 'undefined') { window.location.reload(); return; }
                cart.push({
                    id: Date.now(),
                    product_id: currentProduct.id,
                    variant_id: variantId,
                    title: currentProduct.title,
                    price: price,
                    img: currentProduct.img,
                    variant: variantName,
                    quantity: 1
                });
                saveCart();
                updateCounts();
                showToast('Added to bag! 🎉');
                if (buyNow) window.location.href = '/checkout';
            };
            
            window.toggleAccordion = function(sectionId, headerEl) {
                const content = document.getElementById(sectionId);
                const isOpen = content.classList.contains('open');
                content.classList.toggle('open');
                headerEl.classList.toggle('open');
                if (sectionId === 'barcode-collapse' && !barcodeGenerated && !isOpen) {
                    setTimeout(() => generateBarcode(), 200);
                }
            };
            
            function generateBarcode() {
                const barcodeText = currentProduct?.barcode;
                if (!barcodeText || typeof JsBarcode === 'undefined') return;
                const svg = document.getElementById('barcode-svg');
                if (!svg) return;
                try {
                    JsBarcode("#barcode-svg", barcodeText, {
                        format: "CODE128",
                        width: 1.5,
                        height: 50,
                        displayValue: true,
                        fontSize: 11,
                        margin: 8,
                        background: "#ffffff",
                        lineColor: "#1d1d1f"
                    });
                    barcodeGenerated = true;
                } catch(e) {}
            }
            
            window.submitReview = async function(productId) {
                const text = document.getElementById('review-text')?.value?.trim();
                const starsInput = document.querySelector('input[name="rating"]:checked');
                if (!text || !starsInput) return showToast('Please complete all fields', 'error');
                try {
                    await apiPost('/submit-review', {
                        product_id: productId,
                        user_name: 'Guest User',
                        rating: parseInt(starsInput.value),
                        review_text: text
                    });
                    showToast('Review submitted! 🎉');
                    setTimeout(() => location.reload(), 1500);
                } catch(e) { showToast('Failed to submit', 'error'); }
            };
            
            window.toggleWishlistBtn = function(productId) {
                toggleWishlist(productId);
                const btn = document.getElementById('wishlist-btn');
                if (btn) {
                    btn.classList.toggle('wished', wishlist.includes(productId));
                    btn.innerHTML = `<i class="fa-${wishlist.includes(productId) ? 'solid' : 'regular'} fa-heart"></i> ${wishlist.includes(productId) ? 'Saved' : 'Save'}`;
                }
            };
            
            // Image zoom
            function initZoom() {
                const wrapper = document.querySelector('.main-image-wrapper');
                const img = document.getElementById('main-product-image');
                if (!wrapper || !img) return;
                
                wrapper.addEventListener('mousemove', (e) => {
                    const rect = wrapper.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / rect.width;
                    const y = (e.clientY - rect.top) / rect.height;
                    img.style.transformOrigin = `${x * 100}% ${y * 100}%`;
                    img.style.transform = 'scale(2.2)';
                });
                
                wrapper.addEventListener('mouseleave', () => {
                    img.style.transform = 'scale(1)';
                });
            }
            
            async function loadProduct(slug) {
                try {
                    const products = await apiFetch('/products');
                    if (!products) return false;
                    allProducts = products || [];
                    
                    const product = allProducts.find(p => (p.slug || p.title?.toLowerCase().replace(/[^a-z0-9]+/g, '-')) === slug);
                    if (!product) return false;
                    currentProduct = product;
                    
                    const [colors, variants, reviews, videos, banners] = await Promise.all([
                        apiFetch(`/product-colors?slug=${encodeURIComponent(slug)}`),
                        apiFetch(`/product-variants?slug=${encodeURIComponent(slug)}`),
                        apiFetch(`/product-reviews?slug=${encodeURIComponent(slug)}`),
                        apiFetch(`/product-videos?slug=${encodeURIComponent(slug)}`),
                        apiFetch(`/product-banners?slug=${encodeURIComponent(slug)}`)
                    ]);
                    
                    productColors = colors || [];
                    productVariants = variants || [];
                    allReviews = reviews || [];
                    productVideos = videos || [];
                    productBanners = banners || [];
                    
                    if (productColors.length) {
                        const ids = productColors.map(c => c.id);
                        const sizes = await apiFetch(`/color-sizes?ids=${ids.join(',')}`);
                        colorSizes = sizes || [];
                    }
                    
                    // Save to recent
                    try {
                        let recent = JSON.parse(localStorage.getItem('jayen_recent') || '[]');
                        recent = [product.id.toString(), ...recent.filter(id => id != product.id)].slice(0, 8);
                        localStorage.setItem('jayen_recent', JSON.stringify(recent));
                    } catch(e) {}
                    
                    renderProduct(product);
                    return true;
                } catch(e) {
                    console.error('Load error:', e);
                    return false;
                }
            }
            
            function renderProduct(product) {
                document.title = `${product.title || 'Product'} | JAYENWARE`;
                document.getElementById('canonical-url').href = `https://www.jayenware.shop/product/${product.slug || product.title?.toLowerCase().replace(/[^a-z0-9]+/g, '-')}`;
                
                allImages = product.images ? product.images.split(',').filter(Boolean) : [];
                if (!allImages.length && product.img) allImages.push(product.img);
                
                const mainImage = allImages[0] || '/logo.png';
                const prodReviews = allReviews.filter(r => r.product_id == product.id);
                const avgRating = prodReviews.length ? (prodReviews.reduce((s,r) => s + r.rating, 0) / prodReviews.length).toFixed(1) : null;
                
                const colorThumbs = productColors.filter(c => c.color_image).map(c => ({ src: c.color_image, name: c.color_name }));
                const allThumbnails = [...allImages.map(src => ({ src, name: 'Product' })), ...colorThumbs].filter((v, i, a) => a.findIndex(t => t.src === v.src) === i);
                
                const contentDiv = document.getElementById('product-detail-content');
                contentDiv.innerHTML = `
                <div class="product-container">
                    <!-- Gallery -->
                    <div class="gallery-section">
                        <div class="main-image-wrapper" id="zoom-container">
                            <img id="main-product-image" src="${mainImage}" alt="${product.title || ''}" class="main-image" onerror="this.src='/logo.png'">
                        </div>
                        ${allThumbnails.length > 1 ? `
                        <div class="thumbnail-strip no-scrollbar">
                            ${allThumbnails.map((t, i) => `
                                <button class="thumbnail-btn ${i === 0 ? 'active' : ''}" data-src="${t.src}" onclick="selectThumbnail('${t.src}')" title="${t.name}">
                                    <img src="${t.src}" alt="${t.name}" loading="lazy" onerror="this.parentElement.style.display='none'">
                                </button>
                            `).join('')}
                        </div>` : ''}
                    </div>
                    
                    <!-- Product Info -->
                    <div class="info-section">
                        <p class="product-breadcrumb">${product.category || 'Products'}</p>
                        <h1 class="product-title">${product.title || ''}</h1>
                        ${product.short_description ? `<p class="product-short-desc">${product.short_description}</p>` : ''}
                        
                        <div class="price-row">
                            <span class="current-price" id="variant-price">৳ ${product.price || 0}</span>
                            <span class="old-price" id="variant-old-price" style="display:${product.old_price ? 'inline' : 'none'}">৳ ${product.old_price || ''}</span>
                        </div>
                        
                        ${avgRating ? `<div style="margin-bottom:16px;"><span class="stars-display">${'★'.repeat(Math.round(avgRating))}${'☆'.repeat(5-Math.round(avgRating))}</span> <span style="font-size:13px;color:#86868b;">(${prodReviews.length} reviews)</span></div>` : ''}
                        
                        <div class="stock-indicator">
                            <span class="stock-dot" id="stock-dot"></span>
                            <span id="stock-text" style="color:#d97706;">Select options</span>
                        </div>
                        
                        ${productColors.length ? `
                        <div class="section-label">Color · <span id="selected-color-name">Select</span></div>
                        <div class="color-swatches">
                            ${productColors.map(c => {
                                const hasStock = productVariants.filter(v => v.color_id == c.id && v.is_active && v.stock > 0).length > 0;
                                return `<button class="color-btn ${!hasStock ? 'disabled' : ''}" data-color-id="${c.id}" onclick="selectColor(${c.id})" title="${c.color_name}" ${!hasStock ? 'disabled' : ''}><span class="swatch-inner" style="background:${c.color_code || '#ccc'};"></span></button>`;
                            }).join('')}
                        </div>` : ''}
                        
                        ${productColors.length ? `
                        <div class="section-label">Size · <span id="selected-size-name">Select</span></div>
                        <div class="size-buttons" id="size-buttons-container">
                            <p style="font-size:12px;color:#9ca3af;">Choose a color first</p>
                        </div>` : ''}
                        
                        <div class="variant-info" id="variant-info-row" style="display:none;"></div>
                        
                        <button id="add-to-cart-btn" class="add-to-cart-btn" onclick="addToCart(false)" disabled>Add to Bag</button>
                        <button id="buy-now-btn" class="buy-now-btn" onclick="addToCart(true)" disabled>Buy Now</button>
                        
                        <button id="wishlist-btn" class="wishlist-btn ${wishlist.includes(product.id) ? 'wished' : ''}" onclick="toggleWishlistBtn(${product.id})">
                            <i class="fa-${wishlist.includes(product.id) ? 'solid' : 'regular'} fa-heart"></i> ${wishlist.includes(product.id) ? 'Saved' : 'Save'}
                        </button>
                        
                        <!-- Videos -->
                        ${productVideos.length ? productVideos.map((v, i) => `
                        <div class="video-wrapper">
                            <video src="${v.video_url}" playsinline muted loop preload="auto" id="video-${i}"></video>
                            <div class="video-controls">
                                <button class="video-control-btn" onclick="const vid=document.getElementById('video-${i}'); vid.muted=!vid.muted; this.innerHTML=vid.muted?'<i class=\\'fa-solid fa-volume-xmark\\'></i>':'<i class=\\'fa-solid fa-volume-high\\'></i>'"><i class="fa-solid fa-volume-xmark"></i></button>
                                <button class="video-control-btn" onclick="const vid=document.getElementById('video-${i}'); if(vid.paused){vid.play();this.innerHTML='<i class=\\'fa-solid fa-pause\\'></i>'}else{vid.pause();this.innerHTML='<i class=\\'fa-solid fa-play\\'></i>'}"><i class="fa-solid fa-pause"></i></button>
                            </div>
                            ${v.title ? `<div style="position:absolute;bottom:16px;left:16px;background:rgba(0,0,0,0.5);color:#fff;padding:8px 16px;border-radius:100px;font-size:11px;font-weight:600;">${v.title}</div>` : ''}
                        </div>`).join('') : ''}
                        
                        <!-- Banners -->
                        ${productBanners.length ? productBanners.map(b => `
                        <div class="banner-card" ${b.click_link ? `onclick="window.open('${b.click_link}','_blank')"` : ''}>
                            <img src="${b.banner_url}" alt="${b.title || ''}" loading="lazy" onerror="this.style.display='none'">
                            <div class="banner-overlay">
                                ${b.title ? `<h3 style="font-size:22px;font-weight:700;margin-bottom:4px;">${b.title}</h3>` : ''}
                                ${b.subtitle ? `<p style="font-size:14px;opacity:0.9;">${b.subtitle}</p>` : ''}
                            </div>
                        </div>`).join('') : ''}
                        
                        <!-- Accordions -->
                        <div class="accordion">
                            ${product.fabric_type || product.gsm_type || product.fit_type || product.gender || product.print_type ? `
                            <button class="accordion-header" onclick="toggleAccordion('specs-collapse', this)">
                                Specifications <i class="fa-solid fa-chevron-down"></i>
                            </button>
                            <div class="accordion-content" id="specs-collapse">
                                <div class="specs-grid accordion-inner">
                                    ${product.fabric_type ? `<div class="spec-item"><i class="fa-solid fa-shirt"></i><div><span style="color:#9ca3af;font-size:10px;">Fabric</span><br><strong>${product.fabric_type}</strong></div></div>` : ''}
                                    ${product.gsm_type ? `<div class="spec-item"><i class="fa-solid fa-weight-scale"></i><div><span style="color:#9ca3af;font-size:10px;">GSM</span><br><strong>${product.gsm_type}</strong></div></div>` : ''}
                                    ${product.fit_type ? `<div class="spec-item"><i class="fa-solid fa-ruler"></i><div><span style="color:#9ca3af;font-size:10px;">Fit</span><br><strong>${product.fit_type}</strong></div></div>` : ''}
                                    ${product.gender ? `<div class="spec-item"><i class="fa-solid fa-venus-mars"></i><div><span style="color:#9ca3af;font-size:10px;">Gender</span><br><strong>${product.gender}</strong></div></div>` : ''}
                                    ${product.print_type ? `<div class="spec-item"><i class="fa-solid fa-palette"></i><div><span style="color:#9ca3af;font-size:10px;">Print</span><br><strong>${product.print_type}</strong></div></div>` : ''}
                                </div>
                            </div>` : ''}
                            
                            ${product.description ? `
                            <button class="accordion-header" onclick="toggleAccordion('desc-collapse', this)">
                                Description <i class="fa-solid fa-chevron-down"></i>
                            </button>
                            <div class="accordion-content" id="desc-collapse">
                                <div class="accordion-inner">${product.description}</div>
                            </div>` : ''}
                            
                            ${product.barcode ? `
                            <button class="accordion-header" onclick="toggleAccordion('barcode-collapse', this)">
                                Barcode <i class="fa-solid fa-chevron-down"></i>
                            </button>
                            <div class="accordion-content" id="barcode-collapse">
                                <div class="barcode-container accordion-inner">
                                    <svg id="barcode-svg"></svg>
                                </div>
                            </div>` : ''}
                        </div>
                        
                        <!-- Reviews -->
                        <div style="margin-top:32px;border-top:1px solid #f0f0f0;padding-top:24px;">
                            <h3 style="font-size:18px;font-weight:700;margin-bottom:20px;">Reviews (${prodReviews.length})</h3>
                            ${prodReviews.length ? prodReviews.map(r => `
                            <div class="review-card">
                                <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                                    <span class="stars-display">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span>
                                    <strong style="font-size:13px;">${r.user_name || 'Anonymous'}</strong>
                                    <span style="margin-left:auto;font-size:11px;color:#9ca3af;">${r.created_at ? new Date(r.created_at).toLocaleDateString() : ''}</span>
                                </div>
                                <p style="font-size:14px;color:#6b7280;">${r.review_text}</p>
                            </div>
                            `).join('') : '<p style="color:#9ca3af;text-align:center;padding:20px;">No reviews yet.</p>'}
                            
                            <div style="background:#fafafa;padding:24px;border-radius:14px;margin-top:20px;">
                                <h4 style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;">Write a Review</h4>
                                <div class="star-rating-input" style="margin-bottom:12px;">
                                    <input type="radio" id="star5" name="rating" value="5"><label for="star5"><i class="fa-solid fa-star"></i></label>
                                    <input type="radio" id="star4" name="rating" value="4"><label for="star4"><i class="fa-solid fa-star"></i></label>
                                    <input type="radio" id="star3" name="rating" value="3"><label for="star3"><i class="fa-solid fa-star"></i></label>
                                    <input type="radio" id="star2" name="rating" value="2"><label for="star2"><i class="fa-solid fa-star"></i></label>
                                    <input type="radio" id="star1" name="rating" value="1"><label for="star1"><i class="fa-solid fa-star"></i></label>
                                </div>
                                <textarea id="review-text" placeholder="Share your experience..." style="width:100%;padding:14px;border:1px solid #e5e5e5;border-radius:10px;font-size:13px;height:90px;margin-bottom:12px;resize:vertical;font-family:inherit;"></textarea>
                                <button onclick="submitReview(${product.id})" style="padding:12px 24px;background:#1d1d1f;color:#fff;border:none;border-radius:100px;font-weight:600;font-size:12px;cursor:pointer;">Submit Review</button>
                            </div>
                        </div>
                    </div>
                </div>
                `;
                
                // Related products
                const related = allProducts.filter(p => p.id !== product.id).sort(() => 0.5 - Math.random()).slice(0, 4);
                if (related.length) {
                    contentDiv.innerHTML += `
                    <div class="related-section">
                        <h3 style="font-size:20px;font-weight:700;margin-bottom:20px;max-width:1200px;margin-left:auto;margin-right:auto;">Complete the Look</h3>
                        <div class="related-grid">
                            ${related.map(p => `
                            <a href="/product/${p.slug || p.title?.toLowerCase().replace(/[^a-z0-9]+/g, '-')}" class="related-card">
                                <img src="${p.img || '/logo.png'}" alt="${p.title}" loading="lazy" onerror="this.src='/logo.png'">
                                <h4>${p.title}</h4>
                                <span class="price">৳ ${p.price}</span>
                            </a>
                            `).join('')}
                        </div>
                    </div>`;
                }
                
                // Auto-play videos
                setTimeout(() => {
                    document.querySelectorAll('.video-wrapper video').forEach(v => {
                        v.play().catch(() => {});
                    });
                }, 300);
                
                // Init zoom after render
                setTimeout(initZoom, 200);
                
                updateUI();
            }
            
            async function init() {
                await initSharedComponents();
                updateCounts();
                
                const slug = getSlugFromURL();
                if (!slug) {
                    document.getElementById('product-not-found').style.display = 'block';
                    return;
                }
                
                const found = await loadProduct(slug);
                if (!found) {
                    document.getElementById('product-not-found').style.display = 'block';
                    document.getElementById('product-detail-content').innerHTML = '';
                }
            }
            
            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
            else init();
        })();
    </script>
</body>
</html>
