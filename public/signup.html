<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - অ্যাকাউন্ট তৈরি করুন</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        
        * {
            font-family: 'Hind Siliguri', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .input-focus:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    
    <!-- Header -->
    <header class="gradient-bg text-white py-6">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between">
                <a href="/" class="text-2xl font-bold">আপনার সাইট</a>
                <a href="/login" class="text-white hover:text-gray-200 transition">
                    লগইন করুন
                </a>
            </div>
        </div>
    </header>

    <!-- Signup Form -->
    <div class="container mx-auto px-4 py-12">
        <div class="max-w-md mx-auto">
            <div class="bg-white rounded-2xl shadow-xl p-8">
                
                <!-- Header -->
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-bold text-gray-800 mb-2">অ্যাকাউন্ট তৈরি করুন</h2>
                    <p class="text-gray-600">নতুন অ্যাকাউন্ট তৈরি করতে ফর্মটি পূরণ করুন</p>
                </div>

                <!-- Error/Success Message -->
                <div id="messageBox" class="hidden mb-4 p-4 rounded-lg"></div>

                <!-- Signup Form -->
                <form id="signupForm" class="space-y-4">
                    
                    <!-- Name -->
                    <div>
                        <label class="block text-gray-700 font-medium mb-2">নাম *</label>
                        <input 
                            type="text" 
                            id="name" 
                            name="name"
                            placeholder="আপনার পূর্ণ নাম লিখুন"
                            class="input-focus w-full px-4 py-3 border border-gray-300 rounded-lg transition duration-200"
                            required
                        >
                    </div>

                    <!-- Email -->
                    <div>
                        <label class="block text-gray-700 font-medium mb-2">ইমেইল *</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email"
                            placeholder="example@email.com"
                            class="input-focus w-full px-4 py-3 border border-gray-300 rounded-lg transition duration-200"
                            required
                        >
                    </div>

                    <!-- Phone -->
                    <div>
                        <label class="block text-gray-700 font-medium mb-2">ফোন নম্বর</label>
                        <input 
                            type="tel" 
                            id="phone" 
                            name="phone"
                            placeholder="01XXXXXXXXX"
                            class="input-focus w-full px-4 py-3 border border-gray-300 rounded-lg transition duration-200"
                        >
                    </div>

                    <!-- Username -->
                    <div>
                        <label class="block text-gray-700 font-medium mb-2">ইউজারনেম</label>
                        <input 
                            type="text" 
                            id="username" 
                            name="username"
                            placeholder="ইউজারনেম (খালি রাখলে অটো জেনারেট হবে)"
                            class="input-focus w-full px-4 py-3 border border-gray-300 rounded-lg transition duration-200"
                        >
                    </div>

                    <!-- Passkey -->
                    <div>
                        <label class="block text-gray-700 font-medium mb-2">পাসকি (১২ সংখ্যা)</label>
                        <input 
                            type="text" 
                            id="passkey" 
                            name="passkey"
                            placeholder="খালি রাখলে অটো জেনারেট হবে"
                            maxlength="12"
                            pattern="[0-9]{12}"
                            class="input-focus w-full px-4 py-3 border border-gray-300 rounded-lg transition duration-200"
                        >
                        <p class="text-xs text-gray-500 mt-1">শুধু সংখ্যা, ১২ ডিজিট</p>
                    </div>

                    <!-- Password -->
                    <div>
                        <label class="block text-gray-700 font-medium mb-2">পাসওয়ার্ড *</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password"
                            placeholder="কমপক্ষে ৬ অক্ষরের পাসওয়ার্ড"
                            class="input-focus w-full px-4 py-3 border border-gray-300 rounded-lg transition duration-200"
                            minlength="6"
                            required
                        >
                    </div>

                    <!-- Confirm Password -->
                    <div>
                        <label class="block text-gray-700 font-medium mb-2">পাসওয়ার্ড নিশ্চিত করুন *</label>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword"
                            placeholder="পাসওয়ার্ডটি আবার লিখুন"
                            class="input-focus w-full px-4 py-3 border border-gray-300 rounded-lg transition duration-200"
                            minlength="6"
                            required
                        >
                    </div>

                    <!-- Submit Button -->
                    <button 
                        type="submit" 
                        id="submitBtn"
                        class="gradient-bg w-full text-white font-bold py-3 rounded-lg hover:opacity-90 transition duration-200 transform hover:scale-[1.02]"
                    >
                        <span id="btnText">অ্যাকাউন্ট তৈরি করুন</span>
                        <span id="btnLoader" class="hidden">
                            <span class="loading-spinner inline-block mr-2"></span>
                            তৈরি হচ্ছে...
                        </span>
                    </button>

                </form>

                <!-- Login Link -->
                <div class="text-center mt-6">
                    <p class="text-gray-600">
                        ইতিমধ্যে অ্যাকাউন্ট আছে? 
                        <a href="/login" class="text-purple-600 font-semibold hover:text-purple-700">
                            লগইন করুন
                        </a>
                    </p>
                </div>

                <!-- Passkey Login Link -->
                <div class="text-center mt-3">
                    <a href="/login?mode=passkey" class="text-sm text-gray-500 hover:text-gray-700">
                        পাসকি দিয়ে লগইন করুন
                    </a>
                </div>

            </div>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Get form values
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const username = document.getElementById('username').value.trim();
            const passkey = document.getElementById('passkey').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Basic validation
            const messageBox = document.getElementById('messageBox');
            
            // Clear previous messages
            messageBox.classList.add('hidden');
            
            if (!name || !email || !password || !confirmPassword) {
                showMessage('সব প্রয়োজনীয় ফিল্ড পূরণ করুন', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showMessage('পাসওয়ার্ড মিলছে না', 'error');
                return;
            }
            
            if (password.length < 6) {
                showMessage('পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে', 'error');
                return;
            }
            
            if (passkey && !/^\d{12}$/.test(passkey)) {
                showMessage('পাসকি ১২ সংখ্যার হতে হবে', 'error');
                return;
            }
            
            // Show loading state
            toggleLoading(true);
            
            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email,
                        password,
                        name,
                        phone,
                        username,
                        passkey
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('অ্যাকাউন্ট সফলভাবে তৈরি হয়েছে! ইমেইল ভেরিফিকেশন চেক করুন।', 'success');
                    
                    // Redirect to login after 3 seconds
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 3000);
                } else {
                    showMessage(data.error || 'সাইনআপ ব্যর্থ হয়েছে', 'error');
                }
                
            } catch (error) {
                showMessage('সার্ভার এরর! আবার চেষ্টা করুন।', 'error');
                console.error('Signup error:', error);
            } finally {
                toggleLoading(false);
            }
        });
        
        function showMessage(message, type) {
            const messageBox = document.getElementById('messageBox');
            messageBox.classList.remove('hidden');
            messageBox.textContent = message;
            
            if (type === 'error') {
                messageBox.className = 'mb-4 p-4 rounded-lg bg-red-100 text-red-700 border border-red-200';
            } else if (type === 'success') {
                messageBox.className = 'mb-4 p-4 rounded-lg bg-green-100 text-green-700 border border-green-200';
            }
        }
        
        function toggleLoading(isLoading) {
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            const submitBtn = document.getElementById('submitBtn');
            
            if (isLoading) {
                btnText.classList.add('hidden');
                btnLoader.classList.remove('hidden');
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.7';
            } else {
                btnText.classList.remove('hidden');
                btnLoader.classList.add('hidden');
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
            }
        }
    </script>

</body>
</html>
