<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Jabiyen</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .signup-container {
            width: 100%;
            max-width: 550px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .signup-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 40px;
            text-align: center;
            color: white;
        }

        .signup-header .logo {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .signup-header .logo span {
            color: #ffd700;
        }

        .signup-header p {
            font-size: 14px;
            opacity: 0.9;
            font-weight: 300;
        }

        .signup-form {
            padding: 35px 40px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group label .required {
            color: #ef4444;
            margin-left: 2px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 15px;
            transition: color 0.3s ease;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 14px 12px 40px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: #374151;
            transition: all 0.3s ease;
            background: #f9fafb;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input:focus + i,
        .input-wrapper:focus-within i {
            color: #667eea;
        }

        .form-group input::placeholder {
            color: #9ca3af;
            font-weight: 300;
        }

        .phone-group {
            display: flex;
            gap: 10px;
        }

        .phone-group select {
            width: 130px;
            padding: 12px 10px;
            flex-shrink: 0;
        }

        .phone-group .input-wrapper {
            flex: 1;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 45px;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9ca3af;
            font-size: 15px;
            transition: color 0.3s ease;
            background: none;
            border: none;
        }

        .toggle-password:hover {
            color: #667eea;
        }

        .terms-checkbox {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 25px 0;
        }

        .terms-checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .terms-checkbox label {
            font-size: 13px;
            color: #6b7280;
            line-height: 1.5;
            cursor: pointer;
        }

        .terms-checkbox label a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .terms-checkbox label a:hover {
            text-decoration: underline;
        }

        .signup-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.5px;
        }

        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .signup-btn:active {
            transform: translateY(0);
        }

        .signup-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .signup-btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 10px;
        }

        .signup-btn.loading .spinner {
            display: inline-block;
        }

        .signup-btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #6b7280;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #9ca3af;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .divider span {
            padding: 0 15px;
        }

        .social-signup {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .social-btn:hover {
            border-color: #667eea;
            background: #f9fafb;
        }

        .social-btn i {
            font-size: 18px;
        }

        .social-btn.google i {
            color: #ea4335;
        }

        .social-btn.facebook i {
            color: #1877f2;
        }

        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #dc2626;
        }

        .error-message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .success-message {
            background: #f0fdf4;
            color: #16a34a;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #16a34a;
        }

        .success-message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
        }

        .step-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e5e7eb;
            transition: all 0.3s ease;
        }

        .step-dot.active {
            background: #667eea;
            width: 30px;
            border-radius: 5px;
        }

        .form-step {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .form-step.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .back-btn {
            flex: 1;
            padding: 14px;
            background: #f3f4f6;
            color: #374151;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .back-btn:hover {
            background: #e5e7eb;
        }

        @media (max-width: 600px) {
            .signup-container {
                border-radius: 15px;
            }
            
            .signup-header {
                padding: 25px 25px;
            }
            
            .signup-form {
                padding: 25px;
            }
            
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
            
            .form-row .form-group {
                margin-bottom: 20px;
            }
            
            .social-signup {
                flex-direction: column;
            }
            
            .phone-group {
                flex-direction: column;
            }
            
            .phone-group select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <!-- Header -->
        <div class="signup-header">
            <div class="logo">Jab<span>i</span>yen</div>
            <p>Create your account and start shopping</p>
        </div>

        <!-- Form -->
        <div class="signup-form">
            <!-- Error Message -->
            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <!-- Success Message -->
            <div class="success-message" id="successMessage">
                <i class="fas fa-check-circle"></i>
                <span id="successText"></span>
            </div>

            <!-- Step Indicator -->
            <div class="step-indicator">
                <div class="step-dot active" id="stepDot1"></div>
                <div class="step-dot" id="stepDot2"></div>
            </div>

            <form id="signupForm">
                <!-- Step 1: Account Information -->
                <div class="form-step active" id="step1">
                    <div class="form-group">
                        <label>Full Name <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="fullName" placeholder="Enter your full name" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email Address <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="you@example.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <div class="phone-group">
                            <select id="phoneCode">
                                <option value="+880">🇧🇩 +880</option>
                                <option value="+91">🇮🇳 +91</option>
                                <option value="+1">🇺🇸 +1</option>
                                <option value="+44">🇬🇧 +44</option>
                                <option value="+971">🇦🇪 +971</option>
                                <option value="+966">🇸🇦 +966</option>
                                <option value="+60">🇲🇾 +60</option>
                                <option value="+65">🇸🇬 +65</option>
                            </select>
                            <div class="input-wrapper">
                                <i class="fas fa-phone"></i>
                                <input type="tel" id="phone" placeholder="1XXXXXXXXX">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Username (Optional)</label>
                        <div class="input-wrapper">
                            <i class="fas fa-at"></i>
                            <input type="text" id="username" placeholder="Choose a username">
                        </div>
                    </div>

                    <button type="button" class="signup-btn" onclick="nextStep()">
                        <span class="spinner"></span>
                        <span class="btn-text">Continue →</span>
                    </button>
                </div>

                <!-- Step 2: Password & Address -->
                <div class="form-step" id="step2">
                    <div class="form-group">
                        <label>Password <span class="required">*</span></label>
                        <div class="input-wrapper password-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="At least 6 characters" required minlength="6">
                            <button type="button" class="toggle-password" onclick="togglePassword('password')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Confirm Password <span class="required">*</span></label>
                        <div class="input-wrapper password-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="confirmPassword" placeholder="Re-enter your password" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Country</label>
                            <div class="input-wrapper">
                                <i class="fas fa-globe"></i>
                                <input type="text" id="country" placeholder="Bangladesh">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>City</label>
                            <div class="input-wrapper">
                                <i class="fas fa-city"></i>
                                <input type="text" id="city" placeholder="Dhaka">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Street Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-map-marker-alt"></i>
                            <input type="text" id="streetAddress" placeholder="House, Road, Area">
                        </div>
                    </div>

                    <div class="terms-checkbox">
                        <input type="checkbox" id="termsCheckbox" required>
                        <label for="termsCheckbox">
                            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                        </label>
                    </div>

                    <div class="nav-buttons">
                        <button type="button" class="back-btn" onclick="prevStep()">← Back</button>
                        <button type="submit" class="signup-btn" id="submitBtn">
                            <span class="spinner"></span>
                            <span class="btn-text">Create Account</span>
                        </button>
                    </div>
                </div>
            </form>

            <!-- Social Signup -->
            <div class="divider">
                <span>or sign up with</span>
            </div>

            <div class="social-signup">
                <button class="social-btn google" onclick="socialSignup('google')">
                    <i class="fab fa-google"></i> Google
                </button>
                <button class="social-btn facebook" onclick="socialSignup('facebook')">
                    <i class="fab fa-facebook-f"></i> Facebook
                </button>
            </div>

            <!-- Login Link -->
            <div class="login-link">
                Already have an account? <a href="/login">Sign in</a>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // Step Navigation
        // ============================================
        let currentStep = 1;

        function showStep(step) {
            document.querySelectorAll('.form-step').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.step-dot').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`step${step}`).classList.add('active');
            document.getElementById(`stepDot${step}`).classList.add('active');
            
            currentStep = step;
            
            // Hide messages when switching steps
            hideError();
            hideSuccess();
        }

        function nextStep() {
            // Validate Step 1 fields
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            
            if (!fullName) {
                showError('Please enter your full name');
                return;
            }
            
            if (fullName.length < 2) {
                showError('Name must be at least 2 characters');
                return;
            }
            
            if (!email) {
                showError('Please enter your email address');
                return;
            }
            
            const emailRegex = /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/;
            if (!emailRegex.test(email)) {
                showError('Please enter a valid email address');
                return;
            }
            
            showStep(2);
        }

        function prevStep() {
            showStep(1);
        }

        // ============================================
        // Toggle Password Visibility
        // ============================================
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.parentElement.querySelector('.toggle-password i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // ============================================
        // Show/Hide Messages
        // ============================================
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorDiv.classList.add('show');
            document.getElementById('successMessage').classList.remove('show');
        }

        function hideError() {
            document.getElementById('errorMessage').classList.remove('show');
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            const successText = document.getElementById('successText');
            successText.textContent = message;
            successDiv.classList.add('show');
            document.getElementById('errorMessage').classList.remove('show');
        }

        function hideSuccess() {
            document.getElementById('successMessage').classList.remove('show');
        }

        // ============================================
        // Form Submission
        // ============================================
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const termsCheckbox = document.getElementById('termsCheckbox');
            
            // Validate password
            if (!password) {
                showError('Please enter a password');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }
            
            if (!termsCheckbox.checked) {
                showError('Please agree to the Terms of Service');
                return;
            }
            
            // Show loading state
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            hideError();
            hideSuccess();
            
            // Prepare data
            const signupData = {
                email: document.getElementById('email').value.trim(),
                password: password,
                full_name: document.getElementById('fullName').value.trim(),
                phone: document.getElementById('phone').value.trim() || null,
                phone_country_code: document.getElementById('phoneCode').value,
                username: document.getElementById('username').value.trim() || null,
                country: document.getElementById('country').value.trim() || null,
                city: document.getElementById('city').value.trim() || null,
                street_address_1: document.getElementById('streetAddress').value.trim() || null
            };
            
            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(signupData)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showSuccess(result.message || 'Account created successfully! Please check your email for verification.');
                    
                    // Store token if available
                    if (result.user) {
                        // Save to localStorage
                        const userData = {
                            id: result.user.id,
                            email: result.user.email,
                            profile: result.profile
                        };
                        localStorage.setItem('jabiyen_user', JSON.stringify(userData));
                        
                        // Redirect after delay
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 2000);
                    }
                } else {
                    showError(result.error || 'Signup failed. Please try again.');
                    submitBtn.classList.remove('loading');
                    submitBtn.disabled = false;
                }
            } catch (error) {
                console.error('Signup error:', error);
                showError('Network error. Please check your connection and try again.');
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        });

        // ============================================
        // Social Signup (Placeholder)
        // ============================================
        function socialSignup(provider) {
            showError(`${provider} signup is coming soon!`);
            setTimeout(hideError, 3000);
        }

        // ============================================
        // Clear error on input focus
        // ============================================
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', hideError);
        });
    </script>
</body>
</html>
