<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>সাইন আপ পেজ</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
        form { display: flex; flex-direction: column; width: 300px; gap: 10px; }
        input { padding: 8px; }
        button { padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <form id="signupForm">
        <h2>সাইন আপ</h2>
        <input type="text" id="name" placeholder="আপনার নাম" required>
        <input type="email" id="email" placeholder="ইমেইল" required>
        <input type="password" id="password" placeholder="পাসওয়ার্ড" required>
        <button type="submit">রেজিস্ট্রেশন করুন</button>
        <p id="message"></p>
    </form>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const result = await response.json();

                if (response.ok) {
                    msg.innerText = "সফলভাবে রেজিস্ট্রেশন হয়েছে!";
                    msg.style.color = "green";
                } else {
                    msg.innerText = "Error: " + result.error;
                    msg.style.color = "red";
                }
            } catch (err) {
                msg.innerText = "সার্ভার এরর!";
            }
        });
    </script>
</body>
</html>
