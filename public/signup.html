<!DOCTYPE html>
<html lang="bn-BD" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Join JAYENWARE | Create Your Account</title>
    
    <meta name="description" content="Create your JAYENWARE account. Join for exclusive deals, faster checkout, and premium lifestyle shopping.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#ffffff">
    
    <link rel="canonical" href="https://www.jayenware.shop/signup" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" />

    <script src="/fonts.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1d1d1f',
                        accent: '#86868b',
                        soft: '#f5f5f7',
                        blue: '#007aff',
                        gold: '#c9a96e',
                        error: '#dc2626',
                        success: '#059669'
                    },
                    fontFamily: {
                        sans: ["'Inter', 'sans-serif'"],
                        serif: ["'Manrope', 'sans-serif'"],
                        mono: ["'Sora', 'sans-serif'"]
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --primary: #1d1d1f;
            --accent: #86868b;
            --soft: #f5f5f7;
            --blue: #007aff;
            --gold: #c9a96e;
        }
        
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background: #f5f5f7;
            color: #1d1d1f;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Ambient Background */
        .ambient-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }
        
        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            animation: float 20s ease-in-out infinite;
        }
        
        .ambient-orb:nth-child(1) {
            width: 400px;
            height: 400px;
            background: rgba(0,122,255,0.08);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }
        
        .ambient-orb:nth-child(2) {
            width: 350px;
            height: 350px;
            background: rgba(201,169,110,0.06);
            bottom: -80px;
            right: -80px;
            animation-delay: -7s;
        }
        
        .ambient-orb:nth-child(3) {
            width: 300px;
            height: 300px;
            background: rgba(5,150,105,0.05);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -14s;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(-30px, -10px) scale(1.02); }
        }

        main {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 16px 48px;
            width: 100%;
            position: relative;
            z-index: 1;
        }
        
        @media (min-width: 640px) { main { padding: 120px 24px 64px; } }
        @media (min-width: 1024px) { main { padding: 140px 32px 80px; } }

        .cinematic-container {
            width: 100%;
            max-width: 540px;
            position: relative;
        }

        /* Progress Indicator */
        .progress-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 40px;
            padding: 0 4px;
        }
        
        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #d1d1d6;
            transition: all 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
            position: relative;
        }
        
        .progress-dot.completed {
            background: #007aff;
            box-shadow: 0 0 12px rgba(0,122,255,0.4);
            animation: dotComplete 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .progress-dot.active {
            width: 12px;
            height: 12px;
            background: #007aff;
            box-shadow: 0 0 16px rgba(0,122,255,0.6);
            animation: dotPulse 2s ease-in-out infinite;
        }
        
        @keyframes dotComplete {
            0% { transform: scale(1); }
            50% { transform: scale(1.8); }
            100% { transform: scale(1); }
        }
        
        @keyframes dotPulse {
            0%, 100% { box-shadow: 0 0 8px rgba(0,122,255,0.3); }
            50% { box-shadow: 0 0 20px rgba(0,122,255,0.7); }
        }

        /* Auth Card */
        .auth-card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 28px;
            padding: 44px 28px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.03), 0 8px 40px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.8);
            position: relative;
            overflow: hidden;
            min-height: 440px;
            display: flex;
            flex-direction: column;
            transition: all 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        
        @media (min-width: 640px) {
            .auth-card { padding: 52px 36px; border-radius: 32px; min-height: 480px; }
        }
        
        @media (min-width: 1024px) {
            .auth-card { padding: 60px 44px; border-radius: 36px; min-height: 520px; }
        }

        /* Card Glow Effect */
        .auth-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(0,122,255,0.1), rgba(201,169,110,0.1), rgba(5,150,105,0.1));
            z-index: -1;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .auth-card.glow::before {
            opacity: 1;
        }

        /* Step Content */
        .step-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .step-content {
            animation: stepEnter 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        
        @keyframes stepEnter {
            from { opacity: 0; transform: translateY(30px); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        
        .step-content.exit {
            animation: stepExit 0.3s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }
        
        @keyframes stepExit {
            to { opacity: 0; transform: translateY(-20px); filter: blur(4px); }
        }

        /* Typography */
        .step-emoji {
            font-size: 40px;
            margin-bottom: 16px;
            animation: emojiFloat 3s ease-in-out infinite;
        }
        
        @keyframes emojiFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-8px) rotate(2deg); }
            75% { transform: translateY(4px) rotate(-2deg); }
        }
        
        .step-question {
            font-family: 'Manrope', sans-serif;
            font-weight: 700;
            font-size: 26px;
            line-height: 1.2;
            margin-bottom: 8px;
            color: #1d1d1f;
            letter-spacing: -0.2px;
        }
        
        @media (min-width: 640px) {
            .step-question { font-size: 30px; }
        }
        
        .step-description {
            font-size: 14px;
            color: #86868b;
            margin-bottom: 36px;
            line-height: 1.6;
            font-weight: 400;
        }

        /* Input Field */
        .input-container {
            position: relative;
            margin-bottom: 8px;
        }
        
        .cinematic-input {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid #e5e5ea;
            border-radius: 14px;
            font-size: 17px;
            font-family: 'Inter', sans-serif;
            background: rgba(255,255,255,0.9);
            outline: none;
            transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            color: #1d1d1f;
        }
        
        .cinematic-input:hover {
            border-color: #c0c0c5;
        }
        
        .cinematic-input:focus {
            border-color: #007aff;
            box-shadow: 0 0 0 8px rgba(0,122,255,0.06);
            background: #ffffff;
            transform: translateY(-1px);
        }
        
        .cinematic-input.error {
            border-color: #dc2626;
            animation: inputShake 0.6s cubic-bezier(0.36, 0.07, 0.19, 0.97);
            box-shadow: 0 0 0 8px rgba(220,38,38,0.06);
        }
        
        @keyframes inputShake {
            10%, 90% { transform: translateX(-1px); }
            20%, 80% { transform: translateX(2px); }
            30%, 50%, 70% { transform: translateX(-4px); }
            40%, 60% { transform: translateX(4px); }
        }
        
        .cinematic-input.success {
            border-color: #059669;
            box-shadow: 0 0 0 8px rgba(5,150,105,0.06);
        }

        /* Floating Label */
        .floating-label {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 17px;
            color: #c0c0c5;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            font-weight: 400;
        }
        
        .cinematic-input:focus ~ .floating-label,
        .cinematic-input:not(:placeholder-shown) ~ .floating-label {
            top: -10px;
            left: 16px;
            font-size: 12px;
            color: #007aff;
            background: white;
            padding: 0 8px;
            font-weight: 600;
        }

        /* Error Message */
        .field-message {
            font-size: 12px;
            margin-top: 8px;
            min-height: 20px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .field-message.error {
            color: #dc2626;
        }
        
        .field-message.success {
            color: #059669;
        }
        
        .field-message.hint {
            color: #86868b;
        }

        /* Buttons */
        .nav-row {
            display: flex;
            gap: 12px;
            margin-top: auto;
            padding-top: 36px;
            align-items: center;
        }
        
        .btn-back {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: #f5f5f7;
            border: 1.5px solid #e5e5ea;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #86868b;
            font-size: 16px;
            flex-shrink: 0;
        }
        
        .btn-back:hover {
            background: #ebebed;
            border-color: #c0c0c5;
            color: #1d1d1f;
            transform: translateX(-2px);
        }
        
        .btn-back:active {
            transform: scale(0.95);
        }
        
        .btn-next {
            flex: 1;
            padding: 16px 28px;
            background: #1d1d1f;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.2px;
        }
        
        .btn-next:hover {
            background: #333;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }
        
        .btn-next:active {
            transform: scale(0.98);
        }
        
        .btn-next:disabled {
            background: #d1d1d6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .btn-next .icon-arrow {
            transition: transform 0.3s ease;
        }
        
        .btn-next:hover .icon-arrow {
            transform: translateX(4px);
        }

        /* Skip Button */
        .btn-skip {
            background: transparent;
            border: none;
            color: #86868b;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }
        
        .btn-skip:hover {
            color: #1d1d1f;
            background: rgba(0,0,0,0.03);
        }

        /* Location Button */
        .location-trigger {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 18px;
            background: #f5f5f7;
            border: 1.5px solid #e5e5ea;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: #007aff;
            margin-bottom: 20px;
        }
        
        .location-trigger:hover {
            background: #ebebed;
            border-color: #007aff;
        }
        
        .location-trigger.loading {
            pointer-events: none;
            opacity: 0.7;
        }
        
        .location-trigger i {
            font-size: 18px;
        }

        /* Checkbox */
        .agreement-box {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 16px;
            background: #f5f5f7;
            border-radius: 14px;
            border: 1.5px solid #e5e5ea;
            transition: all 0.3s ease;
        }
        
        .agreement-box:hover {
            border-color: #c0c0c5;
        }
        
        .agreement-box input[type="checkbox"] {
            margin-top: 1px;
            accent-color: #007aff;
            width: 20px;
            height: 20px;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .agreement-box label {
            font-size: 13px;
            color: #86868b;
            line-height: 1.6;
            cursor: pointer;
        }
        
        .agreement-box a {
            color: #007aff;
            font-weight: 600;
            text-decoration: none;
        }
        
        .agreement-box a:hover {
            text-decoration: underline;
        }

        /* Success State */
        .success-state {
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: inherit;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
            padding: 40px;
        }
        
        .success-state.show {
            opacity: 1;
            pointer-events: auto;
        }
        
        .success-ring {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #ecfdf5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            position: relative;
        }
        
        .success-ring::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 2px solid #059669;
            opacity: 0.3;
            animation: ringPulse 2s ease-out infinite;
        }
        
        @keyframes ringPulse {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(1.4); opacity: 0; }
        }
        
        .success-ring i {
            font-size: 40px;
            color: #059669;
            animation: checkPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s both;
        }
        
        @keyframes checkPop {
            from { transform: scale(0) rotate(-45deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        
        .success-title {
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            font-size: 24px;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .success-subtitle {
            font-size: 14px;
            color: #86868b;
            text-align: center;
            max-width: 300px;
            line-height: 1.6;
        }

        /* Toast */
        #toast {
            position: fixed;
            top: 80px;
            right: 16px;
            z-index: 9999;
            transform: translateX(calc(100% + 32px));
            transition: transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
            max-width: calc(100vw - 32px);
        }
        
        #toast.show { transform: translateX(0); }
        
        #toast .toast-inner {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border-radius: 16px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 280px;
            border: 1px solid rgba(0,0,0,0.06);
        }
        
        #toast .toast-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        
        .toast-success { background: #ecfdf5; color: #059669; }
        .toast-error { background: #fef2f2; color: #dc2626; }
        
        #toast .toast-text {
            font-size: 13px;
            font-weight: 600;
            flex-grow: 1;
            line-height: 1.4;
        }
        
        #toast .toast-close {
            color: #86868b;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            padding: 6px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }
        
        #toast .toast-close:hover {
            color: #1d1d1f;
            background: rgba(0,0,0,0.05);
        }

        /* Particles */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            animation: particleFly 1.2s ease-out forwards;
        }
        
        @keyframes particleFly {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 480px) {
            .step-question { font-size: 22px; }
            .cinematic-input { padding: 16px 18px; font-size: 16px; }
            .auth-card { padding: 32px 20px; min-height: 380px; }
        }
    </style>
</head>
<body class="antialiased">

    <!-- Ambient Background -->
    <div class="ambient-bg">
        <div class="ambient-orb"></div>
        <div class="ambient-orb"></div>
        <div class="ambient-orb"></div>
    </div>

    <div id="dynamic-header"></div>

    <main>
        <div class="cinematic-container">
            <!-- Progress Dots -->
            <div class="progress-wrapper" id="progress-wrapper">
                <div class="progress-dot active" data-step="0"></div>
                <div class="progress-dot" data-step="1"></div>
                <div class="progress-dot" data-step="2"></div>
                <div class="progress-dot" data-step="3"></div>
                <div class="progress-dot" data-step="4"></div>
                <div class="progress-dot" data-step="5"></div>
                <div class="progress-dot" data-step="6"></div>
            </div>

            <!-- Auth Card -->
            <div class="auth-card" id="auth-card">
                <div class="step-wrapper" id="step-wrapper"></div>
                
                <!-- Success State -->
                <div class="success-state" id="success-state">
                    <div class="success-ring">
                        <i class="fa-solid fa-check"></i>
                    </div>
                    <h2 class="success-title">Welcome to the family!</h2>
                    <p class="success-subtitle" id="success-message">Your account is ready. Taking you to your dashboard...</p>
                </div>
            </div>
        </div>
    </main>

    <div id="dynamic-footer"></div>

    <!-- Toast -->
    <div id="toast" role="alert" aria-live="polite">
        <div class="toast-inner">
            <div class="toast-icon" id="toast-icon"></div>
            <span class="toast-text" id="toast-text"></span>
            <button class="toast-close" onclick="hideToast()" aria-label="Close">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
    </div>

    <script src="/components.js"></script>

    <script>
        (function() {
            document.addEventListener('DOMContentLoaded', () => {
                if (window.JAYENWARE_FONTS) {
                    const root = document.documentElement;
                    for (const [key, value] of Object.entries(window.JAYENWARE_FONTS.cssVariables)) {
                        root.style.setProperty(key, value);
                    }
                }
            });

            window.addEventListener('load', () => setTimeout(initApp, 300));

            function initApp() {
                console.log('✨ Cinematic Signup Ready');
                
                let currentStep = 0;
                let isTransitioning = false;
                
                const formData = {
                    name: '', email: '', phone: '', password: '',
                    country: 'Bangladesh', state_province: '', city: '',
                    postal_code: '', street_address: '', apartment_house: '',
                    terms: false
                };

                const el = {
                    wrapper: document.getElementById('step-wrapper'),
                    progress: document.getElementById('progress-wrapper'),
                    success: document.getElementById('success-state'),
                    card: document.getElementById('auth-card'),
                    toast: document.getElementById('toast'),
                    toastIcon: document.getElementById('toast-icon'),
                    toastText: document.getElementById('toast-text')
                };

                const API_BASE = window.location.origin;
                let toastTimer;

                // Toast
                function showToast(text, type = 'success') {
                    if (!el.toast) return;
                    el.toastIcon.className = 'toast-icon ' + (type === 'success' ? 'toast-success' : 'toast-error');
                    el.toastIcon.innerHTML = type === 'success' ? '<i class="fa-solid fa-check"></i>' : '<i class="fa-solid fa-exclamation"></i>';
                    el.toastText.innerText = text;
                    el.toast.classList.add('show');
                    clearTimeout(toastTimer);
                    toastTimer = setTimeout(() => el.toast?.classList.remove('show'), 3500);
                }

                window.hideToast = () => {
                    el.toast?.classList.remove('show');
                    clearTimeout(toastTimer);
                };

                // Progress
                function updateProgress(step) {
                    el.progress.querySelectorAll('.progress-dot').forEach((dot, i) => {
                        dot.classList.remove('completed', 'active');
                        if (i < step) dot.classList.add('completed');
                        if (i === step) dot.classList.add('active');
                    });
                }

                // Step definitions
                const steps = [
                    {
                        emoji: '👋',
                        question: "What's your name?",
                        description: "We'd love to know who you are. This is how we'll address you.",
                        field: 'name',
                        type: 'text',
                        placeholder: 'Your full name',
                        autocomplete: 'name',
                        validate: v => v.trim().length >= 3 ? null : 'Name must be at least 3 characters',
                        hint: 'Enter your first and last name'
                    },
                    {
                        emoji: '📧',
                        question: "What's your email?",
                        description: "We'll send order confirmations and exclusive deals here.",
                        field: 'email',
                        type: 'email',
                        placeholder: 'you@example.com',
                        autocomplete: 'email',
                        validate: v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v) ? null : 'Please enter a valid email',
                        hint: 'We respect your privacy'
                    },
                    {
                        emoji: '📱',
                        question: "Your phone number?",
                        description: "For delivery updates and account recovery.",
                        field: 'phone',
                        type: 'tel',
                        placeholder: '01XXXXXXXXX',
                        autocomplete: 'tel-national',
                        validate: v => {
                            const c = v.replace(/[^\d+]/g, '');
                            return /^\+?88?01[3-9]\d{8}$/.test(c) ? null : 'Enter valid BD number';
                        },
                        hint: 'Bangladesh numbers only',
                        format: true
                    },
                    {
                        emoji: '🔐',
                        question: "Create a password",
                        description: "Make it strong! Use at least 8 characters.",
                        field: 'password',
                        type: 'password',
                        placeholder: 'Min 8 characters',
                        autocomplete: 'new-password',
                        validate: v => v.length >= 8 ? null : 'At least 8 characters',
                        hint: 'Store it safely'
                    },
                    {
                        emoji: '📍',
                        question: "Where are you?",
                        description: "We'll auto-detect your location or you can fill it manually.",
                        isLocation: true
                    },
                    {
                        emoji: '🏠',
                        question: "Delivery address",
                        description: "Help us find your doorstep for smooth deliveries.",
                        isAddress: true
                    },
                    {
                        emoji: '🎉',
                        question: "Almost done!",
                        description: "Just review and accept our terms.",
                        isTerms: true
                    }
                ];

                // Render step
                function renderStep(index) {
                    if (isTransitioning) return;
                    isTransitioning = true;
                    
                    const step = steps[index];
                    updateProgress(index);
                    
                    let html = '';
                    
                    if (step.isLocation) {
                        html = `
                            <div class="step-content">
                                <div class="step-emoji">${step.emoji}</div>
                                <h2 class="step-question">${step.question}</h2>
                                <p class="step-description">${step.description}</p>
                                
                                <button type="button" class="location-trigger" id="locate-btn">
                                    <i class="fa-solid fa-location-crosshairs"></i>
                                    <span>Auto-detect my location</span>
                                </button>
                                <div class="field-message hint" id="locate-status"></div>
                                
                                <div style="margin-bottom:12px;">
                                    <input type="text" class="cinematic-input" id="loc-country" placeholder="Country" value="${formData.country}">
                                </div>
                                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
                                    <input type="text" class="cinematic-input" id="loc-state" placeholder="State" value="${formData.state_province}">
                                    <input type="text" class="cinematic-input" id="loc-city" placeholder="City" value="${formData.city}">
                                </div>
                                <div class="field-message" id="loc-error"></div>
                                
                                <div class="nav-row">
                                    <button class="btn-back" onclick="goTo(${index - 1})">
                                        <i class="fa-solid fa-arrow-left"></i>
                                    </button>
                                    <button class="btn-next" onclick="validateLocation()">
                                        Continue <i class="fa-solid fa-arrow-right icon-arrow"></i>
                                    </button>
                                </div>
                            </div>`;
                    } else if (step.isAddress) {
                        html = `
                            <div class="step-content">
                                <div class="step-emoji">${step.emoji}</div>
                                <h2 class="step-question">${step.question}</h2>
                                <p class="step-description">${step.description}</p>
                                
                                <div style="margin-bottom:12px;">
                                    <input type="text" class="cinematic-input" id="addr-postal" placeholder="Postal Code" value="${formData.postal_code}">
                                </div>
                                <div style="margin-bottom:12px;">
                                    <input type="text" class="cinematic-input" id="addr-street" placeholder="Street address (Line 1)" value="${formData.street_address}">
                                </div>
                                <div style="margin-bottom:12px;">
                                    <input type="text" class="cinematic-input" id="addr-apt" placeholder="Apartment / House (Line 2)" value="${formData.apartment_house}">
                                </div>
                                <div class="field-message" id="addr-error"></div>
                                
                                <div class="nav-row">
                                    <button class="btn-back" onclick="goTo(${index - 1})">
                                        <i class="fa-solid fa-arrow-left"></i>
                                    </button>
                                    <button class="btn-next" onclick="validateAddress()">
                                        Continue <i class="fa-solid fa-arrow-right icon-arrow"></i>
                                    </button>
                                </div>
                            </div>`;
                    } else if (step.isTerms) {
                        html = `
                            <div class="step-content">
                                <div class="step-emoji">${step.emoji}</div>
                                <h2 class="step-question">${step.question}</h2>
                                <p class="step-description">${step.description}</p>
                                
                                <div class="agreement-box">
                                    <input type="checkbox" id="terms-check" ${formData.terms ? 'checked' : ''}>
                                    <label for="terms-check">
                                        I agree to the <a href="/privacy-policy" target="_blank">Privacy Policy</a> and <a href="/terms-and-conditions" target="_blank">Terms of Service</a>
                                    </label>
                                </div>
                                <div class="field-message" id="terms-error"></div>
                                
                                <div class="nav-row">
                                    <button class="btn-back" onclick="goTo(${index - 1})">
                                        <i class="fa-solid fa-arrow-left"></i>
                                    </button>
                                    <button class="btn-next" id="submit-btn" onclick="submitForm()">
                                        <i class="fa-solid fa-sparkles"></i> Create My Account
                                    </button>
                                </div>
                            </div>`;
                    } else {
                        html = `
                            <div class="step-content">
                                <div class="step-emoji">${step.emoji}</div>
                                <h2 class="step-question">${step.question}</h2>
                                <p class="step-description">${step.description}</p>
                                
                                <div class="input-container">
                                    <input type="${step.type}" class="cinematic-input" id="main-input" 
                                           placeholder="${step.placeholder}" 
                                           value="${formData[step.field] || ''}"
                                           autocomplete="${step.autocomplete}"
                                           autofocus>
                                </div>
                                <div class="field-message hint" id="field-hint">${step.hint || ''}</div>
                                <div class="field-message" id="field-error"></div>
                                
                                <div class="nav-row">
                                    ${index > 0 ? `
                                        <button class="btn-back" onclick="goTo(${index - 1})">
                                            <i class="fa-solid fa-arrow-left"></i>
                                        </button>
                                    ` : '<div></div>'}
                                    <button class="btn-next" onclick="validateField()">
                                        Continue <i class="fa-solid fa-arrow-right icon-arrow"></i>
                                    </button>
                                </div>
                            </div>`;
                    }
                    
                    el.wrapper.innerHTML = html;
                    
                    // Focus
                    setTimeout(() => {
                        const input = document.getElementById('main-input');
                        if (input) input.focus();
                    }, 150);
                    
                    // Attach enter key
                    const mainInput = document.getElementById('main-input');
                    if (mainInput) {
                        mainInput.addEventListener('keydown', e => {
                            if (e.key === 'Enter') validateField();
                        });
                    }
                    
                    // Format phone
                    if (step.format && mainInput) {
                        mainInput.addEventListener('input', function() {
                            let v = this.value.replace(/[^\d+]/g, '');
                            if (!v.startsWith('+') && v.length > 3 && !v.includes('-')) {
                                v = v.slice(0, 3) + '-' + v.slice(3);
                            }
                            this.value = v;
                        });
                    }
                    
                    // Location detection
                    if (step.isLocation) {
                        setTimeout(() => {
                            document.getElementById('locate-btn')?.addEventListener('click', detectLocation);
                        }, 200);
                    }
                    
                    // Glow effect
                    el.card.classList.add('glow');
                    setTimeout(() => el.card.classList.remove('glow'), 800);
                    
                    isTransitioning = false;
                }

                // Validate field
                window.validateField = function() {
                    const step = steps[currentStep];
                    const input = document.getElementById('main-input');
                    const value = input?.value || '';
                    const error = step.validate(value);
                    
                    const errorEl = document.getElementById('field-error');
                    const hintEl = document.getElementById('field-hint');
                    
                    if (error) {
                        if (input) {
                            input.classList.add('error');
                            setTimeout(() => input.classList.remove('error'), 600);
                        }
                        if (errorEl) {
                            errorEl.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> ${error}`;
                            errorEl.className = 'field-message error';
                        }
                        if (hintEl) hintEl.style.display = 'none';
                        return;
                    }
                    
                    // Success
                    if (input) input.classList.add('success');
                    formData[step.field] = value;
                    if (errorEl) errorEl.className = 'field-message';
                    if (hintEl) hintEl.style.display = 'block';
                    
                    setTimeout(() => {
                        if (input) input.classList.remove('success');
                        goTo(currentStep + 1);
                    }, 300);
                };

                // Validate location
                window.validateLocation = function() {
                    const country = document.getElementById('loc-country')?.value.trim();
                    const city = document.getElementById('loc-city')?.value.trim();
                    const errorEl = document.getElementById('loc-error');
                    
                    if (!country || !city) {
                        if (errorEl) {
                            errorEl.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Country and City are required';
                            errorEl.className = 'field-message error';
                        }
                        return;
                    }
                    
                    formData.country = country;
                    formData.state_province = document.getElementById('loc-state')?.value.trim() || '';
                    formData.city = city;
                    
                    if (errorEl) errorEl.className = 'field-message';
                    goTo(currentStep + 1);
                };

                // Validate address
                window.validateAddress = function() {
                    const street = document.getElementById('addr-street')?.value.trim();
                    const errorEl = document.getElementById('addr-error');
                    
                    if (!street) {
                        if (errorEl) {
                            errorEl.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Street address is required';
                            errorEl.className = 'field-message error';
                        }
                        return;
                    }
                    
                    formData.postal_code = document.getElementById('addr-postal')?.value.trim() || '';
                    formData.street_address = street;
                    formData.apartment_house = document.getElementById('addr-apt')?.value.trim() || '';
                    
                    if (errorEl) errorEl.className = 'field-message';
                    goTo(currentStep + 1);
                };

                // Navigate
                window.goTo = function(target) {
                    if (isTransitioning || target < 0 || target >= steps.length || target === currentStep) return;
                    currentStep = target;
                    renderStep(currentStep);
                };

                // Location detection
                async function detectLocation() {
                    if (!navigator.geolocation) {
                        showToast('Location not supported', 'error');
                        return;
                    }
                    
                    const btn = document.getElementById('locate-btn');
                    const status = document.getElementById('locate-status');
                    
                    btn.classList.add('loading');
                    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> <span>Detecting...</span>';
                    if (status) status.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Accessing GPS...';
                    
                    try {
                        const pos = await new Promise((res, rej) => {
                            navigator.geolocation.getCurrentPosition(res, rej, {
                                enableHighAccuracy: true, timeout: 15000, maximumAge: 0
                            });
                        });
                        
                        if (status) status.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Finding address...';
                        
                        const resp = await fetch(
                            `https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&addressdetails=1&accept-language=en`,
                            { headers: { 'User-Agent': 'JAYENWARE/1.0' } }
                        );
                        
                        if (!resp.ok) throw new Error('API error');
                        
                        const data = await resp.json();
                        const addr = data.address || {};
                        
                        document.getElementById('loc-country').value = addr.country || 'Bangladesh';
                        document.getElementById('loc-state').value = addr.state || '';
                        document.getElementById('loc-city').value = addr.city || addr.town || '';
                        
                        if (status) {
                            status.innerHTML = '<i class="fa-solid fa-circle-check"></i> Location detected! Fields auto-filled.';
                            status.className = 'field-message success';
                        }
                        
                        showToast('Location detected! ✨', 'success');
                        
                    } catch (err) {
                        if (status) {
                            status.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Could not detect. Please fill manually.';
                            status.className = 'field-message error';
                        }
                    } finally {
                        btn.classList.remove('loading');
                        btn.innerHTML = '<i class="fa-solid fa-location-crosshairs"></i> <span>Auto-detect my location</span>';
                    }
                }

                // Submit
                window.submitForm = async function() {
                    const checked = document.getElementById('terms-check')?.checked;
                    
                    if (!checked) {
                        const err = document.getElementById('terms-error');
                        if (err) {
                            err.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Please agree to continue';
                            err.className = 'field-message error';
                        }
                        return;
                    }
                    
                    formData.terms = true;
                    
                    const btn = document.getElementById('submit-btn');
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating...';
                    
                    try {
                        const resp = await fetch(`${API_BASE}/api/auth/signup`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                email: formData.email,
                                password: formData.password,
                                name: formData.name,
                                phone: formData.phone.replace(/[-\s()]/g, ''),
                                country: formData.country,
                                state_province: formData.state_province,
                                city: formData.city,
                                postal_code: formData.postal_code,
                                street_address: formData.street_address,
                                apartment_house: formData.apartment_house
                            })
                        });
                        
                        const result = await resp.json();
                        
                        if (!resp.ok) throw new Error(result.error || 'Registration failed');
                        
                        // Success!
                        document.getElementById('success-message').textContent = 
                            `Hey ${formData.name.split(' ')[0]}! Your account is ready. Taking you to your dashboard...`;
                        el.success.classList.add('show');
                        
                        spawnParticles();
                        
                        setTimeout(() => { window.location.href = '/account'; }, 2500);
                        
                    } catch (err) {
                        showToast(err.message || 'Something went wrong', 'error');
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fa-solid fa-sparkles"></i> Create My Account';
                    }
                };

                // Celebration particles
                function spawnParticles() {
                    const colors = ['#007aff', '#059669', '#c9a96e', '#f59e0b', '#8b5cf6', '#ec4899'];
                    const rect = el.card.getBoundingClientRect();
                    const cx = rect.left + rect.width / 2;
                    const cy = rect.top + rect.height / 2;
                    
                    for (let i = 0; i < 50; i++) {
                        const particle = document.createElement('div');
                        const angle = Math.random() * Math.PI * 2;
                        const distance = 80 + Math.random() * 250;
                        const tx = Math.cos(angle) * distance;
                        const ty = Math.sin(angle) * distance;
                        const size = 4 + Math.random() * 8;
                        const color = colors[Math.floor(Math.random() * colors.length)];
                        
                        particle.className = 'particle';
                        particle.style.cssText = `
                            left: ${cx}px;
                            top: ${cy}px;
                            width: ${size}px;
                            height: ${size}px;
                            border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
                            background: ${color};
                            --tx: ${tx}px;
                            --ty: ${ty}px;
                            animation-delay: ${Math.random() * 0.3}s;
                            animation-duration: ${0.8 + Math.random() * 1.2}s;
                        `;
                        
                        document.body.appendChild(particle);
                        setTimeout(() => particle.remove(), 1600);
                    }
                }

                // Init
                renderStep(0);
                
                document.addEventListener('click', e => {
                    if (el.toast?.classList.contains('show') && !el.toast.contains(e.target)) {
                        window.hideToast();
                    }
                });
            }
        })();
    </script>
</body>
</html>
