<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমাদের গল্প | Shohoj Bazaar</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts - Bengali -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            font-family: 'Hind Siliguri', sans-serif;
        }
        
        /* Custom Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .animate-fadeInUp {
            animation: fadeInUp 0.8s ease-out;
        }
        
        .animate-fadeInLeft {
            animation: fadeInLeft 0.8s ease-out;
        }
        
        .animate-fadeInRight {
            animation: fadeInRight 0.8s ease-out;
        }
        
        .animate-scaleIn {
            animation: scaleIn 0.6s ease-out;
        }
        
        /* Story Card Hover Effect */
        .story-card {
            transition: all 0.3s ease;
        }
        
        .story-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .story-card:hover .story-image img {
            transform: scale(1.05);
        }
        
        .story-image img {
            transition: transform 0.5s ease;
        }
        
        /* Gradient Overlay */
        .gradient-overlay {
            background: linear-gradient(to bottom, 
                rgba(0,0,0,0.1) 0%, 
                rgba(0,0,0,0.4) 50%, 
                rgba(0,0,0,0.8) 100%);
        }
        
        /* Loading Skeleton */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="bg-gray-50">
    
    <!-- ============================================ -->
    <!-- NAVIGATION (Include your existing navbar) -->
    <!-- ============================================ -->
    <div id="navbar-container"></div>
    
    <!-- ============================================ -->
    <!-- PAGE HEADER -->
    <!-- ============================================ -->
    <div class="bg-gradient-to-r from-green-600 to-green-700 py-16">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-4xl md:text-5xl font-bold text-white mb-4">
                আমাদের গল্প
            </h1>
            <p class="text-xl text-green-100 max-w-2xl mx-auto">
                সহজ বাজারের পথচলা, আমাদের স্বপ্ন, আমাদের অর্জন
            </p>
        </div>
    </div>
    
    <!-- ============================================ -->
    <!-- STORIES CONTAINER -->
    <!-- ============================================ -->
    <div id="stories-container" class="container mx-auto px-4 py-16">
        <!-- Loading State -->
        <div id="loading-state" class="space-y-12">
            <!-- 3 Skeleton Cards -->
            <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
                <div class="skeleton h-96"></div>
                <div class="p-8 space-y-4">
                    <div class="skeleton h-8 w-3/4 rounded"></div>
                    <div class="skeleton h-4 w-1/2 rounded"></div>
                    <div class="skeleton h-24 rounded"></div>
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
                <div class="skeleton h-96"></div>
                <div class="p-8 space-y-4">
                    <div class="skeleton h-8 w-3/4 rounded"></div>
                    <div class="skeleton h-4 w-1/2 rounded"></div>
                    <div class="skeleton h-24 rounded"></div>
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
                <div class="skeleton h-96"></div>
                <div class="p-8 space-y-4">
                    <div class="skeleton h-8 w-3/4 rounded"></div>
                    <div class="skeleton h-4 w-1/2 rounded"></div>
                    <div class="skeleton h-24 rounded"></div>
                </div>
            </div>
        </div>
        
        <!-- Stories Content -->
        <div id="stories-content" class="space-y-16 hidden">
            <!-- Dynamically loaded stories will appear here -->
        </div>
        
        <!-- Empty State -->
        <div id="empty-state" class="text-center py-20 hidden">
            <i class="fas fa-book-open text-6xl text-gray-300 mb-6"></i>
            <h2 class="text-2xl font-bold text-gray-600 mb-2">কোনো গল্প পাওয়া যায়নি</h2>
            <p class="text-gray-500">শীঘ্রই আমাদের গল্প এখানে প্রকাশিত হবে</p>
        </div>
        
        <!-- Error State -->
        <div id="error-state" class="text-center py-20 hidden">
            <i class="fas fa-exclamation-triangle text-6xl text-red-300 mb-6"></i>
            <h2 class="text-2xl font-bold text-red-600 mb-2">ডেটা লোড করতে সমস্যা হচ্ছে</h2>
            <p class="text-gray-500 mb-4">পুনরায় চেষ্টা করুন</p>
            <button onclick="loadStories()" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition">
                <i class="fas fa-sync-alt mr-2"></i> আবার চেষ্টা করুন
            </button>
        </div>
    </div>
    
    <!-- ============================================ -->
    <!-- FOOTER (Include your existing footer) -->
    <!-- ============================================ -->
    <div id="footer-container"></div>
    
    <!-- ============================================ -->
    <!-- SCRIPTS -->
    <!-- ============================================ -->
    <script>
        // Configuration
        const API_BASE_URL = window.location.origin;
        
        // ============================================
        // LOAD STORIES
        // ============================================
        async function loadStories() {
            const loadingState = document.getElementById('loading-state');
            const storiesContent = document.getElementById('stories-content');
            const emptyState = document.getElementById('empty-state');
            const errorState = document.getElementById('error-state');
            
            // Show loading
            loadingState.classList.remove('hidden');
            storiesContent.classList.add('hidden');
            emptyState.classList.add('hidden');
            errorState.classList.add('hidden');
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/stories`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const stories = await response.json();
                
                // Hide loading
                loadingState.classList.add('hidden');
                
                if (stories.length === 0) {
                    // Show empty state
                    emptyState.classList.remove('hidden');
                    return;
                }
                
                // Render stories
                renderStories(stories);
                storiesContent.classList.remove('hidden');
                
            } catch (error) {
                console.error('Error loading stories:', error);
                loadingState.classList.add('hidden');
                errorState.classList.remove('hidden');
            }
        }
        
        // ============================================
        // RENDER STORIES
        // ============================================
        function renderStories(stories) {
            const container = document.getElementById('stories-content');
            container.innerHTML = '';
            
            stories.forEach((story, index) => {
                const storyCard = createStoryCard(story, index);
                container.appendChild(storyCard);
            });
            
            // Initialize Intersection Observer for animations
            initializeAnimations();
        }
        
        // ============================================
        // CREATE STORY CARD
        // ============================================
        function createStoryCard(story, index) {
            const card = document.createElement('div');
            card.className = 'story-card bg-white rounded-2xl shadow-lg overflow-hidden opacity-0 transform translate-y-8';
            card.setAttribute('data-animate', 'true');
            
            const isEven = index % 2 === 0;
            
            // Main card content
            card.innerHTML = `
                <!-- Header Section -->
                ${story.header_image ? `
                <div class="relative story-image overflow-hidden">
                    <img src="${story.header_image}" 
                         alt="${story.header_title || 'Story Image'}" 
                         class="w-full h-64 md:h-96 object-cover"
                         onerror="this.src='https://via.placeholder.com/1200x400?text=Story+Image'">
                    <div class="absolute inset-0 gradient-overlay"></div>
                    <div class="absolute bottom-0 left-0 right-0 p-8 text-white">
                        <h2 class="text-3xl md:text-4xl font-bold mb-2">${story.header_title || ''}</h2>
                        ${story.header_subtitle ? `<p class="text-xl opacity-90">${story.header_subtitle}</p>` : ''}
                    </div>
                </div>
                ` : `
                <div class="bg-gradient-to-r from-green-500 to-green-600 p-12 text-white">
                    <h2 class="text-3xl md:text-4xl font-bold mb-2">${story.header_title || ''}</h2>
                    ${story.header_subtitle ? `<p class="text-xl opacity-90">${story.header_subtitle}</p>` : ''}
                </div>
                `}
                
                <!-- Content Section -->
                <div class="p-8 md:p-12">
                    <div class="flex flex-col ${isEven ? 'md:flex-row' : 'md:flex-row-reverse'} gap-8 items-center">
                        
                        <!-- Section Image -->
                        ${story.section_image ? `
                        <div class="flex-shrink-0 w-full md:w-1/2">
                            <img src="${story.section_image}" 
                                 alt="${story.section_title || 'Section Image'}" 
                                 class="w-full h-64 md:h-80 object-cover rounded-xl shadow-md"
                                 onerror="this.src='https://via.placeholder.com/600x400?text=Section+Image'">
                        </div>
                        ` : ''}
                        
                        <!-- Section Text Content -->
                        <div class="${story.section_image ? 'w-full md:w-1/2' : 'w-full'} space-y-4">
                            ${story.section_title ? `
                            <h3 class="text-2xl md:text-3xl font-bold text-gray-800">
                                ${story.section_title}
                            </h3>
                            ` : ''}
                            
                            ${story.section_subtitle ? `
                            <p class="text-lg text-green-600 font-semibold">
                                ${story.section_subtitle}
                            </p>
                            ` : ''}
                            
                            ${story.section_description ? `
                            <div class="text-gray-600 leading-relaxed space-y-3">
                                ${story.section_description.split('\n').map(para => 
                                    para.trim() ? `<p>${para}</p>` : ''
                                ).join('')}
                            </div>
                            ` : ''}
                            
                            <!-- CTA Button -->
                            ${story.cta_text ? `
                            <div class="pt-4">
                                <a href="${story.cta_link || '#'}" 
                                   class="inline-flex items-center gap-2 bg-green-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-green-700 transition transform hover:scale-105">
                                    ${story.cta_text}
                                    <i class="fas fa-arrow-right"></i>
                                </a>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
                
                <!-- Additional Info (Created Date) -->
                ${story.created_at ? `
                <div class="border-t border-gray-100 px-8 py-4 bg-gray-50">
                    <div class="flex items-center gap-2 text-sm text-gray-500">
                        <i class="far fa-calendar-alt"></i>
                        <span>${formatDate(story.created_at)}</span>
                    </div>
                </div>
                ` : ''}
            `;
            
            return card;
        }
        
        // ============================================
        // INTERSECTION OBSERVER FOR ANIMATIONS
        // ============================================
        function initializeAnimations() {
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach((entry, index) => {
                    if (entry.isIntersecting) {
                        const element = entry.target;
                        
                        // Add animation with delay based on index
                        setTimeout(() => {
                            element.style.transition = 'all 0.8s ease-out';
                            element.style.opacity = '1';
                            element.style.transform = 'translateY(0)';
                        }, index * 200);
                        
                        observer.unobserve(element);
                    }
                });
            }, observerOptions);
            
            // Observe all story cards
            document.querySelectorAll('[data-animate="true"]').forEach(card => {
                observer.observe(card);
            });
        }
        
        // ============================================
        // FORMAT DATE
        // ============================================
        function formatDate(dateString) {
            const options = { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            };
            
            try {
                const date = new Date(dateString);
                // Bengali date formatting
                return date.toLocaleDateString('bn-BD', options);
            } catch (error) {
                return dateString;
            }
        }
        
        // ============================================
        // LOAD COMMON COMPONENTS (Navbar & Footer)
        // ============================================
        async function loadCommonComponents() {
            try {
                // If you have separate navbar/footer files
                const [navbarResponse, footerResponse] = await Promise.all([
                    fetch('/components/navbar.html'),
                    fetch('/components/footer.html')
                ]);
                
                if (navbarResponse.ok) {
                    const navbarHtml = await navbarResponse.text();
                    document.getElementById('navbar-container').innerHTML = navbarHtml;
                }
                
                if (footerResponse.ok) {
                    const footerHtml = await footerResponse.text();
                    document.getElementById('footer-container').innerHTML = footerHtml;
                }
            } catch (error) {
                console.warn('Could not load navbar/footer:', error);
                // Fallback simple navbar
                document.getElementById('navbar-container').innerHTML = `
                    <nav class="bg-white shadow-md">
                        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
                            <a href="/" class="text-2xl font-bold text-green-600">Shohoj Bazaar</a>
                            <div class="space-x-4">
                                <a href="/" class="text-gray-600 hover:text-green-600">হোম</a>
                                <a href="/category" class="text-gray-600 hover:text-green-600">ক্যাটাগরি</a>
                                <a href="/story.html" class="text-green-600 font-semibold">আমাদের গল্প</a>
                            </div>
                        </div>
                    </nav>
                `;
            }
        }
        
        // ============================================
        // INITIALIZE PAGE
        // ============================================
        async function initializePage() {
            // Load common components first
            await loadCommonComponents();
            
            // Load stories
            await loadStories();
        }
        
        // Start when DOM is ready
        document.addEventListener('DOMContentLoaded', initializePage);
    </script>
</body>
</html>
