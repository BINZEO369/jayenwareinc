<!DOCTYPE html>
<html lang="bn-BD" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title id="page-title">আমাদের গল্প | JAYENWARE</title>
  <meta name="description" content="জেনে নিন Jayenware-এর পথচলার গল্প, আমাদের স্বপ্ন ও অর্জনের ইতিহাস।" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="canonical" id="canonical-url" href="https://www.jayenware.shop/story" />
  <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />

  <script src="/fonts.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1d1d1f',
            accent: '#86868b',
            soft: '#f5f5f7',
            blue: '#007aff'
          },
          fontFamily: {
            sans: ["'Inter', 'sans-serif'"],
            serif: ["'Manrope', 'sans-serif'"],
            mono: ["'Sora', 'sans-serif'"]
          }
        }
      }
    }
  </script>

  <style>
    :root {
      --primary: #1d1d1f;
      --accent: #86868b;
      --soft: #f5f5f7;
      --blue: #007aff;
    }
    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }
    body {
      background-color: #ffffff;
      color: #1d1d1f;
      overflow-x: hidden;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }
    img {
      max-width: 100%;
      height: auto;
      display: block;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 13px;
      color: var(--accent);
      padding: 16px 0;
    }
    .breadcrumb a {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .breadcrumb a:hover { color: var(--primary); }
    .breadcrumb .current { color: var(--primary); font-weight: 600; }

    .page-header {
      position: relative;
      width: 100vw;
      height: 60vh;
      min-height: 360px;
      max-height: 550px;
      overflow: hidden;
      background: #000;
      margin-bottom: 48px;
      margin-left: calc(-50vw + 50%);
      margin-right: calc(-50vw + 50%);
      left: 0;
      right: 0;
      display: none;
    }
    .page-header.visible { display: block; }
    @media (max-width: 768px) {
      .page-header { height: 50vh; min-height: 300px; max-height: 420px; margin-bottom: 36px; }
    }
    @media (max-width: 480px) {
      .page-header { height: 45vh; min-height: 260px; margin-bottom: 28px; }
    }
    .page-header .header-bg-img {
      position: absolute; 
      inset: 0; 
      width: 100%; 
      height: 100%; 
      object-fit: cover;
      object-position: center;
      animation: headerZoom 20s ease-in-out infinite alternate;
    }
    @keyframes headerZoom { from { transform: scale(1); } to { transform: scale(1.05); } }
    .page-header .header-overlay {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.05) 30%, rgba(0,0,0,0.25) 60%, rgba(0,0,0,0.6) 85%, rgba(0,0,0,0.75) 100%);
    }
    .page-header .header-content {
      position: absolute; bottom: clamp(40px, 10vh, 80px); left: 50%; transform: translateX(-50%); z-index: 2;
      text-align: center; width: 88%; max-width: 680px; padding: 0 16px;
    }
    .page-header .header-label {
      display: none;
      font-family: 'Inter', sans-serif; font-size: clamp(7px, 1vw, 9px); font-weight: 500;
      letter-spacing: 0.45em; text-transform: uppercase; color: rgba(255, 255, 255, 0.6);
      margin-bottom: clamp(12px, 2vh, 20px);
      opacity: 0; transform: translateY(8px);
      animation: heroFadeInUp 0.9s cubic-bezier(0.22, 0.61, 0.36, 1) 0.15s forwards;
    }
    .page-header .header-label.has-content { display: inline-block; }
    .page-header .header-title {
      font-family: 'Manrope', sans-serif; font-size: clamp(22px, 4.5vw, 56px); font-weight: 900;
      line-height: 1.1; color: #ffffff; margin: 0; letter-spacing: -0.01em;
      opacity: 0; transform: translateY(12px);
      animation: heroFadeInUp 0.9s cubic-bezier(0.22, 0.61, 0.36, 1) 0.3s forwards;
    }
    @keyframes heroFadeInUp { to { opacity: 1; transform: translateY(0); } }

    .story-card {
      opacity: 0;
      transform: translateY(40px);
      transition: all 0.8s cubic-bezier(0.22, 0.61, 0.36, 1);
      margin-bottom: 80px;
    }
    .story-card.visible {
      opacity: 1;
      transform: translateY(0);
    }
    @media (max-width: 768px) {
      .story-card { margin-bottom: 48px; }
    }
    @media (max-width: 480px) {
      .story-card { margin-bottom: 36px; }
    }

    .story-card .story-image-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      max-height: 560px;
      overflow: hidden;
      border-radius: 12px;
      background: #f0f0f0;
      margin-bottom: 32px;
      display: none;
    }
    .story-card .story-image-wrap.has-image { display: block; }
    @media (max-width: 768px) {
      .story-card .story-image-wrap { border-radius: 8px; margin-bottom: 24px; }
    }
    @media (max-width: 480px) {
      .story-card .story-image-wrap { aspect-ratio: 4/3; border-radius: 6px; margin-bottom: 20px; }
    }
    .story-card .story-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transition: transform 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    @media (hover: hover) {
      .story-card:hover .story-image-wrap img {
        transform: scale(1.03);
      }
    }

    .story-card .story-content-wrap {
      display: flex;
      flex-direction: row;
      gap: 48px;
      align-items: flex-start;
    }
    @media (max-width: 768px) {
      .story-card .story-content-wrap { flex-direction: column; gap: 24px; }
    }
    .story-card .story-text-col {
      flex: 1;
      min-width: 0;
    }
    .story-card .story-side-col {
      flex-shrink: 0;
      width: 280px;
      display: none;
    }
    .story-card .story-side-col.has-image { display: block; }
    @media (max-width: 768px) {
      .story-card .story-side-col { width: 100%; }
    }

    .story-card .story-label {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: var(--accent);
      margin-bottom: 12px;
    }
    .story-card .story-title {
      font-family: 'Manrope', sans-serif;
      font-size: clamp(24px, 3.5vw, 40px);
      font-weight: 800;
      line-height: 1.15;
      color: var(--primary);
      margin: 0 0 16px 0;
      letter-spacing: -0.02em;
    }
    .story-card .story-subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .story-card .story-description {
      font-size: 15px;
      line-height: 1.85;
      color: #4a4a4f;
      font-weight: 400;
    }
    .story-card .story-description p {
      margin-bottom: 16px;
    }
    .story-card .story-description p:last-child {
      margin-bottom: 0;
    }

    .story-card .story-side-image {
      width: 100%;
      aspect-ratio: 3/4;
      border-radius: 10px;
      overflow: hidden;
      background: #f5f5f7;
    }
    @media (max-width: 768px) {
      .story-card .story-side-image { aspect-ratio: 16/9; max-height: 360px; border-radius: 8px; }
    }
    .story-card .story-side-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transition: transform 0.6s ease;
    }
    @media (hover: hover) {
      .story-card:hover .story-side-image img {
        transform: scale(1.05);
      }
    }

    .story-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 28px;
      padding: 12px 28px;
      background: var(--primary);
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 50px;
      transition: all 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
      border: none;
      cursor: pointer;
    }
    .story-cta:hover {
      background: #333;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      gap: 12px;
    }
    .story-cta .cta-arrow {
      transition: transform 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .story-cta:hover .cta-arrow {
      transform: translateX(4px);
    }
    @media (max-width: 480px) {
      .story-cta { width: 100%; justify-content: center; padding: 14px 24px; font-size: 14px; }
    }

    .story-divider {
      width: 100%;
      height: 1px;
      background: #e5e5ea;
      margin: 0 0 64px 0;
    }
    @media (max-width: 768px) {
      .story-divider { margin-bottom: 40px; }
    }
    @media (max-width: 480px) {
      .story-divider { margin-bottom: 28px; }
    }

    .story-date {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 20px;
    }
    .story-date i {
      font-size: 13px;
    }

    .error-state { text-align: center; padding: 80px 20px; display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; }
    .error-state i { font-size: 64px; color: #d1d1d6; margin-bottom: 24px; }
    .error-state h2 { font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 12px; font-family: 'Manrope', sans-serif; }
    .error-state p { font-size: 15px; color: var(--accent); max-width: 480px; margin: 0 auto 28px; line-height: 1.7; }
    .error-state .btn-primary { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; background: var(--primary); color: #fff; border-radius: 50px; font-size: 14px; font-weight: 600; text-decoration: none; transition: all 0.3s ease; border: none; cursor: pointer; }
    .error-state .btn-primary:hover { background: #333; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }

    .empty-state { text-align: center; padding: 80px 20px; display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; }
    .empty-state i { font-size: 56px; color: #d1d1d6; margin-bottom: 24px; }
    .empty-state h3 { font-size: 24px; font-weight: 700; color: var(--primary); margin-bottom: 12px; font-family: 'Manrope', sans-serif; }
    .empty-state p { font-size: 15px; color: var(--accent); max-width: 420px; margin: 0 auto 20px; line-height: 1.6; }

    .back-to-top { position: fixed; bottom: 28px; right: 28px; width: 48px; height: 48px; border-radius: 50%; background: var(--primary); color: #fff; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 50; opacity: 0; transform: translateY(20px); transition: all 0.35s cubic-bezier(0.25, 0.1, 0.25, 1); box-shadow: 0 6px 24px rgba(0,0,0,0.2); pointer-events: none; }
    .back-to-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .back-to-top:active { transform: scale(0.9); }
    @media (hover: hover) { .back-to-top:hover { background: #333; transform: translateY(-3px); box-shadow: 0 10px 32px rgba(0,0,0,0.25); } }
    @media (max-width: 768px) { .back-to-top { bottom: 20px; right: 20px; width: 44px; height: 44px; } }
  </style>
</head>
<body class="antialiased">

            <div class="story-text-col">
              <div class="skeleton" style="height:10px;width:25%;margin-bottom:16px;"></div>
              <div class="skeleton" style="height:32px;width:60%;margin-bottom:12px;"></div>
              <div class="skeleton" style="height:16px;width:40%;margin-bottom:20px;"></div>
              <div class="skeleton" style="height:14px;width:100%;margin-bottom:8px;"></div>
              <div class="skeleton" style="height:14px;width:100%;margin-bottom:8px;"></div>
              <div class="skeleton" style="height:14px;width:75%;margin-bottom:8px;"></div>
            </div>
            <div class="story-side-col">
              <div class="skeleton" style="aspect-ratio:3/4;border-radius:10px;"></div>
            </div>
          </div>
        </div>
        <div class="story-divider"></div>
        <div class="story-card">
          <div class="story-image-wrap skeleton"></div>
          <div class="story-content-wrap">
            <div class="story-text-col">
              <div class="skeleton" style="height:10px;width:25%;margin-bottom:16px;"></div>
              <div class="skeleton" style="height:32px;width:60%;margin-bottom:12px;"></div>
              <div class="skeleton" style="height:16px;width:40%;margin-bottom:20px;"></div>
              <div class="skeleton" style="height:14px;width:100%;margin-bottom:8px;"></div>
              <div class="skeleton" style="height:14px;width:100%;margin-bottom:8px;"></div>
              <div class="skeleton" style="height:14px;width:75%;margin-bottom:8px;"></div>
            </div>
            <div class="story-side-col">
              <div class="skeleton" style="aspect-ratio:3/4;border-radius:10px;"></div>

      <div id="stories-content" style="display:none;"></div>

  </main>

  <div id="dynamic-footer"></div>

  <button class="back-to-top" id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Back to top">
    <i class="fa-solid fa-arrow-up"></i>
  </button>

  <script src="/components.js"></script>

  <script>
    (function() {
      const API_BASE = window.location.origin;

      function formatDate(dateString) {
        if (!dateString) return '';
        try {
          const date = new Date(dateString);
          const options = { year: 'numeric', month: 'long', day: 'numeric' };
          return date.toLocaleDateString('bn-BD', options);
        } catch (e) {
          return dateString;
        }
      }

      function escapeHTML(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      async function fetchStories() {
        const response = await fetch(`${API_BASE}/api/stories`, {
          headers: { 'Accept': 'application/json' }
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        return data || [];
      }

      function showSkeleton() {
        document.getElementById('skeleton-container').style.display = 'block';
        document.getElementById('stories-content').style.display = 'none';
        document.getElementById('error-state').style.display = 'none';
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('page-header').classList.remove('visible');
      }

      function showError() {
        document.getElementById('skeleton-container').style.display = 'none';
        document.getElementById('stories-content').style.display = 'none';
        document.getElementById('error-state').style.display = 'flex';
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('page-header').classList.remove('visible');
      }

      function showEmpty() {
        document.getElementById('skeleton-container').style.display = 'none';
        document.getElementById('stories-content').style.display = 'none';
        document.getElementById('error-state').style.display = 'none';
        document.getElementById('empty-state').style.display = 'flex';
        document.getElementById('page-header').classList.remove('visible');
      }

      function updatePageHeader(stories) {
        const pageHeader = document.getElementById('page-header');
        const headerImg = document.getElementById('header-bg-img');
        const headerLabel = document.getElementById('header-label');
        const headerTitle = document.getElementById('header-main-title');

        const heroStory = stories.find(function(s) { return s.header_image; }) || stories[0];

        if (heroStory && heroStory.header_image) {
          headerImg.src = heroStory.header_image;
          headerImg.alt = heroStory.header_title || '';
          headerImg.style.display = 'block';
          headerImg.onerror = function() {
            this.style.display = 'none';
          };
        } else {
          headerImg.style.display = 'none';
        }

        if (heroStory && heroStory.header_subtitle) {
          headerLabel.textContent = heroStory.header_subtitle;
          headerLabel.classList.add('has-content');
        } else {
          headerLabel.textContent = '';
          headerLabel.classList.remove('has-content');
        }

        headerTitle.textContent = heroStory && heroStory.header_title ? heroStory.header_title : '';

        pageHeader.classList.add('visible');
      }

      function renderStories(stories) {
        document.getElementById('skeleton-container').style.display = 'none';
        document.getElementById('error-state').style.display = 'none';
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('stories-content').style.display = 'block';

        updatePageHeader(stories);

        var container = document.getElementById('stories-content');
        container.innerHTML = '';

        stories.forEach(function(story, index) {
          var wrapper = createStoryCard(story, index);
          container.appendChild(wrapper);
        });

        initScrollAnimations();

        var dividers = container.querySelectorAll('.story-divider');
        if (dividers.length > 0) {
          dividers[dividers.length - 1].style.display = 'none';
        }
      }

      function createStoryCard(story, index) {
        var card = document.createElement('div');
        card.className = 'story-card';
        card.setAttribute('data-story-index', index);
        card.setAttribute('data-animate', 'true');

        var hasSectionImage = !!story.section_image;
        var hasHeaderImage = !!story.header_image;
        var hasCTA = !!(story.cta_text && story.cta_link);

        var html = '';

        if (hasHeaderImage) {
          html += '<div class="story-image-wrap has-image">';
          html += '<img src="' + escapeHTML(story.header_image) + '" alt="' + escapeHTML(story.header_title || '') + '" loading="' + (index < 2 ? 'eager' : 'lazy') + '" onerror="this.parentElement.classList.remove(\'has-image\');" />';
          html += '</div>';
        }

        html += '<div class="story-content-wrap">';
        html += '<div class="story-text-col">';

        if (story.created_at) {
          html += '<div class="story-date"><i class="fa-regular fa-calendar"></i><span>' + formatDate(story.created_at) + '</span></div>';
        }

        if (!hasHeaderImage && story.header_title) {
          html += '<h2 class="story-title">' + escapeHTML(story.header_title) + '</h2>';
        }

        if (story.header_subtitle) {
          html += '<p class="story-label">' + escapeHTML(story.header_subtitle) + '</p>';
        }

        if (story.section_title) {
          html += '<h2 class="story-title">' + escapeHTML(story.section_title) + '</h2>';
        }

        if (story.section_subtitle) {
          html += '<p class="story-subtitle">' + escapeHTML(story.section_subtitle) + '</p>';
        }

        if (story.section_description) {
          var paragraphs = story.section_description.split('\n').filter(function(p) { return p.trim(); }).map(function(p) {
            return '<p>' + escapeHTML(p.trim()) + '</p>';
          }).join('');
          html += '<div class="story-description">' + paragraphs + '</div>';
        }

        if (hasCTA) {
          html += '<a href="' + escapeHTML(story.cta_link) + '" class="story-cta">' + escapeHTML(story.cta_text) + '<span class="cta-arrow"><i class="fa-solid fa-arrow-right"></i></span></a>';
        }

        html += '</div>';

        if (hasSectionImage) {
          html += '<div class="story-side-col has-image">';
          html += '<div class="story-side-image"><img src="' + escapeHTML(story.section_image) + '" alt="' + escapeHTML(story.section_title || '') + '" loading="lazy" onerror="this.parentElement.parentElement.classList.remove(\'has-image\');" /></div>';
          html += '</div>';
        }

        html += '</div>';

        card.innerHTML = html;

        var divider = document.createElement('div');
        divider.className = 'story-divider';

        var wrapper = document.createElement('div');
        wrapper.appendChild(card);
        wrapper.appendChild(divider);

        return wrapper;
      }

      function initScrollAnimations() {
        var observerOptions = {
          threshold: 0.15,
          rootMargin: '0px 0px -30px 0px'
        };

        var observer = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
              observer.unobserve(entry.target);
            }
          });
        }, observerOptions);

        document.querySelectorAll('[data-animate="true"]').forEach(function(card, index) {
          card.style.transitionDelay = (index * 0.1) + 's';
          observer.observe(card);
        });
      }

      function initBackToTop() {
        var btn = document.getElementById('back-to-top');
        var ticking = false;
        window.addEventListener('scroll', function() {
          if (!ticking) {
            requestAnimationFrame(function() {
              if (window.scrollY > 500) {
                btn.classList.add('visible');
              } else {
                btn.classList.remove('visible');
              }
              ticking = false;
            });
            ticking = true;
          }
        }, { passive: true });
      }

      async function loadStories() {
        showSkeleton();
        try {
          var stories = await fetchStories();
          if (!stories || stories.length === 0) {
            showEmpty();
            return;
          }
          renderStories(stories);
        } catch (error) {
          console.error('Failed to load stories:', error);
          showError();
        }
      }

      window.loadStories = loadStories;

      document.addEventListener('DOMContentLoaded', function() {
        if (window.JAYENWARE_FONTS) {
          var root = document.documentElement;
          var vars = window.JAYENWARE_FONTS.cssVariables;
          for (var key in vars) {
            if (vars.hasOwnProperty(key)) {
              root.style.setProperty(key, vars[key]);
            }
          }
        }
        initBackToTop();
        loadStories();
      });
    })();
  </script>
</body>
</html>
