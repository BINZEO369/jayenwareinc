<!DOCTYPE html>
<html lang="bn-BD" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title id="page-title">আমাদের গল্প | JAYENWARE</title>
  <meta name="description" content="জেনে নিন Jayenware-এর পথচলার গল্প, আমাদের স্বপ্ন ও অর্জনের ইতিহাস।" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="canonical" id="canonical-url" href="https://www.jayenware.shop/story" />
  <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />

  <script src="/fonts.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1d1d1f',
            accent: '#86868b',
            soft: '#f5f5f7',
            blue: '#007aff'
          },
          fontFamily: {
            sans: ["'Inter', 'sans-serif'"],
            serif: ["'Manrope', 'sans-serif'"],
            mono: ["'Sora', 'sans-serif'"]
          }
        }
      }
    }
  </script>

  <style>
    :root {
      --primary: #1d1d1f;
      --accent: #86868b;
      --soft: #f5f5f7;
      --blue: #007aff;
    }
    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }
    body {
      background-color: #ffffff;
      color: #1d1d1f;
      overflow-x: hidden;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }
    img {
      max-width: 100%;
      height: auto;
      display: block;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Skeleton Loading */
    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    /* Breadcrumb */
    .breadcrumb {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 13px;
      color: var(--accent);
      padding: 16px 0;
    }
    .breadcrumb a {
      color: var(--accent);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .breadcrumb a:hover { color: var(--primary); }
    .breadcrumb .current { color: var(--primary); font-weight: 600; }

    /* Page Header */
    .page-header {
      position: relative;
      width: 100vw;
      height: 60vh;
      min-height: 360px;
      max-height: 550px;
      overflow: hidden;
      background: #000;
      margin-bottom: 48px;
      margin-left: calc(-50vw + 50%);
      margin-right: calc(-50vw + 50%);
      left: 0;
      right: 0;
    }
    @media (max-width: 768px) {
      .page-header { height: 50vh; min-height: 300px; max-height: 420px; margin-bottom: 36px; }
    }
    @media (max-width: 480px) {
      .page-header { height: 45vh; min-height: 260px; margin-bottom: 28px; }
    }
    .page-header .header-bg-img {
      position: absolute; 
      inset: 0; 
      width: 100%; 
      height: 100%; 
      object-fit: cover;
      object-position: center;
      animation: headerZoom 20s ease-in-out infinite alternate;
    }
    @keyframes headerZoom { from { transform: scale(1); } to { transform: scale(1.05); } }
    .page-header .header-overlay {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.05) 30%, rgba(0,0,0,0.25) 60%, rgba(0,0,0,0.6) 85%, rgba(0,0,0,0.75) 100%);
    }
    .page-header .header-content {
      position: absolute; bottom: clamp(40px, 10vh, 80px); left: 50%; transform: translateX(-50%); z-index: 2;
      text-align: center; width: 88%; max-width: 680px; padding: 0 16px;
    }
    .page-header .header-label {
      display: inline-block;
      font-family: 'Inter', sans-serif; font-size: clamp(7px, 1vw, 9px); font-weight: 500;
      letter-spacing: 0.45em; text-transform: uppercase; color: rgba(255, 255, 255, 0.6);
      margin-bottom: clamp(12px, 2vh, 20px);
      opacity: 0; transform: translateY(8px);
      animation: heroFadeInUp 0.9s cubic-bezier(0.22, 0.61, 0.36, 1) 0.15s forwards;
    }
    .page-header .header-title {
      font-family: 'Manrope', sans-serif; font-size: clamp(22px, 4.5vw, 56px); font-weight: 900;
      line-height: 1.1; color: #ffffff; margin: 0; letter-spacing: -0.01em;
      opacity: 0; transform: translateY(12px);
      animation: heroFadeInUp 0.9s cubic-bezier(0.22, 0.61, 0.36, 1) 0.3s forwards;
    }
    @keyframes heroFadeInUp { to { opacity: 1; transform: translateY(0); } }

    /* Story Cards */
    .story-card {
      opacity: 0;
      transform: translateY(40px);
      transition: all 0.8s cubic-bezier(0.22, 0.61, 0.36, 1);
      margin-bottom: 80px;
    }
    .story-card.visible {
      opacity: 1;
      transform: translateY(0);
    }
    @media (max-width: 768px) {
      .story-card { margin-bottom: 48px; }
    }
    @media (max-width: 480px) {
      .story-card { margin-bottom: 36px; }
    }

    .story-card .story-image-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      max-height: 560px;
      overflow: hidden;
      border-radius: 12px;
      background: #f0f0f0;
      margin-bottom: 32px;
    }
    @media (max-width: 768px) {
      .story-card .story-image-wrap { border-radius: 8px; margin-bottom: 24px; }
    }
    @media (max-width: 480px) {
      .story-card .story-image-wrap { aspect-ratio: 4/3; border-radius: 6px; margin-bottom: 20px; }
    }
    .story-card .story-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transition: transform 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    @media (hover: hover) {
      .story-card:hover .story-image-wrap img {
        transform: scale(1.03);
      }
    }

    .story-card .story-content-wrap {
      display: flex;
      flex-direction: row;
      gap: 48px;
      align-items: flex-start;
    }
    @media (max-width: 768px) {
      .story-card .story-content-wrap { flex-direction: column; gap: 24px; }
    }
    .story-card .story-text-col {
      flex: 1;
      min-width: 0;
    }
    .story-card .story-side-col {
      flex-shrink: 0;
      width: 280px;
    }
    @media (max-width: 768px) {
      .story-card .story-side-col { width: 100%; }
    }

    .story-card .story-label {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: var(--accent);
      margin-bottom: 12px;
    }
    .story-card .story-title {
      font-family: 'Manrope', sans-serif;
      font-size: clamp(24px, 3.5vw, 40px);
      font-weight: 800;
      line-height: 1.15;
      color: var(--primary);
      margin: 0 0 16px 0;
      letter-spacing: -0.02em;
    }
    .story-card .story-subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .story-card .story-description {
      font-size: 15px;
      line-height: 1.85;
      color: #4a4a4f;
      font-weight: 400;
    }
    .story-card .story-description p {
      margin-bottom: 16px;
    }
    .story-card .story-description p:last-child {
      margin-bottom: 0;
    }

    /* Side Image */
    .story-card .story-side-image {
      width: 100%;
      aspect-ratio: 3/4;
      border-radius: 10px;
      overflow: hidden;
      background: #f5f5f7;
    }
    @media (max-width: 768px) {
      .story-card .story-side-image { aspect-ratio: 16/9; max-height: 360px; border-radius: 8px; }
    }
    .story-card .story-side-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transition: transform 0.6s ease;
    }
    @media (hover: hover) {
      .story-card:hover .story-side-image img {
        transform: scale(1.05);
      }
    }

    /* CTA Button */
    .story-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 28px;
      padding: 12px 28px;
      background: var(--primary);
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 50px;
      transition: all 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
      border: none;
      cursor: pointer;
    }
    .story-cta:hover {
      background: #333;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      gap: 12px;
    }
    .story-cta .cta-arrow {
      transition: transform 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .story-cta:hover .cta-arrow {
      transform: translateX(4px);
    }
    @media (max-width: 480px) {
      .story-cta { width: 100%; justify-content: center; padding: 14px 24px; font-size: 14px; }
    }

    /* Divider */
    .story-divider {
      width: 100%;
      height: 1px;
      background: #e5e5ea;
      margin: 0 0 64px 0;
    }
    @media (max-width: 768px) {
      .story-divider { margin-bottom: 40px; }
    }
    @media (max-width: 480px) {
      .story-divider { margin-bottom: 28px; }
    }

    /* Date Badge */
    .story-date {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 20px;
    }
    .story-date i {
      font-size: 13px;
    }

    /* Error State */
    .error-state { text-align: center; padding: 80px 20px; display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; }
    .error-state i { font-size: 64px; color: #d1d1d6; margin-bottom: 24px; }
    .error-state h2 { font-size: 28px; font-weight: 700; color: var(--primary); margin-bottom: 12px; font-family: 'Manrope', sans-serif; }
    .error-state p { font-size: 15px; color: var(--accent); max-width: 480px; margin: 0 auto 28px; line-height: 1.7; }
    .error-state .btn-primary { display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; background: var(--primary); color: #fff; border-radius: 50px; font-size: 14px; font-weight: 600; text-decoration: none; transition: all 0.3s ease; }
    .error-state .btn-primary:hover { background: #333; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }

    /* Empty State */
    .empty-state { text-align: center; padding: 80px 20px; display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh; }
    .empty-state i { font-size: 56px; color: #d1d1d6; margin-bottom: 24px; }
    .empty-state h3 { font-size: 24px; font-weight: 700; color: var(--primary); margin-bottom: 12px; font-family: 'Manrope', sans-serif; }
    .empty-state p { font-size: 15px; color: var(--accent); max-width: 420px; margin: 0 auto 20px; line-height: 1.6; }

    /* Back to Top */
    .back-to-top { position: fixed; bottom: 28px; right: 28px; width: 48px; height: 48px; border-radius: 50%; background: var(--primary); color: #fff; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 50; opacity: 0; transform: translateY(20px); transition: all 0.35s cubic-bezier(0.25, 0.1, 0.25, 1); box-shadow: 0 6px 24px rgba(0,0,0,0.2); pointer-events: none; }
    .back-to-top.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .back-to-top:active { transform: scale(0.9); }
    @media (hover: hover) { .back-to-top:hover { background: #333; transform: translateY(-3px); box-shadow: 0 10px 32px rgba(0,0,0,0.25); } }
    @media (max-width: 768px) { .back-to-top { bottom: 20px; right: 20px; width: 44px; height: 44px; } }
  </style>
</head>
<body class="antialiased">

  <!-- Dynamic Header -->
  <div id="dynamic-header"></div>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-4 sm:pb-6" style="margin-bottom: 0; padding-bottom: 0; padding-top: 0;">

    <!-- Breadcrumb -->
    <nav class="breadcrumb" id="breadcrumb">
      <a href="/">Home</a>
      <span class="separator"><i class="fa-solid fa-chevron-right" style="font-size:8px;"></i></span>

    <!-- Error State -->
    <div class="error-state" id="error-state" style="display:none;">

    <!-- Page Header -->
    <div class="page-header" id="page-header">

      <div class="header-overlay"></div>
      <div class="header-content">
        <p class="header-label">আমাদের যাত্রা</p>
        <h1 class="header-title" id="header-main-title">আমাদের গল্প</h1>
      </div>
    </div>

    <!-- Stories Container -->
    <div id="stories-container">
      <!-- Skeleton Loading -->
      <div id="skeleton-container">
        <div class="story-card">
          <div class="story-image-wrap skeleton"></div>
          <div class="story-content-wrap">
            <div class="story-text-col">
              <div class="skeleton" style="height:10px;width:25%;margin-bottom:16px;"></div>
              <div class="skeleton" style="height:32px;width:60%;margin-bottom:12px;"></div>
              <div class="skeleton" style="height:16px;width:40%;margin-bottom:20px;"></div>
              <div class="skeleton" style="height:14px;width:100%;margin-bottom:8px;"></div>
              <div class="skeleton" style="height:14px;width:100%;margin-bottom:8px;"></div>
              <div class="skeleton" style="height:14px;width:75%;margin-bottom:8px;"></div>
            </div>
            <div class="story-side-col">
              <div class="skeleton" style="aspect-ratio:3/4;border-radius:10px;"></div>
            </div>
          </div>
        </div>
        <div class="story-divider"></div>
        <div class="story-card">
          <div class="story-image-wrap skeleton"></div>
          <div class="story-content-wrap">
            <div class="story-text-col">
              <div class="skeleton" style="height:10px;width:25%;margin-bottom:16px;"></div>
              <div class="skeleton" style="height:32px;width:60%;margin-bottom:12px;"></div>
              <div class="skeleton" style="height:16px;width:40%;margin-bottom:20px;"></div>
              <div class="skeleton" style="height:14px;width:100%;margin-bottom:8px;"></div>
              <div class="skeleton" style="height:14px;width:100%;margin-bottom:8px;"></div>
              <div class="skeleton" style="height:14px;width:75%;margin-bottom:8px;"></div>
            </div>
            <div class="story-side-col">
              <div class="skeleton" style="aspect-ratio:3/4;border-radius:10px;"></div>

          </div>
        </div>
      </div>

      <!-- Actual Stories -->
      <div id="stories-content" style="display:none;"></div>

  </main>

  <!-- Dynamic Footer -->
  <div id="dynamic-footer"></div>

  <!-- Back to Top -->
  <button class="back-to-top" id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Back to top">
    <i class="fa-solid fa-arrow-up"></i>
  </button>

  <script src="/components.js"></script>

  <script>
    (function() {
      // ============================================
      // CONFIGURATION
      // ============================================
      const API_BASE = window.location.origin;

      // ============================================
      // UTILITY FUNCTIONS
      // ============================================
      function formatDate(dateString) {
        if (!dateString) return '';
        try {
          const date = new Date(dateString);
          const options = { year: 'numeric', month: 'long', day: 'numeric' };
          return date.toLocaleDateString('bn-BD', options);
        } catch (e) {
          return dateString;
        }
      }

      function escapeHTML(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      // ============================================
      // API CALLS
      // ============================================
      async function fetchStories() {
        try {
          const response = await fetch(`${API_BASE}/api/stories`, {
            headers: { 'Accept': 'application/json' }
          });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const data = await response.json();
          return data || [];
        } catch (error) {
          console.error('Error fetching stories:', error);
          throw error;
        }
      }

      // ============================================
      // RENDER FUNCTIONS
      // ============================================
      function renderSkeleton() {
        document.getElementById('skeleton-container').style.display = 'block';
        document.getElementById('stories-content').style.display = 'none';
        document.getElementById('error-state').style.display = 'none';
        document.getElementById('empty-state').style.display = 'none';
      }

      function renderError() {
        document.getElementById('skeleton-container').style.display = 'none';
        document.getElementById('stories-content').style.display = 'none';
        document.getElementById('error-state').style.display = 'flex';
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('page-header').style.display = 'none';
      }

      function renderEmpty() {
        document.getElementById('skeleton-container').style.display = 'none';
        document.getElementById('stories-content').style.display = 'none';
        document.getElementById('error-state').style.display = 'none';
        document.getElementById('empty-state').style.display = 'flex';
        document.getElementById('page-header').style.display = 'block';
      }

      function renderStories(stories) {
        document.getElementById('skeleton-container').style.display = 'none';
        document.getElementById('error-state').style.display = 'none';
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('page-header').style.display = 'block';
        document.getElementById('stories-content').style.display = 'block';

        const container = document.getElementById('stories-content');
        container.innerHTML = '';

        // Update page header with first story's header_image
        if (stories.length > 0 && stories[0].header_image) {
          const headerImg = document.getElementById('header-bg-img');
          headerImg.src = stories[0].header_image;
          headerImg.style.display = 'block';
          headerImg.onerror = function() {
            this.style.display = 'none';
          };
          if (stories[0].header_title) {
            document.getElementById('header-main-title').textContent = stories[0].header_title;
          }
        } else {
          document.getElementById('header-bg-img').style.display = 'none';
        }

        // Render each story
        stories.forEach((story, index) => {
          const storyCard = createStoryCard(story, index);
          container.appendChild(storyCard);
        });

        // Initialize scroll animations
        initScrollAnimations();

        // Remove the last divider
        const dividers = container.querySelectorAll('.story-divider');
        if (dividers.length > 0) {
          dividers[dividers.length - 1].style.display = 'none';
        }
      }

      function createStoryCard(story, index) {
        const card = document.createElement('div');
        card.className = 'story-card';
        card.setAttribute('data-story-index', index);
        card.setAttribute('data-animate', 'true');

        // Determine if section_image exists to adjust layout
        const hasSectionImage = story.section_image ? true : false;
        const hasHeaderImage = story.header_image ? true : false;
        const hasCTA = story.cta_text ? true : false;

        let html = '';

        // Header Image (main wide image)
        if (hasHeaderImage) {
          html += `
            <div class="story-image-wrap">
              <img src="${escapeHTML(story.header_image)}" 
                   alt="${escapeHTML(story.header_title || 'Story Image')}" 
                   loading="${index < 2 ? 'eager' : 'lazy'}"
                   onerror="this.parentElement.style.display='none';" />
            </div>
          `;
        }

        // Content Row
        html += '<div class="story-content-wrap">';
        
        // Text Column
        html += '<div class="story-text-col">';

        // Date
        if (story.created_at) {
          html += `
            <div class="story-date">
              <i class="fa-regular fa-calendar"></i>
              <span>${formatDate(story.created_at)}</span>
            </div>
          `;
        }

        // Header Title (if no header image, show as main title)
        if (!hasHeaderImage && story.header_title) {
          html += `<h2 class="story-title">${escapeHTML(story.header_title)}</h2>`;
        }

        // Header Subtitle
        if (story.header_subtitle) {
          html += `<p class="story-label">${escapeHTML(story.header_subtitle)}</p>`;
        }

        // Section Title
        if (story.section_title) {
          html += `<h2 class="story-title">${escapeHTML(story.section_title)}</h2>`;
        }

        // Section Subtitle
        if (story.section_subtitle) {
          html += `<p class="story-subtitle">${escapeHTML(story.section_subtitle)}</p>`;
        }

        // Section Description
        if (story.section_description) {
          const paragraphs = story.section_description
            .split('\n')
            .filter(p => p.trim())
            .map(p => `<p>${escapeHTML(p.trim())}</p>`)
            .join('');
          html += `<div class="story-description">${paragraphs}</div>`;
        }

        // CTA Button
        if (hasCTA) {
          html += `
            <a href="${escapeHTML(story.cta_link || '#')}" class="story-cta">
              ${escapeHTML(story.cta_text)}
              <span class="cta-arrow"><i class="fa-solid fa-arrow-right"></i></span>
            </a>
          `;
        }

        html += '</div>'; // End text-col

        // Side Image Column
        if (hasSectionImage) {
          html += `
            <div class="story-side-col">
              <div class="story-side-image">
                <img src="${escapeHTML(story.section_image)}" 
                     alt="${escapeHTML(story.section_title || 'Section Image')}" 
                     loading="lazy"
                     onerror="this.parentElement.style.display='none';" />
              </div>
            </div>
          `;
        }

        html += '</div>'; // End content-wrap

        card.innerHTML = html;

        // Add divider after each story except the last
        const divider = document.createElement('div');
        divider.className = 'story-divider';

        const wrapper = document.createElement('div');
        wrapper.appendChild(card);
        wrapper.appendChild(divider);

        return wrapper;
      }

      // ============================================
      // SCROLL ANIMATIONS
      // ============================================
      function initScrollAnimations() {
        const observerOptions = {
          threshold: 0.15,
          rootMargin: '0px 0px -30px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
              observer.unobserve(entry.target);
            }
          });
        }, observerOptions);

        document.querySelectorAll('[data-animate="true"]').forEach((card, index) => {
          // Add stagger delay
          card.style.transitionDelay = `${index * 0.1}s`;
          observer.observe(card);
        });
      }

      // ============================================
      // BACK TO TOP
      // ============================================
      function initBackToTop() {
        const btn = document.getElementById('back-to-top');
        let ticking = false;
        window.addEventListener('scroll', () => {
          if (!ticking) {
            requestAnimationFrame(() => {
              if (window.scrollY > 500) {
                btn.classList.add('visible');
              } else {
                btn.classList.remove('visible');
              }
              ticking = false;
            });
            ticking = true;
          }
        }, { passive: true });
      }

      // ============================================
      // MAIN LOAD FUNCTION
      // ============================================
      async function loadStories() {
        renderSkeleton();

        try {
          const stories = await fetchStories();

          if (!stories || stories.length === 0) {
            renderEmpty();
            return;
          }

          renderStories(stories);
        } catch (error) {
          console.error('Failed to load stories:', error);
          renderError();
        }
      }

      // Expose to global scope for retry button
      window.loadStories = loadStories;

      // ============================================
      // INITIALIZATION
      // ============================================
      document.addEventListener('DOMContentLoaded', () => {
        // Apply custom fonts if available
        if (window.JAYENWARE_FONTS) {
          const root = document.documentElement;
          const vars = window.JAYENWARE_FONTS.cssVariables;
          for (const [key, value] of Object.entries(vars)) {
            root.style.setProperty(key, value);
          }
        }

        initBackToTop();
        loadStories();
      });
    })();
  </script>
</body>
</html>
