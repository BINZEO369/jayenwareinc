<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title id="page-title">Our Story | JAYENWARE</title>
  <meta name="description" content="Discover the story behind Jayenware - our journey, heritage, and commitment to authentic Bangladesh fashion." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="canonical" id="canonical-url" href="https://www.jayenware.shop/story" />
  <link rel="icon" type="image/png" sizes="32x32" href="/logo.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />

  <script src="/fonts.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1d1d1f',
            accent: '#86868b',
            soft: '#f5f5f7',
            blue: '#007aff'
          },
          fontFamily: {
            sans: ["'Inter', 'sans-serif'"],
            serif: ["'Manrope', 'sans-serif'"],
            mono: ["'Sora', 'sans-serif'"]
          }
        }
      }
    }
  </script>

  <style>
    :root {
      --primary: #1d1d1f;
      --accent: #86868b;
      --soft: #f5f5f7;
      --blue: #007aff;
    }
    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }
    body {
      background-color: #ffffff;
      color: #1d1d1f;
      overflow-x: hidden;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }
    img {
      max-width: 100%;
      height: auto;
      display: block;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .skeleton {
      background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .breadcrumb {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 13px;
      color: var(--accent);
      padding: 16px 0;
    }
    .breadcrumb a {
      color: var(--blue);
      text-decoration: none;
      transition: color 0.2s;
    }
    .breadcrumb a:hover {
      color: var(--primary);
    }

    /* Full-Width Hero Banner */
    .story-hero-banner {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-height: 600px;
      max-height: 900px;
      overflow: hidden;
      background: #000;
      margin-bottom: 0;
      margin-left: calc(-50vw + 50%);
      margin-right: calc(-50vw + 50%);
      left: 0;
      right: 0;
      margin-top: 0;
    }
    @media (max-width: 768px) {
      .story-hero-banner { height: 90vh; min-height: 500px; max-height: 700px; }
    }
    @media (max-width: 480px) {
      .story-hero-banner { height: 80vh; min-height: 400px; }
    }
    .story-hero-banner .hero-bg-img {
      position: absolute; 
      inset: 0; 
      width: 100%; 
      height: 100%; 
      object-fit: cover;
      object-position: center;
      animation: heroZoom 20s ease-in-out infinite alternate;
    }
    @keyframes heroZoom { from { transform: scale(1); } to { transform: scale(1.08); } }
    .story-hero-banner .hero-overlay {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(to bottom, 
        rgba(0,0,0,0.2) 0%, 
        rgba(0,0,0,0.05) 30%, 
        rgba(0,0,0,0.1) 60%, 
        rgba(0,0,0,0.6) 85%, 
        rgba(0,0,0,0.85) 100%);
    }
    .story-hero-banner .hero-content {
      position: absolute; 
      bottom: clamp(60px, 15vh, 140px); 
      left: 50%; 
      transform: translateX(-50%); 
      z-index: 2;
      text-align: center; 
      width: 90%; 
      max-width: 800px; 
      padding: 0 20px;
    }
    .story-hero-banner .hero-subtitle {
      display: inline-block;
      font-family: 'Inter', sans-serif; 
      font-size: clamp(8px, 1.1vw, 11px); 
      font-weight: 500;
      letter-spacing: 0.5em; 
      text-transform: uppercase; 
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: clamp(16px, 3vh, 28px);
      opacity: 0; 
      transform: translateY(10px);
      animation: heroFadeInUp 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) 0.2s forwards;
    }
    .story-hero-banner .hero-title {
      font-family: 'Manrope', sans-serif; 
      font-size: clamp(28px, 5vw, 72px); 
      font-weight: 800;
      line-height: 1.05; 
      color: #ffffff; 
      margin: 0 0 clamp(20px, 3vh, 36px) 0; 
      letter-spacing: -0.02em;
      opacity: 0; 
      transform: translateY(15px);
      animation: heroFadeInUp 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) 0.35s forwards;
    }
    .story-hero-banner .hero-cta-wrap {
      opacity: 0; 
      transform: translateY(10px);
      animation: heroFadeInUp 0.8s cubic-bezier(0.22, 0.61, 0.36, 1) 0.55s forwards;
    }
    .story-hero-banner .hero-cta {
      display: inline-flex; 
      align-items: center; 
      gap: 8px;
      font-family: 'Inter', sans-serif; 
      font-size: clamp(10px, 1.2vw, 13px); 
      font-weight: 600;
      letter-spacing: 0.2em; 
      text-transform: uppercase; 
      color: #ffffff; 
      text-decoration: none;
      transition: all 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
      padding: 14px 32px; 
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .story-hero-banner .hero-cta:hover { 
      gap: 12px; 
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.6);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .story-hero-banner .hero-cta i {
      font-size: 14px;
      transition: transform 0.3s ease;
    }
    .story-hero-banner .hero-cta:hover i {
      transform: translateX(4px);
    }
    @keyframes heroFadeInUp { to { opacity: 1; transform: translateY(0); } }

    /* Full-Width Image Sections */
    .full-width-image-section {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-height: 600px;
      max-height: 900px;
      overflow: hidden;
      background: #f5f5f7;
      margin-left: calc(-50vw + 50%);
      margin-right: calc(-50vw + 50%);
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    @media (max-width: 768px) {
      .full-width-image-section { height: 70vh; min-height: 400px; }
    }
    @media (max-width: 480px) {
      .full-width-image-section { height: 60vh; min-height: 300px; }
    }
    .full-width-image-section img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }
    .full-width-image-section .image-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.15);
      z-index: 1;
    }

    /* Content Section with Max Width */
    .content-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 20px;
    }
    @media (max-width: 768px) {
      .content-section { padding: 60px 20px; }
    }
    @media (max-width: 480px) {
      .content-section { padding: 40px 16px; }
    }

    /* Story Text Section */
    .story-text-section {
      text-align: center;
      max-width: 900px;
      margin: 0 auto;
    }
    .story-text-section .section-label {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--blue);
      margin-bottom: 20px;
    }
    .story-text-section .section-title {
      font-family: 'Manrope', sans-serif;
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 800;
      color: var(--primary);
      line-height: 1.1;
      margin-bottom: 24px;
      letter-spacing: -0.02em;
    }
    .story-text-section .section-subtitle {
      font-size: clamp(16px, 2vw, 20px);
      color: var(--accent);
      line-height: 1.7;
      margin-bottom: 48px;
      font-weight: 400;
    }
    .story-text-section .section-description {
      font-size: clamp(15px, 1.8vw, 18px);
      line-height: 1.9;
      color: #4a4a4e;
      text-align: left;
      white-space: pre-line;
      font-weight: 400;
    }

    /* Story Grid */
    .stories-grid {
      display: grid;
      grid-template-columns: repeat(1, 1fr);
      gap: 40px;
      margin-top: 0;
    }
    @media (min-width: 768px) {
      .stories-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 48px;
      }
    }
    @media (min-width: 1200px) {
      .stories-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 56px;
      }
    }

    /* Story Card */
    .story-card {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: #fff;
      transition: all 0.5s cubic-bezier(0.25, 0.1, 0.25, 1);
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .story-card:hover {
      transform: translateY(-12px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    }
    .story-card:active {
      transform: scale(0.98);
    }
    .story-card .card-image-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 4/5;
      overflow: hidden;
      background: #f5f5f7;
    }
    .story-card .card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transition: transform 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
    }
    .story-card:hover .card-image {
      transform: scale(1.1);
    }
    .story-card .card-content {
      padding: 28px;
    }
    .story-card .card-label {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--blue);
      margin-bottom: 16px;
    }
    .story-card .card-title {
      font-family: 'Manrope', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
      line-height: 1.3;
      margin-bottom: 16px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .story-card .card-description {
      font-size: 14px;
      color: var(--accent);
      line-height: 1.7;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .story-card .card-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      text-decoration: none;
      transition: all 0.3s ease;
      padding: 8px 0;
    }
    .story-card:hover .card-cta {
      gap: 12px;
      color: var(--blue);
    }
    .story-card .card-cta i {
      font-size: 12px;
      transition: all 0.3s ease;
    }
    .story-card:hover .card-cta i {
      transform: translateX(4px);
    }

    /* CTA Section */
    .cta-section {
      text-align: center;
      padding: 40px 0;
    }
    .cta-button {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 18px 40px;
      background: var(--primary);
      color: #fff;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
      letter-spacing: 0.5px;
    }
    .cta-button:hover {
      background: #000;
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.2);
      gap: 16px;
    }
    .cta-button i {
      font-size: 14px;
      transition: transform 0.3s ease;
    }
    .cta-button:hover i {
      transform: translateX(5px);
    }

    /* Section Divider */
    .section-divider {
      width: 100%;
      height: 1px;
      background: #e5e5ea;
      margin: 80px 0;
    }
    @media (max-width: 768px) {
      .section-divider { margin: 60px 0; }
    }
    @media (max-width: 480px) {
      .section-divider { margin: 40px 0; }
    }

    /* Error State */
    .error-state {
      text-align: center;
      padding: 100px 20px;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
    }
    .error-state i {
      font-size: 72px;
      color: #d1d1d6;
      margin-bottom: 28px;
    }
    .error-state h2 {
      font-size: 32px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 16px;
      font-family: 'Manrope', sans-serif;
    }
    .error-state p {
      font-size: 16px;
      color: var(--accent);
      max-width: 500px;
      margin: 0 auto 32px;
      line-height: 1.8;
    }
    .error-state .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 16px 32px;
      background: var(--primary);
      color: #fff;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .error-state .btn-primary:hover {
      background: #333;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      display: none;
    }
    .empty-state.visible {
      display: block;
    }
    .empty-state i {
      font-size: 56px;
      color: #d1d1d6;
      margin-bottom: 24px;
    }
    .empty-state h3 {
      font-size: 24px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 12px;
      font-family: 'Manrope', sans-serif;
    }
    .empty-state p {
      font-size: 15px;
      color: var(--accent);
      max-width: 450px;
      margin: 0 auto 24px;
      line-height: 1.7;
    }
    .empty-state .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: var(--primary);
      color: #fff;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    /* Back to Top */
    .back-to-top {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(29, 29, 31, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 50;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
      pointer-events: none;
      font-size: 18px;
    }
    .back-to-top.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .back-to-top:active {
      transform: scale(0.9);
    }
    @media (hover: hover) {
      .back-to-top:hover {
        background: #000;
        transform: translateY(-4px);
        box-shadow: 0 12px 36px rgba(0,0,0,0.3);
      }
    }

    @media (max-width: 768px) {
      .story-card .card-content {
        padding: 20px;
      }
      .story-card .card-title {
        font-size: 18px;
      }
      .back-to-top {
        bottom: 24px;
        right: 24px;
        width: 44px;
        height: 44px;
        font-size: 16px;
      }
    }
    @media (max-width: 480px) {
      .stories-grid {
        grid-template-columns: 1fr;
        gap: 32px;
      }
    }
  </style>
</head>
<body class="antialiased">

  <div id="dynamic-header"></div>

  <main style="margin-bottom: 0; padding-bottom: 0; padding-top: 0;">

    <nav class="breadcrumb max-w-7xl mx-auto px-4 sm:px-6 lg:px-8" id="breadcrumb">
      <a href="/">Home</a>
      <span class="separator"><i class="fa-solid fa-chevron-right" style="font-size:8px;"></i></span>
      <span class="current" id="breadcrumb-current">Our Story</span>
    </nav>

    <!-- Hero Banner -->
    <div class="story-hero-banner" id="story-hero-banner">
      <img id="hero-bg-img" src="" alt="Our Story" class="hero-bg-img" style="display:none;" onerror="this.style.display='none';" />
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <p class="hero-subtitle" id="hero-subtitle"></p>
        <h1 class="hero-title" id="hero-title"></h1>
        <div class="hero-cta-wrap" id="hero-cta-wrap" style="display:none;">
          <a href="#" class="hero-cta" id="hero-cta-link">
            <span id="hero-cta-text"></span>
            <i class="fa-solid fa-arrow-right"></i>
          </a>
        </div>
      </div>
    </div>

    <!-- Error State -->
    <div class="error-state max-w-7xl mx-auto px-4" id="error-state">
      <i class="fa-solid fa-circle-exclamation"></i>
      <h2>Stories Not Found</h2>
      <p>We couldn't load our stories at this moment. Please try again later or browse our other sections.</p>
      <a href="/" class="btn-primary"><i class="fa-solid fa-house"></i> Back to Home</a>
    </div>

    <!-- Stories Grid Section -->
    <div class="content-section" id="stories-section">
      <div class="stories-grid" id="stories-grid"></div>
      <div class="empty-state" id="empty-state">
        <i class="fa-solid fa-book-open"></i>
        <h3>No Stories Yet</h3>
        <p>Our story section is being crafted. Check back soon to discover the journey behind Jayenware.</p>
        <a href="/" class="btn-primary"><i class="fa-solid fa-house"></i> Back to Home</a>
      </div>
    </div>

    <!-- Featured Story Detail Section -->
    <div id="featured-story-container"></div>

  </main>

  <div id="dynamic-footer"></div>

  <button class="back-to-top" id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Back to top">
    <i class="fa-solid fa-arrow-up"></i>
  </button>

  <script src="/components.js"></script>

  <script>
    (function() {
      document.addEventListener('DOMContentLoaded', () => {
        if (window.JAYENWARE_FONTS) {
          const root = document.documentElement;
          const vars = window.JAYENWARE_FONTS.cssVariables;
          for (const [key, value] of Object.entries(vars)) {
            root.style.setProperty(key, value);
          }
        }
        setTimeout(initStoryPage, 100);
      });

      let allStories = [];
      let featuredStory = null;

      async function fetchAPI(endpoint) {
        try {
          const res = await fetch(endpoint, { headers: { 'Accept': 'application/json' } });
          if (!res.ok) {
            console.error(`API Error: ${endpoint} returned ${res.status}`);
            return null;
          }
          return await res.json();
        } catch (err) {
          console.error(`Fetch error for ${endpoint}:`, err);
          return null;
        }
      }

      async function loadStories() {
        const stories = await fetchAPI('/api/stories');
        return stories || [];
      }

      async function loadFeaturedStory() {
        const story = await fetchAPI('/api/story/featured');
        return story;
      }

      function renderSkeleton(count = 6) {
        const grid = document.getElementById('stories-grid');
        grid.innerHTML = Array(count).fill(`
          <div class="story-card">
            <div class="card-image-wrapper">
              <div class="skeleton" style="width:100%;height:100%;"></div>
            </div>
            <div class="card-content">
              <div class="skeleton" style="height:10px;width:30%;margin-bottom:16px;"></div>
              <div class="skeleton" style="height:22px;width:80%;margin-bottom:12px;"></div>
              <div class="skeleton" style="height:14px;width:100%;margin-bottom:8px;"></div>
              <div class="skeleton" style="height:14px;width:90%;margin-bottom:20px;"></div>
              <div class="skeleton" style="height:14px;width:35%;"></div>
            </div>
          </div>
        `).join('');
      }

      function showErrorState() {
        document.getElementById('story-hero-banner').style.display = 'none';
        document.getElementById('stories-section').style.display = 'none';
        document.getElementById('featured-story-container').innerHTML = '';
        document.getElementById('error-state').style.display = 'flex';
        document.getElementById('breadcrumb').style.display = 'none';
      }

      function showEmptyState() {
        document.getElementById('stories-grid').innerHTML = '';
        document.getElementById('featured-story-container').innerHTML = '';
        document.getElementById('empty-state').classList.add('visible');
      }

      function truncateText(text, maxLength = 150) {
        if (!text) return '';
        if (text.length <= maxLength) return text;
        return text.substring(0, maxLength).trim() + '...';
      }

      function renderStoryCard(story) {
        const imageUrl = story.header_image || story.section_image || '/logo.png';
        const description = story.section_description || story.header_subtitle || '';
        const cardLink = story.cta_link || '#';
        
        return `
        <a href="${cardLink}" class="story-card">
          <div class="card-image-wrapper">
            <img src="${imageUrl}" alt="${story.header_title || 'Story'}" class="card-image" loading="lazy" onerror="this.src='/logo.png';this.style.objectFit='contain';this.style.padding='40px';" />
          </div>
          <div class="card-content">
            <span class="card-label">Our Story</span>
            <h3 class="card-title">${story.header_title || ''}</h3>
            <p class="card-description">${truncateText(description, 120)}</p>
            ${story.cta_text ? `
            <span class="card-cta">
              ${story.cta_text}
              <i class="fa-solid fa-arrow-right"></i>
            </span>
            ` : ''}
          </div>
        </a>`;
      }

      function renderStoriesGrid() {
        const grid = document.getElementById('stories-grid');
        if (!allStories.length) {
          showEmptyState();
          return;
        }
        document.getElementById('empty-state').classList.remove('visible');
        grid.innerHTML = allStories.map(renderStoryCard).join('');
      }

      function updateHeroBanner() {
        const heroBanner = document.getElementById('story-hero-banner');
        const heroImg = document.getElementById('hero-bg-img');
        const heroTitle = document.getElementById('hero-title');
        const heroSubtitle = document.getElementById('hero-subtitle');
        const heroCtaWrap = document.getElementById('hero-cta-wrap');
        
        const heroStory = featuredStory || (allStories.length > 0 ? allStories[0] : null);
        
        if (heroStory) {
          heroBanner.style.display = 'block';
          
          if (heroStory.header_image) {
            heroImg.src = heroStory.header_image;
            heroImg.style.display = 'block';
            heroImg.alt = heroStory.header_title || 'Our Story';
          } else {
            heroImg.style.display = 'none';
          }
          
          heroTitle.textContent = heroStory.header_title || '';
          heroSubtitle.textContent = heroStory.header_subtitle || '';
          
          if (heroStory.cta_text && heroStory.cta_link) {
            heroCtaWrap.style.display = 'block';
            document.getElementById('hero-cta-text').textContent = heroStory.cta_text;
            document.getElementById('hero-cta-link').href = heroStory.cta_link;
          } else {
            heroCtaWrap.style.display = 'none';
          }
        } else {
          heroBanner.style.display = 'none';
        }
      }

      function renderFeaturedStoryDetail() {
        const container = document.getElementById('featured-story-container');
        const detailStory = featuredStory;
        
        if (!detailStory) {
          container.innerHTML = '';
          return;
        }
        
        // Build featured story detail with full-width images and content sections
        let html = '';
        
        // Section Image (Full Width)
        if (detailStory.section_image) {
          html += `
          <div class="full-width-image-section">
            <img src="${detailStory.section_image}" alt="${detailStory.section_title || 'Story'}" onerror="this.parentElement.style.display='none';" />
            <div class="image-overlay"></div>
          </div>`;
        }
        
        // Text Content Section
        html += `
        <div class="content-section">
          <div class="story-text-section">
            ${detailStory.section_title ? `<h2 class="section-title">${detailStory.section_title}</h2>` : ''}
            ${detailStory.section_subtitle ? `<p class="section-subtitle">${detailStory.section_subtitle}</p>` : ''}
            ${detailStory.section_description ? `<div class="section-description">${detailStory.section_description}</div>` : ''}
            
            ${detailStory.cta_text && detailStory.cta_link ? `
            <div class="cta-section">
              <a href="${detailStory.cta_link}" class="cta-button">
                ${detailStory.cta_text}
                <i class="fa-solid fa-arrow-right"></i>
              </a>
            </div>
            ` : ''}
          </div>
        </div>`;
        
        // Header Image (Full Width at bottom)
        if (detailStory.header_image && !detailStory.section_image) {
          html += `
          <div class="full-width-image-section">
            <img src="${detailStory.header_image}" alt="${detailStory.header_title || 'Story'}" onerror="this.parentElement.style.display='none';" />
            <div class="image-overlay"></div>
          </div>`;
        }
        
        container.innerHTML = html;
      }

      function updateBreadcrumb() {
        document.getElementById('breadcrumb-current').textContent = 'Our Story';
        document.title = 'Our Story | JAYENWARE';
        document.getElementById('page-title').textContent = 'Our Story | JAYENWARE';
        document.getElementById('canonical-url').href = 'https://www.jayenware.shop/story';
        
        const metaDesc = document.querySelector('meta[name="description"]');
        if (metaDesc) {
          metaDesc.setAttribute('content', 'Discover the story behind Jayenware - our journey, heritage, and commitment to authentic Bangladesh fashion.');
        }
      }

      function initBackToTop() {
        const btn = document.getElementById('back-to-top');
        let ticking = false;
        window.addEventListener('scroll', () => {
          if (!ticking) {
            requestAnimationFrame(() => {
              if (window.scrollY > 600) {
                btn.classList.add('visible');
              } else {
                btn.classList.remove('visible');
              }
              ticking = false;
            });
            ticking = true;
          }
        }, { passive: true });
      }

      async function initStoryPage() {
        renderSkeleton(6);
        updateBreadcrumb();
        
        try {
          const [storiesData, featuredData] = await Promise.all([
            loadStories(),
            loadFeaturedStory()
          ]);
          
          if (storiesData === null && featuredData === null) {
            showErrorState();
            return;
          }
          
          allStories = Array.isArray(storiesData) ? storiesData : [];
          featuredStory = featuredData;
          
          // Remove featured story from grid if it exists
          if (featuredStory) {
            allStories = allStories.filter(story => story.id !== featuredStory.id);
          }
          
          // Hide error state
          document.getElementById('error-state').style.display = 'none';
          document.getElementById('breadcrumb').style.display = 'flex';
          
          // Update UI
          updateHeroBanner();
          renderStoriesGrid();
          renderFeaturedStoryDetail();
          
        } catch (err) {
          console.error('Error initializing story page:', err);
          showErrorState();
        }
      }

      document.addEventListener('DOMContentLoaded', () => {
        initBackToTop();
      });

    })();
  </script>
</body>
</html>
