        let currentCategory = null;
        let currentSubcategory = 'all';
        let allProducts = [];
        let allSubcategories = [];
        let displayLimit = 16;
        let isLoading = false;
        let hasError = false;
        const LOAD_MORE_INCREMENT = 16;

        // Helper: Create slug
        function createSlug(text) {
            if (!text) return '';
            return text
                .toLowerCase()
                .replace(/[^\w\s-]/g, '')
                .replace(/\s+/g, '-')
                .replace(/-+/g, '-')
                .replace(/^-+|-+$/g, '');
        }

        // Helper: Get product slug
        function getProductSlug(product) {
            return (product.slug || product.title || 'product')
                .toLowerCase()
                .replace(/[^\w\s-]/g, '')
                .replace(/\s+/g, '-')
                .replace(/^-+|-+$/g, '');
        }

        // Get category slug from URL
        function getCategorySlugFromURL() {
            const path = window.location.pathname;
            const match = path.match(/\/category\/([^\/]+)/);
            return match ? match[1] : null;
        }

        // Get subcategory slug from URL
        function getSubcategorySlugFromURL() {
            const path = window.location.pathname;
            const match = path.match(/\/category\/[^\/]+\/([^\/]+)/);
            return match ? match[1] : null;
        }

        // ============================================================
        // FETCH API FUNCTIONS WITH PROPER ERROR HANDLING
        // ============================================================

        async function fetchWithTimeout(url, timeout = 10000) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeout);
            
            try {
                const response = await fetch(url, {
                    signal: controller.signal,
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                return await response.json();
            } catch (error) {
                clearTimeout(timeoutId);
                if (error.name === 'AbortError') {
                    throw new Error('Request timeout');
                }
                throw error;
            }
        }

        async function fetchCategory(slug) {
            try {
                const data = await fetchWithTimeout(`/api/categories/${slug}`);
                return data;
            } catch (error) {
                console.error('Error fetching category:', error);
                throw error;
            }
        }

        async function fetchCategoryProducts(slug) {
            try {
                const data = await fetchWithTimeout(`/api/categories/${slug}/products`);
                return Array.isArray(data) ? data : [];
            } catch (error) {
                console.error('Error fetching products:', error);
                return [];
            }
        }

        async function fetchSubcategories(categorySlug) {
            try {
                const data = await fetchWithTimeout(`/api/subcategories?category_slug=${categorySlug}`);
                return Array.isArray(data) ? data : [];
            } catch (error) {
                console.error('Error fetching subcategories:', error);
                return [];
            }
        }

        async function fetchSubcategoryProducts(slug) {
            try {
                const data = await fetchWithTimeout(`/api/subcategories/${slug}/products`);
                return Array.isArray(data) ? data : [];
            } catch (error) {
                console.error('Error fetching subcategory products:', error);
                return [];
            }
        }

        // ============================================================
        // UI HELPER FUNCTIONS
        // ============================================================

        function showLoading() {
            document.getElementById('products-grid').style.display = 'grid';
            document.getElementById('empty-state').style.display = 'none';
            document.getElementById('error-state').style.display = 'none';
            document.getElementById('load-more-container').style.display = 'none';
            document.getElementById('products-count').textContent = 'Loading products...';
            renderSkeleton();
        }

        function showError() {
            document.getElementById('products-grid').style.display = 'none';
            document.getElementById('empty-state').style.display = 'none';
            document.getElementById('error-state').style.display = 'block';
            document.getElementById('load-more-container').style.display = 'none';
            document.getElementById('products-count').textContent = '';
            document.getElementById('hero-title').textContent = 'Error Loading Category';
        }

        function showEmpty() {
            document.getElementById('products-grid').style.display = 'none';
            document.getElementById('empty-state').style.display = 'block';
            document.getElementById('error-state').style.display = 'none';
            document.getElementById('load-more-container').style.display = 'none';
            document.getElementById('products-count').textContent = 'No products found';
        }

        function showProducts() {
            document.getElementById('products-grid').style.display = 'grid';
            document.getElementById('empty-state').style.display = 'none';
            document.getElementById('error-state').style.display = 'none';
        }

        // ============================================================
        // RENDER FUNCTIONS
        // ============================================================

        function renderHero() {
            if (!currentCategory) {
                document.getElementById('hero-title').textContent = 'Loading...';
                return;
            }

            const video = document.getElementById('hero-video');
            const image = document.getElementById('hero-image');
            const badge = document.getElementById('hero-badge');
            const title = document.getElementById('hero-title');
            const desc = document.getElementById('hero-desc');
            const cta = document.getElementById('hero-cta');
            const ctaText = document.getElementById('hero-cta-text');

            // Set title
            title.textContent = currentCategory.name || 'Category';

            // Set page title and meta
            document.title = `${currentCategory.name} | JAYENWARE`;
            document.getElementById('page-title').textContent = `${currentCategory.name} | JAYENWARE`;

            // Meta description
            const metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) {
                metaDesc.content = currentCategory.meta_description || 
                    `Shop ${currentCategory.name} collection at JAYENWARE Bangladesh. Premium quality products with fast delivery.`;
            }

            // Canonical URL
            const canonicalUrl = document.getElementById('canonical-url');
            if (canonicalUrl) {
                canonicalUrl.href = `https://www.jayenware.shop/category/${createSlug(currentCategory.name)}`;
            }

            // Video or Image Background
            if (currentCategory.video_url) {
                video.style.display = 'block';
                image.style.display = 'none';
                video.src = currentCategory.video_url;
                video.load();
                video.play().catch(() => {
                    // Autoplay blocked, show image fallback if available
                    if (currentCategory.image_url) {
                        video.style.display = 'none';
                        image.style.display = 'block';
                        image.src = currentCategory.image_url;
                        image.alt = currentCategory.name;
                    }
                });
            } else if (currentCategory.image_url) {
                video.style.display = 'none';
                image.style.display = 'block';
                image.src = currentCategory.image_url;
                image.alt = currentCategory.name;
            } else {
                video.style.display = 'none';
                image.style.display = 'none';
                // Keep dark background
            }

            // Video Schema (JSON-LD)
            if (currentCategory.video_schema) {
                try {
                    const schema = JSON.parse(currentCategory.video_schema);
                    let scriptTag = document.getElementById('video-schema');
                    if (!scriptTag) {
                        scriptTag = document.createElement('script');
                        scriptTag.id = 'video-schema';
                        scriptTag.type = 'application/ld+json';
                        document.head.appendChild(scriptTag);
                    }
                    scriptTag.textContent = JSON.stringify(schema);
                } catch (e) {
                    console.warn('Invalid video schema JSON');
                }
            }

            // Badge
            if (currentCategory.meta_title) {
                badge.style.display = 'inline-block';
                badge.textContent = currentCategory.meta_title;
            } else {
                badge.style.display = 'none';
            }

            // Description
            if (currentCategory.meta_description) {
                desc.style.display = 'block';
                desc.textContent = currentCategory.meta_description;
            } else {
                desc.style.display = 'none';
            }

            // CTA Button
            if (currentCategory.image_cta_title && currentCategory.image_cta_link) {
                cta.style.display = 'inline-flex';
                ctaText.textContent = currentCategory.image_cta_title;
                cta.href = currentCategory.image_cta_link;

                if (currentCategory.image_cta_link.startsWith('http')) {
                    cta.setAttribute('target', '_blank');
                    cta.setAttribute('rel', 'noopener');
                }
            } else if (currentCategory.video_cta_title && currentCategory.video_cta_link) {
                cta.style.display = 'inline-flex';
                ctaText.textContent = currentCategory.video_cta_title;
                cta.href = currentCategory.video_cta_link;
            } else {
                cta.style.display = 'none';
            }

            // Breadcrumb
            document.getElementById('breadcrumb-category').textContent = currentCategory.name;
        }

        function renderSubcategories() {
            const section = document.getElementById('subcategories-section');
            const container = document.getElementById('subcategories-container');

            if (!allSubcategories || allSubcategories.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';

            let html = `
            <a href="#" class="subcategory-pill ${currentSubcategory === 'all' ? 'active' : ''}" 
               data-subcategory="all" onclick="filterBySubcategory('all', event)">
                All
            </a>`;

            allSubcategories.forEach(sub => {
                const subSlug = sub.slug || createSlug(sub.name);
                const isActive = currentSubcategory === subSlug;
                const imgHTML = sub.image_url ? 
                    `<img src="${sub.image_url}" alt="${sub.name}" class="subcategory-pill-icon">` : '';

                html += `
                <a href="/category/${createSlug(currentCategory.name)}/${subSlug}" 
                   class="subcategory-pill ${isActive ? 'active' : ''}"
                   data-subcategory="${subSlug}" 
                   onclick="filterBySubcategory('${subSlug}', event)">
                    ${imgHTML}${sub.name}
                </a>`;
            });

            container.innerHTML = html;
        }

        function renderProducts(productsToRender = null) {
            const grid = document.getElementById('products-grid');
            const countEl = document.getElementById('products-count');
            const loadMoreContainer = document.getElementById('load-more-container');

            const products = productsToRender || allProducts;

            if (!products || products.length === 0) {
                showEmpty();
                return;
            }

            showProducts();

            const displayProducts = products.slice(0, displayLimit);
            const total = products.length;

            countEl.textContent = `Showing ${Math.min(displayLimit, total)} of ${total} products`;

            grid.innerHTML = displayProducts.map(product => {
                const isOut = product.stock <= 0;
                const slug = getProductSlug(product);

                let badge = '';
                if (!isOut) {
                    if (product.is_new_arrival) badge = '<span class="product-card-badge">New</span>';
                    else if (product.is_on_sale) badge = '<span class="product-card-badge sale">Sale</span>';
                    else if (product.is_limited_edition) badge = '<span class="product-card-badge limited">Limited</span>';
                    else if (product.is_best) badge = '<span class="product-card-badge">Best Seller</span>';
                }

                return `
                <a href="/product/${slug}" class="product-card">
                    <div class="product-card-img">
                        <img src="${product.img || product.image_url || ''}" alt="${product.title}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22400%22><rect fill=%22%23f5f5f7%22 width=%22300%22 height=%22400%22/><text fill=%22%2386868b%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2214%22>No Image</text></svg>'">
                        ${badge}
                        ${isOut ? '<div class="product-card-soldout"><span>Sold Out</span></div>' : ''}
                        <button class="product-card-add" onclick="event.preventDefault();event.stopPropagation();addToCartProduct(${product.id})" ${isOut ? 'disabled style="opacity:0.5;pointer-events:none;"' : ''} aria-label="Add to cart">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                    <div class="product-card-body">
                        <span class="product-card-category">${product.category || currentCategory?.name || ''}</span>
                        <h3 class="product-card-title">${product.title}</h3>
                        <div>
                            <span class="product-card-price">৳${product.price}</span>
                            ${product.old_price ? `<span class="product-card-old-price">৳${product.old_price}</span>` : ''}
                        </div>
                    </div>
                </a>`;
            }).join('');

            // Show/hide load more button
            if (total > displayLimit) {
                loadMoreContainer.style.display = 'block';
            } else {
                loadMoreContainer.style.display = 'none';
            }
        }

        function renderSkeleton() {
            const grid = document.getElementById('products-grid');
            let html = '';
            for (let i = 0; i < 8; i++) {
                html += `
                <div>
                    <div class="skeleton skeleton-card" style="aspect-ratio:3/4;"></div>
                    <div class="skeleton skeleton-title"></div>
                    <div class="skeleton skeleton-price"></div>
                </div>`;
            }
            grid.innerHTML = html;
        }

        // ============================================================
        // ACTIONS
        // ============================================================

        async function filterBySubcategory(subSlug, event) {
            if (event) {
                event.preventDefault();
            }

            if (isLoading) return; // Prevent multiple simultaneous requests

            currentSubcategory = subSlug;
            displayLimit = 16;
            isLoading = true;

            // Update active pill
            document.querySelectorAll('.subcategory-pill').forEach(pill => {
                pill.classList.remove('active');
                if (pill.dataset.subcategory === subSlug) {
                    pill.classList.add('active');
                }
            });

            // Update breadcrumb
            const breadcrumbSub = document.getElementById('breadcrumb-subcategory');
            const breadcrumbSubName = document.getElementById('breadcrumb-subcategory-name');

            if (subSlug === 'all') {
                breadcrumbSub.style.display = 'none';
                window.history.pushState({}, '', `/category/${createSlug(currentCategory.name)}`);
            } else {
                const subcategory = allSubcategories.find(s => (s.slug || createSlug(s.name)) === subSlug);
                breadcrumbSub.style.display = 'inline';
                breadcrumbSubName.textContent = subcategory ? subcategory.name : subSlug;
                window.history.pushState({}, '', `/category/${createSlug(currentCategory.name)}/${subSlug}`);
            }

            // Show loading state
            showLoading();

            try {
                // Fetch products
                if (subSlug === 'all') {
                    allProducts = await fetchCategoryProducts(createSlug(currentCategory.name));
                } else {
                    allProducts = await fetchSubcategoryProducts(subSlug);
                }
                
                renderProducts();
            } catch (error) {
                console.error('Error filtering products:', error);
                showError();
            } finally {
                isLoading = false;
            }
        }

        function loadMoreProducts() {
            displayLimit += LOAD_MORE_INCREMENT;
            renderProducts();
        }

        function addToCartProduct(productId) {
            // Check if addToCart function exists (from main site)
            if (typeof window.parent !== 'undefined' && window.parent.addToCart) {
                window.parent.addToCart(productId, null);
            } else if (typeof addToCart === 'function') {
                addToCart(productId, null);
            } else {
                // Simple cart in localStorage
                let cart = JSON.parse(localStorage.getItem('jayenware_cart') || '[]');
                const existing = cart.find(item => item.productId === productId);
                if (existing) {
                    existing.quantity = (existing.quantity || 1) + 1;
                } else {
                    cart.push({ productId, quantity: 1, variantId: null });
                }
                localStorage.setItem('jayenware_cart', JSON.stringify(cart));
                
                // Show a subtle notification instead of alert
                const notification = document.createElement('div');
                notification.style.cssText = `
                    position: fixed;
                    bottom: 20px;
                    left: 50%;
                    transform: translateX(-50%);
                    background: #1d1d1f;
                    color: #fff;
                    padding: 12px 24px;
                    border-radius: 50px;
                    font-size: 14px;
                    z-index: 9999;
                    animation: fadeInOut 2s ease;
                `;
                notification.textContent = 'Added to cart ✓';
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    notification.remove();
                }, 2000);
            }
        }

        async function retryLoadCategory() {
            await initCategoryPage();
        }

        // ============================================================
        // INITIALIZATION
        // ============================================================

        async function initCategoryPage() {
            const categorySlug = getCategorySlugFromURL();
            const subcategorySlug = getSubcategorySlugFromURL();

            // Reset state
            isLoading = true;
            hasError = false;
            currentCategory = null;
            allProducts = [];
            allSubcategories = [];

            if (!categorySlug) {
                window.location.href = '/';
                return;
            }

            // Show loading state immediately
            showLoading();
            document.getElementById('hero-title').textContent = 'Loading...';

            try {
                // Fetch category data
                currentCategory = await fetchCategory(categorySlug);

                if (!currentCategory) {
                    showError();
                    document.getElementById('hero-title').textContent = 'Category Not Found';
                    document.title = 'Category Not Found | JAYENWARE';
                    return;
                }

                // Render hero immediately after getting category data
                renderHero();

                // Fetch subcategories and products in parallel for better performance
                const [subcategories, products] = await Promise.all([
                    fetchSubcategories(categorySlug),
                    subcategorySlug ? 
                        fetchSubcategoryProducts(subcategorySlug) : 
                        fetchCategoryProducts(categorySlug)
                ]);

                allSubcategories = subcategories;
                allProducts = products;

                // Set current subcategory from URL
                if (subcategorySlug) {
                    currentSubcategory = subcategorySlug;
                } else {
                    currentSubcategory = 'all';
                }

                // Render subcategories and products
                renderSubcategories();
                renderProducts();

                // Update breadcrumb for subcategory
                if (subcategorySlug) {
                    const subcategory = allSubcategories.find(s => (s.slug || createSlug(s.name)) === subcategorySlug);
                    if (subcategory) {
                        document.getElementById('breadcrumb-subcategory').style.display = 'inline';
                        document.getElementById('breadcrumb-subcategory-name').textContent = subcategory.name;
                    }
                }

            } catch (error) {
                console.error('Failed to initialize category page:', error);
                hasError = true;
                showError();
                
                if (currentCategory) {
                    // If we got category data but products failed, still show category info
                    renderHero();
                } else {
                    document.getElementById('hero-title').textContent = 'Error Loading Category';
                }
            } finally {
                isLoading = false;
            }
        }

        // Handle browser back/forward
        window.addEventListener('popstate', () => {
            displayLimit = 16;
            initCategoryPage();
        });

        // Add fadeInOut animation for notifications
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeInOut {
                0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
                15% { opacity: 1; transform: translateX(-50%) translateY(0); }
                85% { opacity: 1; transform: translateX(-50%) translateY(0); }
                100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            }
        `;
        document.head.appendChild(style);

        // Start application when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initCategoryPage);
        } else {
            // DOM already loaded
            initCategoryPage();
        }
    </script>
</body>
</html>
