    </style>

    <div id="cookieConsent" class="cookie-consent-overlay"><div class="cookie-banner"><div class="cookie-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg></div><div class="cookie-text"><h4>We Value Your Privacy</h4><p>We use cookies. <a href="#" onclick="event.preventDefault();openPolicy('privacy')">Privacy Policy</a></p></div><div class="cookie-buttons"><button class="cookie-btn decline" onclick="handleCookieDecline()">Decline</button><button class="cookie-btn accept" onclick="handleCookieAccept()">Accept</button></div></div></div>

    <script>
        // ========== FETCH DATA FROM OUR API ==========
        let currentData = { products: [], categories: [], news: [], hero: [] };
        let currentSlide = 0, slideInterval;
        let currentFilters = { cat: 'all', minPrice: null, maxPrice: null };
        let productsDisplayLimit = 12;
        const productsLoadMoreIncrement = 12;
        const BASE_URL = 'https://www.jayenware.shop';
        const carouselStates = {};

        async function fetchAPI(endpoint) {
            try {
                const res = await fetch(endpoint);
                return await res.json();
            } catch(e) { console.error('Fetch error:', e); return []; }
        }

        function getCategorySlug(c) { if(!c) return ''; return c.toLowerCase().replace(/[^\w\s-]/g,'').replace(/[\s_]+/g,'-').replace(/^-+|-+$/g,''); }
        function getProductSlug(p) { return (p.slug || p.title || 'product').toLowerCase().replace(/[^\w\s-]/g,'').replace(/[\s_]+/g,'-').replace(/^-+|-+$/g,''); }
        function updateURL(path, title = '') { 
            window.history.pushState({ path }, title || 'JAYENWARE', path); 
            document.title = title ? title + ' | JAYENWARE' : 'JAYENWARE OFFICIAL STORE'; 
        }

        function navigate(pageId, params = null) {
            if(pageId !== 'home') cleanupAllCarousels();
            document.querySelectorAll('.page-section').forEach(s => { 
                s.classList.remove('active-page','fade-in'); 
                s.style.display = 'none'; 
            });
            const target = document.getElementById(pageId);
            if(!target) return;
            target.style.display = 'block';
            let urlPath = '/' + pageId;
            if(params && params.category) { 
                urlPath = '/category/' + getCategorySlug(params.category); 
                updateURL(urlPath, params.category); 
            }
            else if(params && params.search) { 
                urlPath = '/search?q=' + encodeURIComponent(params.search); 
                updateURL(urlPath, 'Search: ' + params.search); 
            }
            else updateURL(urlPath);
            
            if(pageId === 'home') { 
                if (currentData.products && currentData.products.length > 0) {
                    renderHomepageSections(); 
                    renderRecentlyViewed(); 
                } else {
                    console.warn('Products not loaded yet, skipping homepage render');
                }
            }
            if(pageId === 'wishlist') renderWishlist();
            if(pageId === 'products') renderProducts(getFilteredProducts());
            requestAnimationFrame(() => { 
                target.classList.add('active-page','fade-in'); 
                window.scrollTo({ top: 0, behavior: 'smooth' }); 
            });
        }

        // ========== ROLEX-STYLE HERO FUNCTIONS ==========
        function renderHero() {
            const container = document.getElementById('hero-banner-slides'), list = currentData.hero;
            if(!list.length) { container.innerHTML = '<div class="w-full h-full bg-gray-900"></div>'; return; }
            container.innerHTML = list.map((h,i) => `<div class="hero-slide-wrapper absolute inset-0 ${i!==0?'fade-out':''}"><img src="${h.img}" alt="${h.title||'JAYENWARE Hero'}" class="hero-slide-img w-full h-full object-cover" loading="${i===0?'eager':'lazy'}"></div>`).join('');
            updateHeroContent(0); 
            clearInterval(slideInterval);
            if(list.length > 1) {
                slideInterval = setInterval(() => { 
                    currentSlide = (currentSlide+1)%list.length; 
                    updateHeroSlide(); 
                }, 7000);
            }
        }
        
        function updateHeroSlide() { 
            const slides = document.querySelectorAll('.hero-slide-wrapper');
            slides.forEach((s,i) => s.classList.toggle('fade-out', i!==currentSlide)); 
            updateHeroContent(currentSlide); 
        }
        
        function updateHeroContent(i) { 
            const d = currentData.hero[i]; 
            const titleEl = document.getElementById('hero-title');
            const subtitleEl = document.getElementById('hero-subtitle');
            const ctaContainer = document.getElementById('hero-cta-container');
            
            // Reset animations
            [titleEl, subtitleEl, ctaContainer].forEach(el => {
                if(el) {
                    el.style.animation = 'none';
                    el.offsetHeight;
                    el.style.animation = '';
                }
            });
            
            if (d && d.title) {
                titleEl.textContent = d.title;
                titleEl.style.display = 'block';
            } else {
                titleEl.textContent = '';
                titleEl.style.display = 'none';
            }
            
            if (d && d.subtitle) {
                subtitleEl.textContent = d.subtitle;
                subtitleEl.style.display = 'inline-block';
            } else {
                subtitleEl.textContent = '';
                subtitleEl.style.display = 'none';
            }
            
            updateHeroCTA(d);
        }
        
        function updateHeroCTA(heroData) {
            const container = document.getElementById('hero-cta-container');
            if(!container) return;
            
            if(heroData && heroData.cta_text && heroData.cta_link) {
                container.innerHTML = `<a href="${heroData.cta_link}" class="hero-cta">${heroData.cta_text} <span class="cta-arrow"></span></a>`;
            } else {
                container.innerHTML = '';
            }
        }

        // ========== CATEGORY & FILTER FUNCTIONS ==========
        function renderCategories() {
            const container = document.getElementById('sidebar-categories');
            if(!container) return;
            container.innerHTML = `<a href="/products" onclick="event.preventDefault();filterByCategory('all')" class="block w-full text-left py-2 px-3 rounded-lg text-[10px] sm:text-xs font-bold hover:bg-gray-100 transition no-underline text-primary ${currentFilters.cat==='all'?'bg-primary text-white':''}">All</a>` + currentData.categories.map(c => `<a href="/category/${getCategorySlug(c.name)}" onclick="event.preventDefault();filterByCategory('${c.name}')" class="block w-full text-left py-2 px-3 rounded-lg text-[10px] sm:text-xs font-bold hover:bg-gray-100 transition no-underline text-primary ${currentFilters.cat===c.name?'bg-primary text-white':''}">${c.name}</a>`).join('');
        }

        function getFilteredProducts() { 
            let list = currentData.products; 
            if(currentFilters.cat!=='all') list = list.filter(p => p.category===currentFilters.cat); 
            if(currentFilters.minPrice) list = list.filter(p => p.price>=currentFilters.minPrice); 
            if(currentFilters.maxPrice) list = list.filter(p => p.price<=currentFilters.maxPrice); 
            return list; 
        }
        function filterByCategory(cat) { currentFilters.cat=cat; productsDisplayLimit=12; renderProducts(getFilteredProducts()); if(cat==='all') updateURL('/products','All Products'); else updateURL('/category/'+getCategorySlug(cat),cat); }
        function applyPriceFilter() { currentFilters.minPrice=parseFloat(document.getElementById('filter-min-price').value)||null; currentFilters.maxPrice=parseFloat(document.getElementById('filter-max-price').value)||null; productsDisplayLimit=12; renderProducts(getFilteredProducts()); }
        function loadMoreProducts() { productsDisplayLimit+=productsLoadMoreIncrement; renderProducts(getFilteredProducts()); }
        function toggleMobileFilters() { const mf=document.getElementById('mobile-filters'); mf.classList.toggle('hidden'); }
        function applyMobileFilters() { applyPriceFilter(); toggleMobileFilters(); }
        function toggleSortMenu() { document.getElementById('sort-dropdown').classList.toggle('hidden'); }
        function handleSorting(type,label) { document.getElementById('current-sort-label').innerText=label; document.getElementById('sort-dropdown').classList.add('hidden'); let sorted=[...getFilteredProducts()]; if(type==='price-low') sorted.sort((a,b)=>a.price-b.price); else if(type==='price-high') sorted.sort((a,b)=>b.price-a.price); else sorted.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)); productsDisplayLimit=12; renderProducts(sorted); }

        // ========== PRODUCT CARD ==========
        function productCard(p) { 
            const isOut=p.stock<=0, wished=(window.wishlist||[]).includes(p.id); 
            return `<a href="/product/${getProductSlug(p)}" class="product-card bg-white rounded-2xl overflow-hidden border border-gray-100 cursor-pointer group no-underline block"><div class="product-img-container" style="aspect-ratio:3/4;"><img src="${p.img}" alt="${p.title}" class="product-image w-full h-full object-cover" loading="lazy"><button onclick="event.preventDefault();event.stopPropagation();if(typeof toggleWishlist==='function')toggleWishlist(${p.id})" class="absolute top-2 right-2 sm:top-3 sm:right-3 w-7 h-7 sm:w-8 sm:h-8 bg-white/90 backdrop-blur-xl rounded-full flex items-center justify-center ${wished?'text-red-500':'text-gray-400'} active:scale-95 transition border border-gray-100"><i class="fa-${wished?'solid':'regular'} fa-heart text-[10px] sm:text-xs"></i></button>${isOut?'<div class="absolute inset-0 bg-white/70 backdrop-blur-sm flex items-center justify-center"><span class="bg-primary text-white text-[8px] sm:text-[10px] font-black px-2 sm:px-3 py-1 rounded-full uppercase">Sold Out</span></div>':''}${p.is_new_arrival&&!isOut?'<div class="absolute top-2 left-2 sm:top-3 sm:left-3"><span class="badge-new px-2 py-0.5 rounded-full text-[7px] sm:text-[8px] font-black uppercase backdrop-blur-xl bg-white/80 border border-black/5">New</span></div>':''}</div><div class="p-2.5 sm:p-4"><p class="text-[9px] sm:text-[10px] font-bold text-accent uppercase mb-0.5 sm:mb-1">${p.category}</p><h3 class="font-bold text-xs sm:text-sm text-primary truncate mb-1.5 sm:mb-2">${p.title}</h3><div class="flex justify-between items-end"><div><span class="font-black text-xs sm:text-sm text-primary">৳ ${p.price}</span>${p.old_price?`<span class="text-[9px] sm:text-[10px] text-accent line-through ml-1">৳${p.old_price}</span>`:''}</div><button onclick="event.preventDefault();event.stopPropagation();if(typeof addToCart==='function')addToCart(${p.id},null)" ${isOut?'disabled':''} class="w-7 h-7 sm:w-8 sm:h-8 ${isOut?'bg-gray-100':'bg-primary hover:bg-blue'} text-white rounded-full flex items-center justify-center text-[10px] sm:text-xs transition active:scale-90"><i class="fa-solid fa-plus"></i></button></div></div></a>`; 
        }
        
        function renderProducts(list) { 
            const grid=document.getElementById('products-grid'); if(!grid) return;
            const total=list.length; 
            const display=list.slice(0,productsDisplayLimit); 
            document.getElementById('product-count').innerText = `Showing ${Math.min(productsDisplayLimit,total)} of ${total} products`;
            let html=display.length?display.map(p=>productCard(p).replace('class="product-card','class="product-card product-card-enter')).join(''):'<div class="col-span-full text-center py-20"><p class="text-accent text-lg">No products found</p></div>'; 
            if(total>productsDisplayLimit) html+=`<div class="col-span-full mt-8 text-center"><button onclick="loadMoreProducts()" class="px-8 py-3 bg-primary text-white rounded-full font-bold uppercase text-xs tracking-wider hover:bg-blue transition">Load More (${total-productsDisplayLimit} remaining)</button></div>`; 
            grid.innerHTML=html; 
        }

        function renderRecentlyViewed() {
            const grid=document.getElementById('recent-products-grid'), section=document.getElementById('recent-products-section');
            if(!grid) return;
            const recent=JSON.parse(localStorage.getItem('recently_viewed')||'[]').filter(id=>currentData.products.find(p=>p.id==id));
            if(!recent.length){section.classList.add('hidden');return;}section.classList.remove('hidden');
            grid.innerHTML=recent.map(id=>productCard(currentData.products.find(p=>p.id==id))).join('');
        }
        
        function renderNews(list) {
            const grid=document.getElementById('news-grid'); if(!grid) return;
            if(!list||!list.length){grid.innerHTML='<div class="col-span-full text-center py-20"><p class="text-accent text-lg">No articles yet</p></div>';return;}
            grid.innerHTML=list.map(n=>`<article class="bg-white/70 backdrop-blur-xl rounded-2xl overflow-hidden border border-gray-100 hover:shadow-xl transition"><img src="${n.img}" alt="${n.title}" class="w-full h-48 object-cover" loading="lazy"><div class="p-4 sm:p-6"><time class="text-[10px] font-bold uppercase text-accent">${new Date(n.date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</time><h3 class="font-black text-lg mt-2 mb-3 text-primary">${n.title}</h3><p class="text-xs text-accent line-clamp-3">${n.excerpt}</p><a href="${n.link||'#'}" class="inline-flex items-center gap-2 mt-4 text-xs font-bold text-blue no-underline hover:gap-3 transition">Read More <i class="fa-solid fa-arrow-right text-[10px]"></i></a></div></article>`).join('');
        }

        function renderWishlist() {
            const grid=document.getElementById('wishlist-grid'), empty=document.getElementById('empty-wishlist');
            if(!grid) return;
            const list=(window.wishlist||[]).map(id=>currentData.products.find(p=>p.id==id)).filter(Boolean);
            if(!list.length){grid.innerHTML='';empty.classList.remove('hidden');return;}empty.classList.add('hidden');
            grid.innerHTML=list.map(p=>productCard(p)).join('');
        }

        // ========== CAROUSEL FUNCTIONS ==========
        function calculateCarouselLayout(products) {
            const count = products.length;
            if (count === 0) {
                return {
                    leftCount: 0, centerIndex: null, rightCount: 0, totalCount: 0,
                    centerDisplayIndex: null, leftProducts: [], centerProduct: null,
                    rightProducts: [], allPositioned: []
                };
            }
            const leftCount = count >> 1;
            const centerIndex = leftCount;
            const rightCount = count - leftCount - 1;
            const leftProducts = products.slice(0, leftCount);
            const centerProduct = products[centerIndex];
            const rightProducts = products.slice(centerIndex + 1);
            const allPositioned = products.map((product, index) => ({
                product,
                position: index < centerIndex ? 'left' : index === centerIndex ? 'center' : 'right',
                displayIndex: index + 1,
                distanceFromCenter: index - centerIndex
            }));
            return {
                leftCount, centerIndex, rightCount, totalCount: count,
                centerDisplayIndex: centerIndex + 1, leftProducts, centerProduct,
                rightProducts, allPositioned,
                isBalanced: count % 2 !== 0 ? (leftCount === rightCount) : (leftCount === rightCount + 1)
            };
        }

        function initCarousel(carouselId) { 
            if(!carouselStates[carouselId]) carouselStates[carouselId] = { 
                isPaused:false, animationFrame:null, lastTimestamp:0, isDragging:false, 
                touchStartX:0, touchStartY:0, touchStartScrollLeft:0, hasMoved:false, 
                swipeDirection:null, baseSpeed:parseFloat(document.getElementById(carouselId)?.dataset.speed)||0.5, 
                currentIndex:0, totalCards:0, _resumeTimeout:null, _isAnimating:false, layout: null
            }; 
            return carouselStates[carouselId]; 
        }
        
        function getCardDimensions(carousel) { 
            const card=carousel.querySelector('.carousel-card'); 
            if(!card) return {width:280,gap:20}; 
            const gap=parseInt(getComputedStyle(carousel).gap)||20; 
            return {width:card.offsetWidth,gap:gap}; 
        }

        function snapToCard(carouselId, targetIndex) {
            const carousel=document.getElementById(carouselId); 
            if(!carousel) return;
            const state=initCarousel(carouselId); 
            const {width,gap}=getCardDimensions(carousel);
            const cardTotal = width + gap;
            const scrollTarget = targetIndex * cardTotal;
            state._isAnimating = true;
            carousel.classList.add('smooth-scroll');
            carousel.scrollTo({ left: scrollTarget, behavior: 'smooth' });
            state.currentIndex = targetIndex;
            updateActiveCard(carouselId); 
            updateDots(carouselId);
            setTimeout(() => { state._isAnimating = false; }, 500);
        }

        function autoScrollCarousel(carouselId, timestamp) {
            const carousel=document.getElementById(carouselId); 
            if(!carousel) return;
            const state=initCarousel(carouselId);
            if(state.isPaused||state.isDragging||state._isAnimating){
                state.animationFrame=requestAnimationFrame((ts)=>autoScrollCarousel(carouselId,ts));
                return;
            }
            if(!state.lastTimestamp) state.lastTimestamp=timestamp;
            const delta=Math.min(timestamp-state.lastTimestamp,32);
            carousel.scrollLeft += delta * state.baseSpeed * 0.03;
            const {width,gap}=getCardDimensions(carousel); 
            const cardTotal=width+gap;
            const currentCardIndex = Math.round(carousel.scrollLeft / cardTotal);
            if(currentCardIndex !== state.currentIndex && currentCardIndex >= 0 && currentCardIndex < state.totalCards) {
                state.currentIndex = currentCardIndex; 
                updateActiveCard(carouselId); 
                updateDots(carouselId);
            }
            const maxScroll = (state.totalCards - 1) * cardTotal + 10;
            if(carousel.scrollLeft >= maxScroll) { 
                carousel.scrollLeft = 0; 
                state.currentIndex = 0; 
                updateActiveCard(carouselId); 
                updateDots(carouselId); 
            }
            state.lastTimestamp = timestamp;
            state.animationFrame = requestAnimationFrame((ts)=>autoScrollCarousel(carouselId,ts));
        }

        function updateActiveCard(carouselId) {
            const carousel=document.getElementById(carouselId); 
            if(!carousel) return;
            const {width,gap}=getCardDimensions(carousel); 
            const cardTotal=width+gap;
            const currentIndex = Math.round(carousel.scrollLeft / cardTotal);
            carousel.querySelectorAll('.carousel-card').forEach((card,i) => { 
                card.classList.toggle('snap-active', i === currentIndex); 
                card.setAttribute('data-display-index', i + 1);
            });
        }
        
        function updateDots(carouselId) {
            const carousel=document.getElementById(carouselId);
            const dotsContainer=document.getElementById(carouselId.replace('carousel','dots'));
            if(!carousel||!dotsContainer) return;
            const state=initCarousel(carouselId); 
            const {width,gap}=getCardDimensions(carousel); 
            const cardTotal=width+gap;
            const currentIndex = Math.max(0, Math.min(Math.round(carousel.scrollLeft / cardTotal), state.totalCards - 1));
            dotsContainer.querySelectorAll('.carousel-dot').forEach((dot,i) => { 
                dot.classList.toggle('active', i === currentIndex); 
                dot.setAttribute('data-display-index', i + 1);
            });
        }

        function startCarouselAutoScroll(carouselId) { 
            const carousel=document.getElementById(carouselId); 
            if(!carousel) return; 
            const state=initCarousel(carouselId); 
            state.isPaused=false; 
            state.lastTimestamp=0; 
            if(state.animationFrame) cancelAnimationFrame(state.animationFrame); 
            state.animationFrame=requestAnimationFrame((ts)=>autoScrollCarousel(carouselId,ts)); 
        }
        
        function stopCarouselAutoScroll(carouselId) { 
            const state=carouselStates[carouselId]; 
            if(state&&state.animationFrame){
                cancelAnimationFrame(state.animationFrame);
                state.animationFrame=null;
            } 
        }

        function slideCarousel(carouselId, direction) {
            const carousel=document.getElementById(carouselId); 
            if(!carousel) return;
            const state=initCarousel(carouselId); 
            state.isPaused = true;
            const {width,gap}=getCardDimensions(carousel); 
            const cardTotal=width+gap;
            const currentCardIndex = Math.round(carousel.scrollLeft / cardTotal);
            let targetIndex = direction === 'next' ? Math.min(currentCardIndex + 1, state.totalCards - 1) : Math.max(currentCardIndex - 1, 0);
            snapToCard(carouselId, targetIndex);
            clearTimeout(state._resumeTimeout);
            state._resumeTimeout = setTimeout(() => { state.isPaused = false; state.lastTimestamp = 0; }, 3000);
        }
        
        function goToCarouselDot(carouselId, index) { 
            const carousel=document.getElementById(carouselId); 
            if(!carousel) return; 
            const state=initCarousel(carouselId); 
            state.isPaused = true; 
            snapToCard(carouselId, index); 
            clearTimeout(state._resumeTimeout); 
            state._resumeTimeout = setTimeout(() => { state.isPaused = false; state.lastTimestamp = 0; }, 3000); 
        }

        function renderCarouselProducts(carouselId, products) {
            const carousel = document.getElementById(carouselId); 
            if(!carousel) return;
            if(!products||!products.length) { 
                carousel.innerHTML='<div class="flex items-center justify-center w-full py-16"><p class="text-sm text-accent">No products available</p></div>'; 
                return; 
            }
            const state = initCarousel(carouselId);
            const layout = calculateCarouselLayout(products);
            state.layout = layout;
            state.totalCards = products.length;
            state.currentIndex = layout.centerIndex;
            
            carousel.innerHTML = products.map((p, index) => {
                const isOut=p.stock<=0, wished=(window.wishlist||[]).includes(p.id); 
                const displayIndex = index + 1;
                let badge='';
                if(!isOut){
                    if(p.is_new_arrival)badge='<span class="card-badge badge-new">New</span>';
                    else if(p.is_hot)badge='<span class="card-badge badge-hot">Hot</span>';
                    else if(p.is_on_sale)badge='<span class="card-badge badge-sale">Sale</span>';
                    else if(p.is_limited_edition)badge='<span class="card-badge badge-limited">Limited</span>';
                    else if(p.is_featured)badge='<span class="card-badge badge-featured">Featured</span>';
                }
                return `<a href="/product/${getProductSlug(p)}" class="carousel-card" draggable="false" data-display-index="${displayIndex}" data-layout-position="${index < layout.centerIndex ? 'left' : index > layout.centerIndex ? 'right' : 'center'}"><div class="card-img"><img src="${p.img}" alt="${p.title}" loading="lazy" draggable="false">${badge}<button onclick="event.preventDefault();event.stopPropagation();if(typeof toggleWishlist==='function')toggleWishlist(${p.id})" class="card-wishlist-btn ${wished?'wished':''}"><i class="fa-${wished?'solid':'regular'} fa-heart"></i></button>${isOut?'<div class="card-soldout-overlay"><span>Sold Out</span></div>':''}</div><div class="card-body"><span class="card-category">${p.category}</span><h3 class="card-title">${p.title}</h3><div class="card-price-row"><div><span class="card-price">৳${p.price}</span>${p.old_price?`<span class="card-old-price">৳${p.old_price}</span>`:''}</div><button onclick="event.preventDefault();event.stopPropagation();if(typeof addToCart==='function')addToCart(${p.id},null)" class="card-add-btn ${isOut?'disabled':''}" ${isOut?'disabled':''}><i class="fa-solid fa-plus"></i></button></div></div></a>`;
            }).join('');
            
            const dotsContainer = document.getElementById(carouselId.replace('carousel','dots'));
            if(dotsContainer) {
                dotsContainer.innerHTML = products.map((_,i) => {
                    const isCenter = i === layout.centerIndex;
                    return `<div class="carousel-dot ${i===layout.centerIndex?'active':''}" onclick="goToCarouselDot('${carouselId}',${i})" data-layout-position="${isCenter ? 'center' : i < layout.centerIndex ? 'left' : 'right'}"></div>`;
                }).join('');
            }
            
            setTimeout(() => { snapToCard(carouselId, layout.centerIndex); }, 100);
        }

        function renderHomepageSections() {
            if (!currentData.products || currentData.products.length === 0) return;
            
            const sections = [
                {id:'new-arrivals-section', carousel:'new-arrivals-carousel', products: currentData.products.filter(p => p.is_new_arrival === true), name: 'New Arrivals'},
                {id:'hot-products-section', carousel:'hot-products-carousel', products: currentData.products.filter(p => p.is_hot === true), name: 'Hot Products'},
                {id:'featured-products-section', carousel:'featured-products-carousel', products: currentData.products.filter(p => p.is_featured === true), name: 'Featured'},
                {id:'best-selling-section', carousel:'best-selling-carousel', products: currentData.products.filter(p => p.is_best === true), name: 'Best Sellers'},
                {id:'on-sale-section', carousel:'on-sale-carousel', products: currentData.products.filter(p => p.is_on_sale === true), name: 'On Sale'},
                {id:'limited-edition-section', carousel:'limited-edition-carousel', products: currentData.products.filter(p => p.is_limited_edition === true), name: 'Limited Edition'}
            ];
            
            sections.forEach((sec, i) => { 
                const el = document.getElementById(sec.id); 
                if (!el) return;
                if (sec.products && sec.products.length > 0) {
                    el.classList.remove('hidden');
                    renderCarouselProducts(sec.carousel, sec.products);
                    setTimeout(() => {
                        startCarouselAutoScroll(sec.carousel);
                        el.classList.add('visible');
                    }, i * 100);
                } else {
                    el.classList.add('hidden');
                }
            });
        }

        function cleanupAllCarousels() { 
            ['new-arrivals-carousel','hot-products-carousel','featured-products-carousel','best-selling-carousel','on-sale-carousel','limited-edition-carousel'].forEach(id=>stopCarouselAutoScroll(id)); 
        }

        // ========== TOUCH & MOUSE DRAG SUPPORT ==========
        function initCarouselTouchSupport() {
            const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            document.querySelectorAll('.carousel-track').forEach(carousel => {
                const state = initCarousel(carousel.id);
                const THRESHOLD = 15;
                carousel.addEventListener('touchstart', (e) => { 
                    state.touchStartX = e.touches[0].pageX; state.touchStartY = e.touches[0].pageY; 
                    state.touchStartScrollLeft = carousel.scrollLeft; state.hasMoved = false; 
                    state.isDragging = true; state.swipeDirection = null; state.isPaused = true; 
                    carousel.classList.remove('smooth-scroll'); 
                }, { passive: true });
                carousel.addEventListener('touchmove', (e) => { 
                    if(state.swipeDirection === 'vertical') return; 
                    const deltaX = e.touches[0].pageX - state.touchStartX; 
                    const deltaY = e.touches[0].pageY - state.touchStartY; 
                    const absX = Math.abs(deltaX); const absY = Math.abs(deltaY); 
                    if(!state.swipeDirection && (absX > THRESHOLD || absY > THRESHOLD)) 
                        state.swipeDirection = absX > absY ? 'horizontal' : 'vertical'; 
                    if(state.swipeDirection === 'horizontal' && absX > THRESHOLD) { 
                        if(!state.hasMoved) state.hasMoved = true; 
                        carousel.scrollLeft = state.touchStartScrollLeft - deltaX; 
                        updateActiveCard(carousel.id); updateDots(carousel.id); 
                    } 
                }, { passive: true });
                carousel.addEventListener('touchend', () => { handleDragEnd(carousel, state); });
                if (!isTouchDevice) {
                    carousel.addEventListener('mousedown', (e) => {
                        e.preventDefault();
                        state.touchStartX = e.pageX; state.touchStartY = e.pageY;
                        state.touchStartScrollLeft = carousel.scrollLeft; state.hasMoved = false;
                        state.isDragging = true; state.swipeDirection = null; state.isPaused = true;
                        carousel.classList.remove('smooth-scroll'); carousel.style.cursor = 'grabbing';
                    });
                    window.addEventListener('mousemove', (e) => {
                        if (!state.isDragging || state.swipeDirection === 'vertical') return;
                        const deltaX = e.pageX - state.touchStartX; const deltaY = e.pageY - state.touchStartY;
                        const absX = Math.abs(deltaX); const absY = Math.abs(deltaY);
                        if (!state.swipeDirection && (absX > THRESHOLD || absY > THRESHOLD)) {
                            state.swipeDirection = absX > absY ? 'horizontal' : 'vertical';
                            if (state.swipeDirection === 'vertical') {
                                state.isDragging = false; carousel.style.cursor = 'grab';
                                carousel.classList.add('smooth-scroll'); return;
                            }
                        }
                        if (state.swipeDirection === 'horizontal' && absX > THRESHOLD) {
                            state.hasMoved = true;
                            carousel.scrollLeft = state.touchStartScrollLeft - deltaX;
                            updateActiveCard(carousel.id); updateDots(carousel.id);
                        }
                    });
                    window.addEventListener('mouseup', () => { if (!state.isDragging) return; handleDragEnd(carousel, state); });
                    carousel.addEventListener('mouseleave', () => { if (state.isDragging) handleDragEnd(carousel, state); });
                }
            });
            function handleDragEnd(carousel, state) {
                carousel.classList.add('smooth-scroll'); carousel.style.cursor = isTouchDevice ? '' : 'grab';
                if (state.hasMoved) {
                    const {width, gap} = getCardDimensions(carousel); const cardTotal = width + gap;
                    const nearestIndex = Math.round(carousel.scrollLeft / cardTotal);
                    const targetIndex = Math.max(0, Math.min(nearestIndex, state.totalCards - 1));
                    snapToCard(carousel.id, targetIndex);
                }
                state.isDragging = false; state.hasMoved = false; state.swipeDirection = null;
                clearTimeout(state._resumeTimeout);
                state._resumeTimeout = setTimeout(() => { state.isPaused = false; state.lastTimestamp = 0; }, 2500);
            }
        }

        // ========== COOKIE FUNCTIONS ==========
        function handleCookieAccept() { localStorage.setItem('jayenware_consent','accepted'); document.getElementById('cookieConsent').classList.remove('show'); }
        function handleCookieDecline() { localStorage.setItem('jayenware_consent','declined'); document.getElementById('cookieConsent').classList.remove('show'); }

        document.addEventListener('click',e=>{if(!e.target.closest('#sort-container'))document.getElementById('sort-dropdown').classList.add('hidden');});
        window.addEventListener('popstate',function(){handleInitialRoute();});

        // ========== LOAD DATA ==========
        async function loadData() {
            try {
                const [hero, cats, prods, newsData] = await Promise.all([
                    fetchAPI('/api/hero'), 
                    fetchAPI('/api/categories'),
                    fetchAPI('/api/products'), 
                    fetchAPI('/api/news')
                ]);
                
                if(hero && hero.length) currentData.hero = hero;
                if(cats && cats.length) currentData.categories = cats;
                if(prods && prods.length) currentData.products = prods;
                if(newsData) currentData.news = newsData;
                
                renderHero();
                renderCategories();
                renderProducts(currentData.products);
                renderNews(currentData.news);
                renderHomepageSections();
                renderRecentlyViewed();
                handleInitialRoute();
            } catch(err) { 
                console.error('❌ Data load error:', err);
            }
        }

        function handleInitialRoute() {
            const path=window.location.pathname, sp=new URLSearchParams(window.location.search);
            if(path.startsWith('/product/')) return;
            if(path.startsWith('/category/')){const slug=path.replace('/category/','');const cat=currentData.categories.find(c=>getCategorySlug(c.name)===slug);if(cat){navigate('products');filterByCategory(cat.name);}return;}
            if(path==='/search'&&sp.get('q')){navigate('products');renderProducts(currentData.products.filter(p=>p.title.toLowerCase().includes(sp.get('q').toLowerCase())));return;}
            const routes={'/':'home','/products':'products','/wishlist':'wishlist','/journal':'news'}; navigate(routes[path]||'home');
        }

        window.onload = async () => {
            const consent = localStorage.getItem('jayenware_consent'); 
            if(!consent) {
                setTimeout(() => {
                    const cookieDiv = document.getElementById('cookieConsent');
                    if(cookieDiv) cookieDiv.classList.add('show');
                }, 2000);
            }
            
            await loadData();
            setTimeout(initCarouselTouchSupport, 500);
        };
    </script>
