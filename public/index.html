            <section id="on-sale-section" class="carousel-section hidden"><div class="carousel-container"><div class="carousel-header"><h2 class="section-title">On Sale</h2><a href="/products" onclick="event.preventDefault();navigate('products')" class="section-link">View All <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4.5 2.5L8 6L4.5 9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></a></div><div class="carousel-wrapper"><button onclick="slideCarousel('on-sale-carousel', 'prev')" class="carousel-nav prev"><i class="fa-solid fa-chevron-left"></i></button><div id="on-sale-carousel" class="carousel-track smooth-scroll"></div><button onclick="slideCarousel('on-sale-carousel', 'next')" class="carousel-nav next"><i class="fa-solid fa-chevron-right"></i></button></div><div class="carousel-dots-container" id="on-sale-dots"></div></div></section>
        </section>

        <section id="products" class="page-section py-6"><div class="max-w-7xl mx-auto px-4"><div class="flex flex-col lg:flex-row gap-4"><aside class="lg:w-64 shrink-0"><div class="bg-white/70 backdrop-blur-xl rounded-2xl p-4 border"><h3 class="font-black text-sm uppercase">Categories</h3><div id="sidebar-categories" class="space-y-1 mt-2"></div></div></aside><div class="flex-1"><div class="flex justify-between mb-4"><p id="product-count" class="text-xs font-medium"></p><div><button onclick="toggleSortMenu()" class="px-4 py-2 bg-white/70 rounded-xl text-xs font-bold">Sort <i class="fa-solid fa-chevron-down"></i></button><div id="sort-dropdown" class="hidden absolute mt-2 bg-white rounded-xl shadow-xl"><button onclick="handleSorting('newest','Newest')" class="block px-4 py-2 text-xs">Newest</button><button onclick="handleSorting('price-low','Low to High')" class="block px-4 py-2 text-xs">Price: Low to High</button><button onclick="handleSorting('price-high','High to Low')" class="block px-4 py-2 text-xs">Price: High to Low</button></div></div></div><div id="products-grid" class="grid grid-cols-2 lg:grid-cols-3 gap-3"></div></div></div></div></section>
        <section id="wishlist" class="page-section py-6"><div class="max-w-7xl mx-auto px-4 text-center"><h2 class="text-3xl font-black">Your Wishlist</h2><div id="wishlist-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mt-8"></div><div id="empty-wishlist" class="hidden py-20"><i class="fa-regular fa-heart text-6xl mb-4"></i><p>Your wishlist is empty</p><button onclick="navigate('products')" class="mt-4 px-6 py-2 bg-primary text-white rounded-full">Explore</button></div></div></section>
    </main>

    <div id="footer-container"></div>
    <div id="cookieConsent" class="cookie-consent-overlay"><div class="cookie-banner"><div class="cookie-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93z"/></svg></div><div class="cookie-text"><h4>We Value Your Privacy</h4><p>We use cookies. <a href="#" onclick="event.preventDefault();">Privacy Policy</a></p></div><div class="cookie-buttons"><button class="cookie-btn decline" onclick="handleCookieDecline()">Decline</button><button class="cookie-btn accept" onclick="handleCookieAccept()">Accept</button></div></div></div>

    <script>
        // ==================== COMPLETE APPLICATION ====================
        let currentData = { products: [], categories: [], news: [] };
        let currentFilters = { cat: 'all' };
        let wishlist = JSON.parse(localStorage.getItem('jw_wishlist') || '[]');
        let productsDisplayLimit = 12;
        const carouselStates = {};

        function getCategorySlug(c) { return c.toLowerCase().replace(/[^\w\s-]/g,'').replace(/[\s_]+/g,'-'); }
        function getProductSlug(p) { return (p.slug || p.title).toLowerCase().replace(/[^\w\s-]/g,'').replace(/[\s_]+/g,'-'); }
        function updateURL(path, title='') { window.history.pushState({}, title || 'JAYENWARE', path); }
        
        function navigate(pageId) {
            document.querySelectorAll('.page-section').forEach(s => { s.classList.remove('active-page','fade-in'); s.style.display = 'none'; });
            const target = document.getElementById(pageId);
            if(target) { target.style.display = 'block'; requestAnimationFrame(()=>{ target.classList.add('active-page','fade-in'); window.scrollTo({top:0}); }); }
            updateURL('/'+pageId);
            if(pageId === 'home') renderHomepageSections();
            if(pageId === 'wishlist') renderWishlist();
            if(pageId === 'products') renderProducts(getFilteredProducts());
        }
        
        function getFilteredProducts() { 
            let list = currentData.products; 
            if(currentFilters.cat !== 'all') list = list.filter(p => p.category === currentFilters.cat); 
            return list; 
        }
        function filterByCategory(cat) { currentFilters.cat = cat; productsDisplayLimit = 12; renderProducts(getFilteredProducts()); renderCategories(); }
        
        function renderCategories() {
            const container = document.getElementById('sidebar-categories');
            if(!container) return;
            let html = `<a href="#" onclick="event.preventDefault();filterByCategory('all')" class="block py-2 px-3 rounded-lg text-xs font-bold ${currentFilters.cat==='all'?'bg-primary text-white':'hover:bg-gray-100'}">All</a>`;
            html += currentData.categories.map(c => `<a href="#" onclick="event.preventDefault();filterByCategory('${c.name}')" class="block py-2 px-3 rounded-lg text-xs font-bold ${currentFilters.cat===c.name?'bg-primary text-white':'hover:bg-gray-100'}">${c.name}</a>`).join('');
            container.innerHTML = html;
        }
        
        function productCard(p) {
            const wished = wishlist.includes(p.id);
            const isOut = p.stock <= 0;
            return `<a href="/product/${getProductSlug(p)}" class="product-card bg-white rounded-2xl overflow-hidden border no-underline block">
                <div class="product-img-container"><img src="${p.img}" alt="${p.title}" loading="lazy"><button onclick="event.preventDefault();toggleWishlist(${p.id})" class="absolute top-2 right-2 w-7 h-7 bg-white/80 rounded-full flex items-center justify-center ${wished?'text-red-500':'text-gray-400'}"><i class="fa-${wished?'solid':'regular'} fa-heart text-xs"></i></button>${isOut?'<div class="absolute inset-0 bg-white/70 flex items-center justify-center"><span class="bg-primary text-white text-[10px] px-3 py-1 rounded-full">Sold Out</span></div>':''}</div>
                <div class="p-3"><p class="text-[9px] font-bold text-accent">${p.category}</p><h3 class="font-bold text-sm">${p.title}</h3><div class="flex justify-between mt-2"><span class="font-black">৳${p.price}</span><button onclick="event.preventDefault();addToCart(${p.id})" class="w-7 h-7 bg-primary text-white rounded-full flex items-center justify-center"><i class="fa-solid fa-plus text-[10px]"></i></button></div></div></a>`;
        }
        
        function renderProducts(list) { 
            const grid = document.getElementById('products-grid'); if(!grid) return;
            const display = list.slice(0, productsDisplayLimit);
            document.getElementById('product-count').innerText = `Showing ${Math.min(productsDisplayLimit, list.length)} of ${list.length}`;
            grid.innerHTML = display.map(p=>productCard(p)).join('');
            if(list.length > productsDisplayLimit) grid.innerHTML += `<div class="col-span-full text-center mt-6"><button onclick="productsDisplayLimit+=12;renderProducts(getFilteredProducts())" class="px-6 py-2 bg-primary text-white rounded-full text-xs">Load More</button></div>`;
        }
        
        function renderWishlist() { 
            const grid = document.getElementById('wishlist-grid'); const empty = document.getElementById('empty-wishlist');
            const items = wishlist.map(id => currentData.products.find(p=>p.id==id)).filter(Boolean);
            if(!items.length) { grid.innerHTML=''; if(empty) empty.classList.remove('hidden'); return; }
            if(empty) empty.classList.add('hidden');
            grid.innerHTML = items.map(p=>productCard(p)).join('');
        }
        
        function toggleWishlist(id) { 
            if(wishlist.includes(id)) wishlist = wishlist.filter(i=>i!==id); 
            else wishlist.push(id);
            localStorage.setItem('jw_wishlist', JSON.stringify(wishlist));
            if(document.getElementById('wishlist')?.classList.contains('active-page')) renderWishlist();
            if(document.getElementById('home')?.classList.contains('active-page')) renderHomepageSections();
            if(document.getElementById('products')?.classList.contains('active-page')) renderProducts(getFilteredProducts());
        }
        
        function addToCart(id) { alert(`🛒 Added product ${id} to cart (demo)`); }
        
        function handleSorting(type,label) { 
            let sorted = [...getFilteredProducts()];
            if(type==='price-low') sorted.sort((a,b)=>a.price-b.price);
            else if(type==='price-high') sorted.sort((a,b)=>b.price-a.price);
            else sorted.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
            productsDisplayLimit=12; renderProducts(sorted);
        }
        function toggleSortMenu() { document.getElementById('sort-dropdown')?.classList.toggle('hidden'); }
        
        // Carousel
        function renderCarouselProducts(carouselId, products) {
            const carousel = document.getElementById(carouselId); if(!carousel) return;
            if(!products.length) { carousel.innerHTML='<div class="py-16 text-center">No items</div>'; return; }
            carousel.innerHTML = products.map(p=>`
                <a href="/product/${getProductSlug(p)}" class="carousel-card" draggable="false">
                    <div class="card-img"><img src="${p.img}" alt="${p.title}" loading="lazy">
                        <button onclick="event.preventDefault();toggleWishlist(${p.id})" class="card-wishlist-btn ${wishlist.includes(p.id)?'wished':''}"><i class="fa-${wishlist.includes(p.id)?'solid':'regular'} fa-heart"></i></button>
                        ${p.stock<=0?'<div class="card-soldout-overlay"><span>Sold Out</span></div>':''}
                    </div>
                    <div class="card-body"><span class="card-category">${p.category}</span><h3 class="card-title">${p.title}</h3><div class="card-price-row"><span class="card-price">৳${p.price}</span><button onclick="event.preventDefault();addToCart(${p.id})" class="card-add-btn"><i class="fa-solid fa-plus"></i></button></div></div>
                </a>`).join('');
            const dotsContainer = document.getElementById(carouselId.replace('carousel', 'dots'));
            if(dotsContainer) dotsContainer.innerHTML = products.map((_,i)=>`<div class="carousel-dot" onclick="goToCarouselDot('${carouselId}',${i})"></div>`).join('');
            setTimeout(()=>{ snapToCard(carouselId, Math.floor(products.length/2)); }, 100);
        }
        function snapToCard(carouselId, idx) { const el=document.getElementById(carouselId); if(!el) return; const card=el.querySelector('.carousel-card'); if(!card) return; const w=card.offsetWidth+20; el.scrollTo({left:idx*w,behavior:'smooth'}); updateActiveCard(carouselId); updateDots(carouselId); }
        function updateActiveCard(carouselId) { const el=document.getElementById(carouselId); if(!el) return; const cards=el.querySelectorAll('.carousel-card'); const scrollLeft=el.scrollLeft; const w=cards[0]?.offsetWidth+20||0; const idx=Math.round(scrollLeft/w); cards.forEach((c,i)=>c.classList.toggle('snap-active',i===idx)); }
        function updateDots(carouselId){ const el=document.getElementById(carouselId); const dotsCont=document.getElementById(carouselId.replace('carousel','dots')); if(!el||!dotsCont) return; const scrollLeft=el.scrollLeft; const w=el.querySelector('.carousel-card')?.offsetWidth+20||0; const idx=Math.round(scrollLeft/w); dotsCont.querySelectorAll('.carousel-dot').forEach((d,i)=>d.classList.toggle('active',i===idx)); }
        function slideCarousel(carouselId, dir){ const el=document.getElementById(carouselId); if(!el) return; const w=el.querySelector('.carousel-card')?.offsetWidth+20||0; const curIdx=Math.round(el.scrollLeft/w); const total=el.querySelectorAll('.carousel-card').length; let nxt= dir==='next'? Math.min(curIdx+1,total-1): Math.max(curIdx-1,0); snapToCard(carouselId,nxt); }
        function goToCarouselDot(carouselId, idx){ snapToCard(carouselId, idx); }
        
        // NEW CATEGORY RENDER: 2 per row, NO border-radius, BIG & BROAD images (aspect 3/2)
        function renderCategoryCards() {
            const grid = document.getElementById('categories-grid'); const section = document.getElementById('categories-section');
            if(!grid || !currentData.categories.length) { if(section) section.classList.add('hidden'); return; }
            section.classList.remove('hidden');
            grid.innerHTML = currentData.categories.map(cat => {
                const bgImg = cat.image || cat.img || 'https://placehold.co/1200x800/f5f5f7/1d1d1f?text='+encodeURIComponent(cat.name);
                return `<a href="/category/${getCategorySlug(cat.name)}" onclick="event.preventDefault();navigate('products');filterByCategory('${cat.name}')" class="category-card-new">
                            <img src="${bgImg}" alt="${cat.name}" class="cat-img" loading="lazy">
                            <div class="cat-overlay"></div>
                            <div class="cat-content">
                                <h3 class="cat-title">${cat.name}</h3>
                                <span class="cat-cta">Explore <i class="fa-solid fa-arrow-right text-[10px]"></i></span>
                            </div>
                         </a>`;
            }).join('');
        }
        
        function renderHomepageSections() {
            if(!currentData.products.length) return;
            renderCategoryCards();
            const sections = [
                { id:'new-arrivals-section', carousel:'new-arrivals-carousel', items: currentData.products.filter(p=>p.is_new_arrival) },
                { id:'hot-products-section', carousel:'hot-products-carousel', items: currentData.products.filter(p=>p.is_hot) },
                { id:'featured-products-section', carousel:'featured-products-carousel', items: currentData.products.filter(p=>p.is_featured) },
                { id:'best-selling-section', carousel:'best-selling-carousel', items: currentData.products.filter(p=>p.is_best) },
                { id:'on-sale-section', carousel:'on-sale-carousel', items: currentData.products.filter(p=>p.is_on_sale) }
            ];
            sections.forEach(sec=>{ const el=document.getElementById(sec.id); if(el && sec.items.length){ el.classList.remove('hidden'); renderCarouselProducts(sec.carousel, sec.items); setTimeout(()=>el.classList.add('visible'),50); } else if(el) el.classList.add('hidden'); });
        }
        
        // mock data
        async function loadData() {
            currentData.categories = [{ name:"Men's Wear", image:"https://images.pexels.com/photos/1043474/pexels-photo-1043474.jpeg?auto=compress&cs=tinysrgb&w=1200" },{ name:"Women's Wear", image:"https://images.pexels.com/photos/10026491/pexels-photo-10026491.jpeg?auto=compress&cs=tinysrgb&w=1200" },{ name:"Accessories", image:"https://images.pexels.com/photos/909701/pexels-photo-909701.jpeg?auto=compress&cs=tinysrgb&w=1200" },{ name:"Footwear", image:"https://images.pexels.com/photos/1598508/pexels-photo-1598508.jpeg?auto=compress&cs=tinysrgb&w=1200" }];
            currentData.products = [
                { id:1, title:"Oversized Graphic Tee", category:"Men's Wear", price:890, old_price:1290, img:"https://images.pexels.com/photos/1656684/pexels-photo-1656684.jpeg?auto=compress&cs=tinysrgb&w=600", is_new_arrival:true, stock:20, created_at:"2025-02-01" },
                { id:2, title:"Linen Cotton Shirt", category:"Men's Wear", price:1490, img:"https://images.pexels.com/photos/1040427/pexels-photo-1040427.jpeg?auto=compress&cs=tinysrgb&w=600", is_hot:true, stock:15 },
                { id:3, title:"Silk Saree", category:"Women's Wear", price:3490, old_price:4990, img:"https://images.pexels.com/photos/5366605/pexels-photo-5366605.jpeg?auto=compress&cs=tinysrgb&w=600", is_featured:true, is_on_sale:true, stock:8 },
                { id:4, title:"Leather Handbag", category:"Accessories", price:2590, img:"https://images.pexels.com/photos/1152077/pexels-photo-1152077.jpeg?auto=compress&cs=tinysrgb&w=600", is_best:true, stock:5 },
                { id:5, title:"Minimalist Sneakers", category:"Footwear", price:1890, img:"https://images.pexels.com/photos/1598508/pexels-photo-1598508.jpeg?auto=compress&cs=tinysrgb&w=600", is_new_arrival:true, stock:12 },
                { id:6, title:"Denim Jacket", category:"Men's Wear", price:2990, img:"https://images.pexels.com/photos/322207/pexels-photo-322207.jpeg?auto=compress&cs=tinysrgb&w=600", is_hot:true, stock:7 }
            ];
            renderCategories(); renderProducts(currentData.products); renderHomepageSections();
            handleInitialRoute();
        }
        
        function handleInitialRoute() { navigate('home'); }
        function handleCookieAccept() { localStorage.setItem('jayenware_consent', 'accepted'); document.getElementById('cookieConsent').classList.remove('show'); }
        function handleCookieDecline() { localStorage.setItem('jayenware_consent', 'declined'); document.getElementById('cookieConsent').classList.remove('show'); }
        
        window.onload = () => {
            if(!localStorage.getItem('jayenware_consent')) setTimeout(()=>document.getElementById('cookieConsent').classList.add('show'),1500);
            loadData();
            document.addEventListener('click',(e)=>{ if(!e.target.closest('#sort-container')) document.getElementById('sort-dropdown')?.classList.add('hidden'); });
            window.navigate = navigate; window.filterByCategory = filterByCategory; window.toggleWishlist = toggleWishlist; window.addToCart = addToCart; window.handleSorting = handleSorting; window.toggleSortMenu = toggleSortMenu; window.slideCarousel = slideCarousel; window.goToCarouselDot = goToCarouselDot; window.handleCookieAccept = handleCookieAccept; window.handleCookieDecline = handleCookieDecline;
        };
    </script>
</body>
</html>
