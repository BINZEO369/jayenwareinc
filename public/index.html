            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.7) 30%,
                rgba(255, 255, 255, 0.9) 50%,
                rgba(255, 255, 255, 0.7) 70%,

            border-radius: 3px;
            background: rgba(255,255,255,0.05);
            margin-bottom: 10px;

        .footer-sk-link:nth-child(odd) { width: 70%; }

        .footer-sk-cols {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        /* ==================== WISHLIST SKELETON ==================== */
        .wishlist-sk-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        @media (min-width: 1024px) {
            .wishlist-sk-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 20px;

        .wishlist-sk-card .product-sk-img {

        /* ==================== LOADING OVERLAY ==================== */
        .sk-loading-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .sk-loading-overlay.active {
            opacity: 1;

        .sk-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--sk-base);
            border-top-color: var(--primary);

        /* ==================== ENHANCED MOBILE TOUCH CAROUSEL ==================== */
        .carousel-section {
            padding: 48px 0;
            background: #ffffff;
            touch-action: pan-y pinch-zoom;

        .carousel-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 40px;

        .carousel-header {

            align-items: center;
            justify-content: space-between;

            font-family: var(--font-body);

        .carousel-header .section-link:hover {
            gap: 8px;

        .carousel-wrapper {
            position: relative;
            overflow: hidden;
        }

        .carousel-track {
            display: flex;
            gap: var(--card-gap);
            overflow-x: auto;
            overflow-y: hidden;
            scroll-behavior: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            cursor: grab;
            padding: 4px;
            scroll-snap-type: none;
            touch-action: pan-x pan-y;
        }

        .carousel-track::-webkit-scrollbar {
            display: none;
        }

        .carousel-track:active {
            cursor: grabbing;
        }

        .carousel-track.dragging {
            scroll-behavior: auto;
        }

        /* Product Card - Enhanced Touch Feedback */
        .carousel-card {
            flex: 0 0 auto;
            width: var(--card-width);
            scroll-snap-align: none;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            position: relative;
            background: transparent;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .carousel-card:active {
            transform: scale(0.96);
            transition: transform 0.1s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        @media (hover: hover) {
            .carousel-card:hover {
                transform: translateY(-2px);
            }
            .carousel-card:active {
                transform: scale(0.98);
            }
        }

        .carousel-card .card-img {
            position: relative;
            aspect-ratio: 3/4;
            background: #fafafa;
            overflow: hidden;
            margin-bottom: 12px;
            border-radius: 0;
        }

        .carousel-card .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);

        @media (hover: hover) {

                transform: scale(1.03);

        }

        .carousel-card .card-body {

            flex-direction: column;
            gap: 4px;

        .carousel-card .card-title {

            font-weight: 500;
            color: var(--primary);

            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;

            font-family: var(--font-body);

        .carousel-card .card-price {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
            font-family: var(--font-body);
        }

        .carousel-card .card-old-price {

            text-decoration: line-through;
            margin-left: 6px;
            font-weight: 400;
            font-family: var(--font-body);
        }

        .carousel-card .card-category {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            color: var(--accent);
            font-family: var(--font-accent);
            letter-spacing: var(--tracking-wide);
        }

        /* Badges - Clean & Modern */
        .carousel-card .card-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            z-index: 2;
            padding: 2px 8px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            background: #ffffff;
            color: var(--primary);
            pointer-events: none;
            font-family: var(--font-body);
            letter-spacing: var(--tracking-wide);
        }

        .badge-sale {

        }

        /* Quick Add Button - Mobile Optimized */
        .carousel-card .card-add-btn {
            position: absolute;
            bottom: 60px;
            right: 8px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #ffffff;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;

            transition: all 0.15s cubic-bezier(0.25, 0.1, 0.25, 1);

            touch-action: manipulation;
        }

        @media (hover: hover) {
            .carousel-card .card-add-btn {

            .carousel-card:hover .card-add-btn {
                opacity: 1;
                transform: translateY(0);

            .carousel-card .card-add-btn:hover {

        .carousel-card .card-add-btn:active {

        /* Sold Out Overlay */
        .carousel-card .card-soldout-overlay {

        .carousel-card .card-soldout-overlay span {

            letter-spacing: var(--tracking-wider);
        }

        /* Navigation Arrows - Simple & Elegant */
        .carousel-nav {
            position: absolute;
            top: 35%;
            transform: translateY(-50%);
            z-index: 20;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #ffffff;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--primary);
            font-size: 14px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        @media (hover: hover) {
            .carousel-nav {
                opacity: 0;
            }
            .carousel-wrapper:hover .carousel-nav {
                opacity: 1;
            }
            .carousel-nav:hover {
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
                transform: translateY(-50%) scale(1.05);
            }
        }

        .carousel-nav:active {
            transform: translateY(-50%) scale(0.9);
            transition: transform 0.1s cubic-bezier(0.25, 0.1, 0.25, 1);
            background: #f5f5f7;
        }

        .carousel-nav.prev {
            left: -20px;
        }

        .carousel-nav.next {
            right: -20px;
        }

        /* Scroll Progress Indicator - Mobile Only */
        .scroll-progress {
            display: none;
            height: 2px;
            background: #e5e5ea;
            margin-top: 16px;
            border-radius: 2px;
            overflow: hidden;
        }

        .scroll-progress-bar {
            height: 100%;
            background: var(--primary);
            border-radius: 2px;
            transition: width 0.1s ease;
        }

        /* ==================== LIMITED EDITION DARK SECTION FIX ==================== */
        #limited-edition-section .carousel-card .card-title {
            color: #ffffff;
        }

        #limited-edition-section .carousel-card .card-price {
            color: #ffffff;
        }

        #limited-edition-section .carousel-card .card-old-price {
            color: #a1a1a6;
        }

        #limited-edition-section .carousel-card .card-category {
            color: #a1a1a6;
        }

        #limited-edition-section .carousel-card .card-badge {
            background: #2d2d2f;
            color: #ffffff;
        }

        #limited-edition-section .carousel-card .card-badge.badge-sale {
            color: #ff6b6b !important;
        }

        #limited-edition-section .carousel-card .card-soldout-overlay span {
            background: #ffffff;
            color: #1d1d1f;
        }

        #limited-edition-section .carousel-card .card-img {
            background: #2d2d2f;
        }

        #limited-edition-section .carousel-card .card-add-btn {
            background: rgba(255, 255, 255, 0.9);

            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        @media (hover: hover) {
            #limited-edition-section .carousel-card .card-add-btn:hover {
                background: #ffffff;
                color: #1d1d1f;
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);

        }

        #limited-edition-section .carousel-card .card-add-btn:active {
            background: #ffffff;
            color: #1d1d1f;
        }

        #limited-edition-section .scroll-progress {
            background: rgba(255, 255, 255, 0.2);
        }

        #limited-edition-section .scroll-progress-bar {
            background: #ffffff;
        }

        /* ==================== WORLD-CLASS CATEGORY SECTION ==================== */
        .categories-section {
            padding: 0;
            background: #ffffff;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0;
            max-width: 100%;
            margin: 0;
        }

        @media (min-width: 768px) {
            .categories-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 2px;
                background: #ffffff;
            }

        @media (min-width: 1024px) {
            .categories-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 2px;
            }
        }

        .category-card {
            position: relative;
            aspect-ratio: 1/1;
            overflow: hidden;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
            background: #1d1d1f;
            isolation: isolate;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        @media (min-width: 768px) {
            .category-card {
                aspect-ratio: 3/4;
            }
        }

        @media (min-width: 1024px) {
            .category-card {
                aspect-ratio: 4/3;
            }
        }

        .category-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                    rgba(0, 0, 0, 0) 0%,
                    rgba(0, 0, 0, 0.15) 40%,
                    rgba(0, 0, 0, 0.55) 80%,
                    rgba(0, 0, 0, 0.7) 100%);
            z-index: 2;
            transition: background 0.6s ease;
        }

        .category-card:active::after {
            background: linear-gradient(180deg,
                    rgba(0, 0, 0, 0.05) 0%,
                    rgba(0, 0, 0, 0.25) 40%,
                    rgba(0, 0, 0, 0.65) 80%,
                    rgba(0, 0, 0, 0.8) 100%);
        }

        @media (hover: hover) {
            .category-card:hover::after {
                background: linear-gradient(180deg,
                        rgba(0, 0, 0, 0.05) 0%,
                        rgba(0, 0, 0, 0.3) 40%,
                        rgba(0, 0, 0, 0.7) 80%,
                        rgba(0, 0, 0, 0.85) 100%);
            }
        }

        .category-card .cat-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
            z-index: 1;
            will-change: transform;
        }

        @media (hover: hover) {
            .category-card:hover .cat-image {

            }
        }

        .category-card:active .cat-image {

        }

        .category-card .cat-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 3;

        @media (min-width: 768px) {

        }

        @media (min-width: 1024px) {
            .category-card .cat-content {
                padding: 40px;

        @media (hover: hover) {

        .category-card .cat-title {
            font-size: 22px;
            line-height: 1.1;
            margin-bottom: 16px;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);

            letter-spacing: var(--tracking-tight);

        @media (min-width: 768px) {

            }
        }

        @media (min-width: 1024px) {

        .category-card .cat-link {

        .category-card .cat-link::after {

                --card-gap: 20px;

        .cookie-consent-overlay {

    <script>
        // ============================================================
        // JAYENWARE MAIN APPLICATION – PROFESSIONAL SKELETON LOADER SYSTEM
        // ============================================================

        // SKELETON MANAGEMENT
        const SKELETON_MAP = {
            'header': 'header-skeleton',
            'hero': 'hero-skeleton',
            'categories': 'categories-skeleton',
            'new-arrivals': 'new-arrivals-skeleton',
            'hot-products': 'hot-products-skeleton',
            'featured-products': 'featured-products-skeleton',
            'best-selling': 'best-selling-skeleton',
            'on-sale': 'on-sale-skeleton',
            'limited-edition': 'limited-edition-skeleton',
            'footer': 'footer-skeleton'
        };

        function showSkeleton(key) {
            const id = SKELETON_MAP[key];
            if (id) {
                const el = document.getElementById(id);
                if (el) {
                    el.classList.add('sk-visible');
                    el.classList.remove('sk-hidden');
                }
            }
            // Special cases for inline skeletons
            if (key === 'sidebar-categories') {
                const skel = document.getElementById('sidebar-categories-skeleton');
                if (skel) { skel.classList.add('sk-visible'); skel.classList.remove('sk-hidden'); }
            }
            if (key === 'products-grid') {
                const skel = document.getElementById('products-grid-skeleton');
                if (skel) { skel.classList.add('sk-visible'); skel.classList.remove('sk-hidden'); }
            }
            if (key === 'wishlist-grid') {
                const skel = document.getElementById('wishlist-grid-skeleton');
                if (skel) { skel.classList.add('sk-visible'); skel.classList.remove('sk-hidden'); }
            }
            if (key === 'news-grid') {
                const skel = document.getElementById('news-grid-skeleton');
                if (skel) { skel.classList.add('sk-visible'); skel.classList.remove('sk-hidden'); }
            }
        }

        function hideSkeleton(key) {
            const id = SKELETON_MAP[key];
            if (id) {
                const el = document.getElementById(id);
                if (el) {
                    el.classList.add('sk-hidden');
                    el.classList.remove('sk-visible');
                }
            }
            // Special cases for inline skeletons
            if (key === 'sidebar-categories') {
                const skel = document.getElementById('sidebar-categories-skeleton');
                if (skel) { skel.classList.add('sk-hidden'); skel.classList.remove('sk-visible'); }
            }
            if (key === 'products-grid') {
                const skel = document.getElementById('products-grid-skeleton');
                if (skel) { skel.classList.add('sk-hidden'); skel.classList.remove('sk-visible'); }
            }
            if (key === 'wishlist-grid') {
                const skel = document.getElementById('wishlist-grid-skeleton');
                if (skel) { skel.classList.add('sk-hidden'); skel.classList.remove('sk-visible'); }
            }
            if (key === 'news-grid') {
                const skel = document.getElementById('news-grid-skeleton');
                if (skel) { skel.classList.add('sk-hidden'); skel.classList.remove('sk-visible'); }
            }
        }

        function hideAllSkeletons() {
            const allSkeletonKeys = Object.keys(SKELETON_MAP).concat([
                'sidebar-categories', 'products-grid', 'wishlist-grid', 'news-grid'
            ]);
            allSkeletonKeys.forEach(key => hideSkeleton(key));
            // Hide loading overlay
            const overlay = document.getElementById('sk-loading-overlay');
            if (overlay) overlay.classList.remove('active');
        }

        let currentData = {
            products: [],
            categories: [],
            news: [],
            hero: [],
            heroVideos: [],
            hero_secondary: []
        };

        let currentFilters = { cat: 'all', minPrice: null, maxPrice: null };
        let productsDisplayLimit = 12;
        const productsLoadMoreIncrement = 12;

        async function fetchAPI(endpoint) {
            try {
                const res = await fetch(endpoint);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return await res.json();
            } catch (e) {
                console.error('Fetch error:', e);
                return [];
            }
        }

        function getCategorySlug(c) {
            if (!c) return '';
            return c.toLowerCase().replace(/[^\w\s-]/g, '').replace(/[\s_]+/g, '-').replace(/^-+|-+$/g, '');
        }

        function getProductSlug(p) {
            return (p.slug || p.title || 'product').toLowerCase().replace(/[^\w\s-]/g, '').replace(/[\s_]+/g, '-').replace(
                /^-+|-+$/g, '');
        }

        function updateURL(path, title = '') {
            window.history.pushState({ path }, title || 'JAYENWARE', path);
            document.title = title ? title + ' | JAYENWARE' : 'JAYENWARE OFFICIAL STORE';
        }

        function navigate(pageId, params = null) {
            if (pageId !== 'home' && window.JAYENWARE?.heroVideo) {
                window.JAYENWARE.heroVideo.pause();
            }

            document.querySelectorAll('.page-section').forEach(s => {
                s.classList.remove('active-page', 'fade-in');
                s.style.display = 'none';
            });

            const target = document.getElementById(pageId);
            if (!target) return;

            target.style.display = 'block';

            let urlPath = '/' + pageId;
            if (params?.category) {
                urlPath = '/category/' + getCategorySlug(params.category);
                updateURL(urlPath, params.category);
            } else if (params?.search) {
                urlPath = '/search?q=' + encodeURIComponent(params.search);
                updateURL(urlPath, 'Search: ' + params.search);
            } else updateURL(urlPath);

            if (pageId === 'home') {
                if (currentData.products?.length > 0) renderHomepageSections();
                if (window.JAYENWARE?.heroVideo?.isInitialized) window.JAYENWARE.heroVideo.resume();
            }
            if (pageId === 'wishlist') renderWishlist();
            if (pageId === 'products') renderProducts(getFilteredProducts());

            requestAnimationFrame(() => {
                target.classList.add('active-page', 'fade-in');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        function renderCategories() {
            const container = document.getElementById('sidebar-categories');
            if (!container) return;

            let html =
                `<a href="/products" onclick="event.preventDefault();filterByCategory('all')" class="block w-full text-left py-2 px-3 rounded-lg text-[10px] sm:text-xs font-semibold hover:bg-gray-50 transition no-underline text-primary ${currentFilters.cat==='all'?'bg-primary text-white':''}">All</a>`;
            html += currentData.categories.map(c =>
                `<a href="/products?category=${getCategorySlug(c.name)}" onclick="event.preventDefault();filterByCategory('${c.name}')" class="block w-full text-left py-2 px-3 rounded-lg text-[10px] sm:text-xs font-semibold hover:bg-gray-50 transition no-underline text-primary ${currentFilters.cat===c.name?'bg-primary text-white':''}">${c.name}</a>`
            ).join('');
            container.innerHTML = html;
            hideSkeleton('sidebar-categories');
        }

        // ============================================================
        // WORLD-CLASS CATEGORY CARDS – DIRECT DB LINKS, NO HARDCODED PREFIXES
        // ============================================================
        function renderCategoryCards() {
            const grid = document.getElementById('categories-grid');
            const section = document.getElementById('categories-section');
            if (!grid || !section) return;

            if (!currentData.categories || currentData.categories.length === 0) {
                section.classList.add('sk-hidden');
                hideSkeleton('categories');
                return;
            }

            section.classList.remove('sk-hidden');
            section.classList.add('sk-visible');

            grid.innerHTML = currentData.categories.map((cat, index) => {
                const catName = cat.name || '';
                const imgSrc = cat.image_url || '';
                let ctaLink = cat.image_cta_link || '';
                
                if (!ctaLink) {
                    ctaLink = '/category/' + getCategorySlug(catName);
                }

                const isExternal = ctaLink.startsWith('http');
                const externalAttrs = isExternal ? ' target="_blank" rel="noopener"' : '';
                const ctaTitle = cat.image_cta_title || '';

                const ctaHTML = ctaTitle ? `
                <span class="cat-link">
                    ${ctaTitle}
                    <svg class="arrow-icon" width="12" height="12" viewBox="0 0 12 12" fill="none">
                        <path d="M1 6H11M11 6L6 1M11 6L6 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </span>` : '';

                let onClickAttr = '';
                if (!isExternal) {
                    if (ctaLink.startsWith('/category/')) {
                        const catSlug = ctaLink.replace('/category/', '');
                        onClickAttr = `onclick="event.preventDefault();navigateToCategory('${catSlug.replace(/'/g, "\\'")}')"`;
                    }
                }

                return `
                <a href="${ctaLink}" ${externalAttrs} ${onClickAttr} class="category-card">
                    ${imgSrc ? `<img src="${imgSrc}" alt="${catName}" class="cat-image" loading="${index < 2 ? 'eager' : 'lazy'}" onerror="this.style.opacity='0'">` : ''}
                    <div class="cat-content">
                        <h3 class="cat-title">${catName}</h3>
                        ${ctaHTML}
                    </div>
                </a>`;
            }).join('');

            hideSkeleton('categories');
        }

        function navigateToCategory(categorySlug) {
            if (!categorySlug) return;
            window.location.href = '/category/' + categorySlug;
        }

        function getFilteredProducts() {
            let list = currentData.products;
            if (currentFilters.cat !== 'all') list = list.filter(p => p.category === currentFilters.cat);
            if (currentFilters.minPrice) list = list.filter(p => p.price >= currentFilters.minPrice);
            if (currentFilters.maxPrice) list = list.filter(p => p.price <= currentFilters.maxPrice);
            return list;
        }

        function filterByCategory(cat) {
            currentFilters.cat = cat;
            productsDisplayLimit = 12;
            renderProducts(getFilteredProducts());
            updateURL(cat === 'all' ? '/products' : '/products?category=' + getCategorySlug(cat), cat === 'all' ? 'All Products' :
                cat);
        }

        function applyPriceFilter() {
            currentFilters.minPrice = parseFloat(document.getElementById('filter-min-price').value) || null;
            currentFilters.maxPrice = parseFloat(document.getElementById('filter-max-price').value) || null;
            productsDisplayLimit = 12;
            renderProducts(getFilteredProducts());
        }

        function loadMoreProducts() {
            productsDisplayLimit += productsLoadMoreIncrement;
            renderProducts(getFilteredProducts());
        }

        function toggleMobileFilters() {
            document.getElementById('mobile-filters')?.classList.toggle('hidden');
        }

        function applyMobileFilters() {
            applyPriceFilter();
            toggleMobileFilters();
        }

        function toggleSortMenu() {
            document.getElementById('sort-dropdown')?.classList.toggle('hidden');
        }

        function handleSorting(type, label) {
            const labelEl = document.getElementById('current-sort-label');
            const dropdown = document.getElementById('sort-dropdown');
            if (labelEl) labelEl.innerText = label;
            if (dropdown) dropdown.classList.add('hidden');

            let sorted = [...getFilteredProducts()];
            if (type === 'price-low') sorted.sort((a, b) => a.price - b.price);
            else if (type === 'price-high') sorted.sort((a, b) => b.price - a.price);
            else sorted.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            productsDisplayLimit = 12;
            renderProducts(sorted);
        }

        function productCard(p) {
            const isOut = p.stock <= 0;
            const slug = getProductSlug(p);

            return `
            <a href="/product/${slug}" class="carousel-card" style="width:100%;">
                <div class="card-img" style="aspect-ratio:3/4;">
                    <img src="${p.img}" alt="${p.title}" loading="lazy">
                    ${isOut ? '<div class="card-soldout-overlay"><span>Sold Out</span></div>' : ''}
                    ${p.is_new_arrival && !isOut ? '<span class="card-badge">New</span>' : ''}
                    ${p.is_on_sale && !isOut ? '<span class="card-badge badge-sale">Sale</span>' : ''}
                </div>
                <div class="card-body">
                    <span class="card-category">${p.category}</span>
                    <h3 class="card-title">${p.title}</h3>
                    <div>
                        <span class="card-price">৳ ${p.price}</span>
                        ${p.old_price ? `<span class="card-old-price">৳${p.old_price}</span>` : ''}
                    </div>
                </div>
            </a>`;
        }

        function renderProducts(list) {
            const grid = document.getElementById('products-grid');
            if (!grid) return;

            const total = list.length;
            const display = list.slice(0, productsDisplayLimit);

            const countEl = document.getElementById('product-count');
            if (countEl) countEl.innerText = `Showing ${Math.min(productsDisplayLimit, total)} of ${total} products`;

            let html = display.length ?
                display.map(p => productCard(p)).join('') :
                '<div class="col-span-full text-center py-20"><p class="text-accent text-lg">No products found</p></div>';

            if (total > productsDisplayLimit) {
                html += `
                <div class="col-span-full mt-8 text-center">
                    <button onclick="loadMoreProducts()" class="px-8 py-3 bg-primary text-white rounded-full font-semibold uppercase text-xs tracking-wider hover:bg-blue transition">
                        Load More (${total - productsDisplayLimit} remaining)
                    </button>
                </div>`;
            }

            grid.innerHTML = html;
            hideSkeleton('products-grid');
        }

        function renderWishlist() {
            const grid = document.getElementById('wishlist-grid');
            const empty = document.getElementById('empty-wishlist');
            if (!grid) return;

            const list = (window.wishlist || []).map(id => currentData.products.find(p => p.id == id)).filter(Boolean);

            if (!list.length) {
                grid.innerHTML = '';
                if (empty) empty.classList.remove('hidden');
                hideSkeleton('wishlist-grid');
                return;
            }

            if (empty) empty.classList.add('hidden');
            grid.innerHTML = list.map(p => productCard(p)).join('');
            hideSkeleton('wishlist-grid');
        }

        function renderNews(list) {
            const grid = document.getElementById('news-grid');
            if (!grid) return;

            if (!list || !list.length) {
                grid.innerHTML =
                    '<div class="col-span-full text-center py-20"><p class="text-accent text-lg">No articles yet</p></div>';
                hideSkeleton('news-grid');
                return;
            }

            grid.innerHTML = list.map(n => `
            <article class="bg-white rounded-2xl overflow-hidden border border-gray-100 hover:shadow-lg transition">
                <img src="${n.img}" alt="${n.title}" class="w-full h-48 object-cover" loading="lazy">
                <div class="p-4 sm:p-6">
                    <time class="text-[10px] font-semibold uppercase text-accent">${new Date(n.date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</time>
                    <h3 class="font-bold text-lg mt-2 mb-3 text-primary">${n.title}</h3>
                    <p class="text-xs text-accent line-clamp-3">${n.excerpt}</p>
                    <a href="${n.link||'#'}" class="inline-flex items-center gap-2 mt-4 text-xs font-semibold text-blue no-underline hover:gap-3 transition">
                        Read More <i class="fa-solid fa-arrow-right text-[10px]"></i>
                    </a>
                </div>
            </article>`).join('');
            hideSkeleton('news-grid');
        }

        // -------------------------------------------------------
        // SMOOTH CAROUSEL SLIDING
        // -------------------------------------------------------
        function slideCarousel(carouselId, direction) {
            const carousel = document.getElementById(carouselId);
            if (!carousel) return;

            const cardWidth = carousel.querySelector('.carousel-card')?.offsetWidth || 260;
            const gap = parseInt(getComputedStyle(carousel).gap) || 16;
            const scrollAmount = (cardWidth + gap) * 2;

            carousel.scrollBy({
                left: direction === 'next' ? scrollAmount : -scrollAmount,
                behavior: 'smooth'
            });
        }

        function updateScrollProgress(carouselId) {
            const carousel = document.getElementById(carouselId);
            const progressBar = document.getElementById(carouselId.replace('carousel', 'progress-bar'));
            if (!carousel || !progressBar) return;

            const scrollLeft = carousel.scrollLeft;
            const scrollWidth = carousel.scrollWidth - carousel.clientWidth;
            const progress = scrollWidth > 0 ? (scrollLeft / scrollWidth) * 100 : 0;
            progressBar.style.width = `${Math.min(progress, 100)}%`;
        }

        function renderCarouselProducts(carouselId, products) {
            const carousel = document.getElementById(carouselId);
            if (!carousel) return;

            if (!products || !products.length) {
                carousel.innerHTML =
                    '<div class="flex items-center justify-center w-full py-16"><p class="text-sm text-accent">No products available</p></div>';
                return;
            }

            carousel.innerHTML = products.map(p => {
                const isOut = p.stock <= 0;
                const slug = getProductSlug(p);
                let badge = '';
                if (!isOut) {
                    if (p.is_new_arrival) badge = '<span class="card-badge">New</span>';
                    else if (p.is_on_sale) badge = '<span class="card-badge badge-sale">Sale</span>';
                    else if (p.is_limited_edition) badge = '<span class="card-badge">Limited</span>';
                }

                return `
                <a href="/product/${slug}" class="carousel-card" draggable="false">
                    <div class="card-img">
                        <img src="${p.img}" alt="${p.title}" loading="lazy" draggable="false">
                        ${badge}
                        ${isOut ? '<div class="card-soldout-overlay"><span>Sold Out</span></div>' : ''}
                        <button onclick="event.preventDefault();event.stopPropagation();if(typeof addToCart==='function')addToCart(${p.id},null)" class="card-add-btn" ${isOut ? 'disabled' : ''} aria-label="Add to cart">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                    <div class="card-body">
                        <span class="card-category">${p.category}</span>
                        <h3 class="card-title">${p.title}</h3>
                        <div>
                            <span class="card-price">৳${p.price}</span>
                            ${p.old_price ? `<span class="card-old-price">৳${p.old_price}</span>` : ''}
                        </div>
                    </div>
                </a>`;
            }).join('');

            carousel.addEventListener('scroll', () => updateScrollProgress(carouselId), { passive: true });
            updateScrollProgress(carouselId);
        }

        function renderHomepageSections() {
            if (!currentData.products || currentData.products.length === 0) return;

            renderCategoryCards();

            const sections = [
                { id: 'new-arrivals-section', carousel: 'new-arrivals-carousel',
                products: currentData.products.filter(p => p.is_new_arrival === true), skeletonKey: 'new-arrivals' },
                { id: 'hot-products-section', carousel: 'hot-products-carousel', products: currentData.products.filter(
                        p => p.is_hot === true), skeletonKey: 'hot-products' },
                { id: 'featured-products-section', carousel: 'featured-products-carousel',
                    products: currentData.products.filter(p => p.is_featured === true), skeletonKey: 'featured-products' },
                { id: 'best-selling-section', carousel: 'best-selling-carousel', products: currentData.products.filter(
                        p => p.is_best === true), skeletonKey: 'best-selling' },
                { id: 'on-sale-section', carousel: 'on-sale-carousel', products: currentData.products.filter(p =>
                        p.is_on_sale === true), skeletonKey: 'on-sale' },
                { id: 'limited-edition-section', carousel: 'limited-edition-carousel',
                    products: currentData.products.filter(p => p.is_limited_edition === true), skeletonKey: 'limited-edition' }
            ];

            sections.forEach((sec) => {
                const el = document.getElementById(sec.id);
                if (!el) return;
                if (sec.products && sec.products.length > 0) {
                    el.classList.remove('sk-hidden');
                    el.classList.add('sk-visible');
                    renderCarouselProducts(sec.carousel, sec.products);
                    hideSkeleton(sec.skeletonKey);
                } else {
                    el.classList.add('sk-hidden');
                    hideSkeleton(sec.skeletonKey);
                }
            });
        }

        // -------------------------------------------------------
        // MOMENTUM-BASED DRAG (no snapping, buttery smooth)
        // -------------------------------------------------------
        function initCarouselTouchSupport() {
            document.querySelectorAll('.carousel-track').forEach(carousel => {
                let isDown = false;
                let startX, scrollLeft, startTime;
                let velocity = 0;
                let momentumID;
                let lastMoveX = 0;
                let lastMoveTime = 0;

                const endMomentum = () => {
                    if (momentumID) {
                        cancelAnimationFrame(momentumID);
                        momentumID = null;
                    }
                };

                const beginMomentum = () => {
                    endMomentum();
                    if (Math.abs(velocity) > 0.5) {
                        momentumID = requestAnimationFrame(() => {
                            carousel.scrollLeft -= velocity * 16;
                            velocity *= 0.95;
                            if (Math.abs(velocity) > 0.1) {
                                beginMomentum();
                            } else {
                                velocity = 0;
                                updateScrollProgress(carousel.id);
                            }
                        });
                    }
                };

                carousel.addEventListener('touchstart', (e) => {
                    endMomentum();
                    isDown = true;
                    startX = e.touches[0].pageX - carousel.offsetLeft;
                    scrollLeft = carousel.scrollLeft;
                    startTime = Date.now();
                    velocity = 0;
                    carousel.style.scrollBehavior = 'auto';
                }, { passive: true });

                carousel.addEventListener('touchmove', (e) => {
                    if (!isDown) return;
                    const x = e.touches[0].pageX - carousel.offsetLeft;
                    const walk = (x - startX) * 1.2;
                    const now = Date.now();
                    const dt = now - startTime;
                    if (dt > 0 && lastMoveTime > 0) {
                        const dx = x - lastMoveX;
                        const dt2 = now - lastMoveTime;
                        velocity = dt2 > 0 ? (dx / dt2) * 16 : velocity;
                    }
                    carousel.scrollLeft = scrollLeft - walk;
                    lastMoveX = x;
                    lastMoveTime = now;
                    startTime = now;
                }, { passive: true });

                carousel.addEventListener('touchend', () => {
                    isDown = false;
                    carousel.style.scrollBehavior = 'smooth';
                    lastMoveX = 0;
                    lastMoveTime = 0;
                    beginMomentum();
                });

                carousel.addEventListener('mousedown', (e) => {
                    endMomentum();
                    isDown = true;
                    startX = e.pageX - carousel.offsetLeft;
                    scrollLeft = carousel.scrollLeft;
                    startTime = Date.now();
                    velocity = 0;
                    carousel.style.scrollBehavior = 'auto';
                });

                window.addEventListener('mousemove', (e) => {
                    if (!isDown) return;
                    const x = e.pageX - carousel.offsetLeft;
                    const walk = (x - startX) * 1.2;
                    const now = Date.now();
                    const dt = now - startTime;
                    if (dt > 0 && lastMoveTime > 0) {
                        const dx = x - lastMoveX;
                        const dt2 = now - lastMoveTime;
                        velocity = dt2 > 0 ? (dx / dt2) * 16 : velocity;
                    }
                    carousel.scrollLeft = scrollLeft - walk;
                    lastMoveX = x;
                    lastMoveTime = now;
                    startTime = now;
                });

                window.addEventListener('mouseup', () => {
                    if (isDown) {
                        isDown = false;
                        carousel.style.scrollBehavior = 'smooth';
                        lastMoveX = 0;
                        lastMoveTime = 0;
                        beginMomentum();
                    }
                });

                carousel.addEventListener('scroll', () => {
                    if (carousel.id) updateScrollProgress(carousel.id);
                }, { passive: true });
            });
        }

        function handleCookieAccept() {
            localStorage.setItem('jayenware_consent', 'accepted');
            document.getElementById('cookieConsent')?.classList.remove('show');
        }

        function handleCookieDecline() {
            localStorage.setItem('jayenware_consent', 'declined');
            document.getElementById('cookieConsent')?.classList.remove('show');
        }

        document.addEventListener('click', e => {
            if (!e.target.closest('#sort-container')) {
                document.getElementById('sort-dropdown')?.classList.add('hidden');
            }
        });

        window.addEventListener('popstate', () => { handleInitialRoute(); });

        async function loadData() {
            try {
                const [hero, cats, prods, newsData, heroVideosData, heroSecondaryData] = await Promise.all([
                    fetchAPI('/api/hero'),
                    fetchAPI('/api/categories'),
                    fetchAPI('/api/products'),
                    fetchAPI('/api/news'),
                    fetchAPI('/api/hero-videos'),
                    fetchAPI('/api/hero-secondary')
                ]);

                if (hero?.length) currentData.hero = hero;
                if (cats?.length) currentData.categories = cats;
                if (prods?.length) currentData.products = prods;
                if (newsData) currentData.news = newsData;
                if (heroVideosData?.length) currentData.heroVideos = heroVideosData;
                if (heroSecondaryData?.length) currentData.hero_secondary = heroSecondaryData;

                // Hide hero skeleton
                hideSkeleton('hero');

                window.dispatchEvent(new CustomEvent('jayenware:dataLoaded', {
                    detail: { hero: currentData.hero, heroVideos: currentData.heroVideos,
                        hero_secondary: currentData.hero_secondary }
                }));

                renderCategories();
                renderProducts(currentData.products);
                renderNews(currentData.news);
                renderHomepageSections();
                handleInitialRoute();

                // Hide header and footer skeletons
                hideSkeleton('header');
                hideSkeleton('footer');

                // Hide loading overlay with delay for smooth transition
                setTimeout(() => {
                    const overlay = document.getElementById('sk-loading-overlay');
                    if (overlay) overlay.classList.remove('active');
                }, 300);

                console.log('[App] Data loaded, skeletons hidden');
            } catch (err) {
                console.error('[App] Error:', err);
                hideAllSkeletons();
            }
        }

        function handleInitialRoute() {
            const path = window.location.pathname;
            const sp = new URLSearchParams(window.location.search);
            
            if (path.startsWith('/category/')) {
                window.location.href = path;
                return;
            }
            
            if (path.startsWith('/product/')) return;
            
            if (path === '/search' && sp.get('q')) {
                navigate('products');
                renderProducts(currentData.products.filter(p => p.title.toLowerCase().includes(sp.get('q')
                    .toLowerCase())));
                return;
            }
            navigate({ '/': 'home', '/products': 'products', '/wishlist': 'wishlist', '/journal': 'news' }[path] || 'home');
        }

        window.onload = async () => {
            const consent = localStorage.getItem('jayenware_consent');
            if (!consent) setTimeout(() => document.getElementById('cookieConsent')?.classList.add('show'), 2000);
            await loadData();
            setTimeout(initCarouselTouchSupport, 300);
        };
    </script>
</body>
</html>
