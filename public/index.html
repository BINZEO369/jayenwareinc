                  <button onclick="handleSorting('newest','Newest')" class="block w-full text-left px-4 py-3 text-xs font-semibold hover:bg-gray-50 transition">Newest</button>
                  <button onclick="handleSorting('price-low','Price: Low to High')" class="block w-full text-left px-4 py-3 text-xs font-semibold hover:bg-gray-50 transition">Price: Low to High</button>
                  <button onclick="handleSorting('price-high','Price: High to Low')" class="block w-full text-left px-4 py-3 text-xs font-semibold hover:bg-gray-50 transition">Price: High to Low</button>
                </div>
              </div>
            </div>
            <div id="products-grid" class="grid grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-4 lg:gap-6"></div>
          </div>
        </div>
      </div>
    </section>

    <section id="product-details" class="page-section"></section>

    <section id="wishlist" class="page-section py-6 sm:py-8 lg:py-12">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-8 sm:mb-12"><h2 class="text-2xl sm:text-4xl lg:text-5xl font-bold font-serif text-primary">Your Wishlist</h2></div>
        <div id="wishlist-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4 lg:gap-6"></div>
        <div id="empty-wishlist" class="hidden text-center py-20">
          <i class="fa-regular fa-heart text-5xl sm:text-7xl text-gray-200 mb-6 block"></i>
          <p class="text-lg sm:text-xl text-accent font-medium">Your wishlist is empty</p>
          <button onclick="navigate('products')" class="mt-6 px-8 py-3 bg-primary text-white rounded-full font-semibold uppercase text-xs tracking-wider hover:bg-blue transition inline-block">Explore Products</button>
        </div>
      </div>
    </section>

    <section id="news" class="page-section py-6 sm:py-8 lg:py-12">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-8 sm:mb-12"><h2 class="text-2xl sm:text-4xl lg:text-5xl font-bold font-serif text-primary">The Journal</h2></div>
        <div id="news-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6 lg:gap-8"></div>
      </div>
    </section>
  </main>

  <div id="footer-container"></div>

  <div id="cookieConsent" class="cookie-consent-overlay">
    <div class="cookie-banner">
      <div class="cookie-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg></div>
      <div class="cookie-text"><h4>We Value Your Privacy</h4><p>We use cookies. <a href="#" onclick="event.preventDefault();openPolicy('privacy')">Privacy Policy</a></p></div>
      <div class="cookie-buttons"><button class="cookie-btn decline" onclick="handleCookieDecline()">Decline</button><button class="cookie-btn accept" onclick="handleCookieAccept()">Accept</button></div>
    </div>
  </div>

  <script>
    (function() {
      let currentData = { products: [], categories: [], news: [], hero: [], heroVideos: [], hero_secondary: [] };
      let currentFilters = { cat: 'all', minPrice: null, maxPrice: null };
      let productsDisplayLimit = 12;
      const productsLoadMoreIncrement = 12;

      async function fetchAPI(endpoint) {
        try { const res = await fetch(endpoint); if (!res.ok) throw new Error(`HTTP ${res.status}`); return await res.json(); }
        catch (e) { console.error('Fetch error:', e); return []; }
      }

      function getCategorySlug(c) { return c ? c.toLowerCase().replace(/[^\w\s-]/g, '').replace(/[\s_]+/g, '-').replace(/^-+|-+$/g, '') : ''; }
      function getProductSlug(p) { return (p.slug || p.title || 'product').toLowerCase().replace(/[^\w\s-]/g, '').replace(/[\s_]+/g, '-').replace(/^-+|-+$/g, ''); }

      function updateURL(path, title = '') {
        window.history.pushState({ path }, title || 'JAYENWARE', path);
        document.title = title ? title + ' | JAYENWARE' : 'JAYENWARE OFFICIAL STORE';
      }

      function navigate(pageId, params = null) {
        if (pageId !== 'home' && window.JAYENWARE?.heroVideo) { window.JAYENWARE.heroVideo.pause(); }
        document.querySelectorAll('.page-section').forEach(s => { s.classList.remove('active-page', 'fade-in'); s.style.display = 'none'; });
        const target = document.getElementById(pageId);
        if (!target) return;
        target.style.display = 'block';
        let urlPath = '/' + pageId;
        if (params?.category) { urlPath = '/category/' + getCategorySlug(params.category); updateURL(urlPath, params.category); }
        else if (params?.search) { urlPath = '/search?q=' + encodeURIComponent(params.search); updateURL(urlPath, 'Search: ' + params.search); }
        else updateURL(urlPath);
        if (pageId === 'home') { if (currentData.products?.length > 0) renderHomepageSections(); if (window.JAYENWARE?.heroVideo?.isInitialized) window.JAYENWARE.heroVideo.resume(); }
        if (pageId === 'wishlist') renderWishlist();
        if (pageId === 'products') renderProducts(getFilteredProducts());
        requestAnimationFrame(() => { target.classList.add('active-page', 'fade-in'); window.scrollTo({ top: 0, behavior: 'instant' }); });
      }

      function renderCategories() {
        const container = document.getElementById('sidebar-categories');
        if (!container) return;
        let html = `<a href="/products" onclick="event.preventDefault();filterByCategory('all')" class="block w-full text-left py-2 px-3 rounded-lg text-[10px] sm:text-xs font-semibold hover:bg-gray-50 transition no-underline text-primary ${currentFilters.cat==='all'?'bg-primary text-white':''}">All</a>`;
        html += currentData.categories.map(c => `<a href="/products?category=${getCategorySlug(c.name)}" onclick="event.preventDefault();filterByCategory('${c.name}')" class="block w-full text-left py-2 px-3 rounded-lg text-[10px] sm:text-xs font-semibold hover:bg-gray-50 transition no-underline text-primary ${currentFilters.cat===c.name?'bg-primary text-white':''}">${c.name}</a>`).join('');
        container.innerHTML = html;
      }

      function getFilteredProducts() {
        let list = currentData.products;
        if (currentFilters.cat !== 'all') list = list.filter(p => p.category === currentFilters.cat);
        if (currentFilters.minPrice) list = list.filter(p => p.price >= currentFilters.minPrice);
        if (currentFilters.maxPrice) list = list.filter(p => p.price <= currentFilters.maxPrice);
        return list;
      }

      window.filterByCategory = function(cat) {
        currentFilters.cat = cat; productsDisplayLimit = 12;
        renderProducts(getFilteredProducts());
        updateURL(cat === 'all' ? '/products' : '/products?category=' + getCategorySlug(cat), cat === 'all' ? 'All Products' : cat);
      };

      window.applyPriceFilter = function() {
        currentFilters.minPrice = parseFloat(document.getElementById('filter-min-price').value) || null;
        currentFilters.maxPrice = parseFloat(document.getElementById('filter-max-price').value) || null;
        productsDisplayLimit = 12; renderProducts(getFilteredProducts());
      };

      window.loadMoreProducts = function() { productsDisplayLimit += productsLoadMoreIncrement; renderProducts(getFilteredProducts()); };
      window.toggleMobileFilters = function() { document.getElementById('mobile-filters')?.classList.toggle('hidden'); };
      window.applyMobileFilters = function() { window.applyPriceFilter(); window.toggleMobileFilters(); };
      window.toggleSortMenu = function() { document.getElementById('sort-dropdown')?.classList.toggle('hidden'); };

      window.handleSorting = function(type, label) {
        document.getElementById('current-sort-label').innerText = label;
        document.getElementById('sort-dropdown').classList.add('hidden');
        let sorted = [...getFilteredProducts()];
        if (type === 'price-low') sorted.sort((a, b) => a.price - b.price);
        else if (type === 'price-high') sorted.sort((a, b) => b.price - a.price);
        else sorted.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
        productsDisplayLimit = 12; renderProducts(sorted);
      };

      function handleImageLoad(imgElement) { imgElement.classList.add('loaded'); }

      function productCard(p) {
        const isOut = p.stock <= 0; const slug = getProductSlug(p);
        return `<a href="/product/${slug}" class="carousel-card" style="width:100%;"><div class="card-img" style="aspect-ratio:3/4;"><img src="${p.img}" alt="${p.title}" loading="lazy" onload="handleImageLoad(this)" onerror="this.style.display='none'">${isOut ? '<div class="card-soldout-overlay"><span>Sold Out</span></div>' : ''}${p.is_new_arrival && !isOut ? '<span class="card-badge">New</span>' : ''}${p.is_on_sale && !isOut ? '<span class="card-badge badge-sale">Sale</span>' : ''}</div><div class="card-body"><span class="card-category">${p.category}</span><h3 class="card-title">${p.title}</h3><div><span class="card-price">৳ ${p.price}</span>${p.old_price ? `<span class="card-old-price">৳${p.old_price}</span>` : ''}</div></div></a>`;
      }

      function renderProducts(list) {
        const grid = document.getElementById('products-grid'); if (!grid) return;
        const total = list.length; const display = list.slice(0, productsDisplayLimit);
        document.getElementById('product-count').innerText = `Showing ${Math.min(productsDisplayLimit, total)} of ${total} products`;
        let html = display.length ? display.map(p => productCard(p)).join('') : '<div class="col-span-full text-center py-20"><p class="text-accent text-lg">No products found</p></div>';
        if (total > productsDisplayLimit) { html += `<div class="col-span-full mt-8 text-center"><button onclick="loadMoreProducts()" class="px-8 py-3 bg-primary text-white rounded-full font-semibold uppercase text-xs tracking-wider hover:bg-blue transition">Load More (${total - productsDisplayLimit} remaining)</button></div>`; }
        grid.innerHTML = html; initLazyImages();
      }

      function renderWishlist() {
        const grid = document.getElementById('wishlist-grid'); const empty = document.getElementById('empty-wishlist');
        if (!grid) return;
        const list = (window.wishlist || []).map(id => currentData.products.find(p => p.id == id)).filter(Boolean);
        if (!list.length) { grid.innerHTML = ''; if (empty) empty.classList.remove('hidden'); return; }
        if (empty) empty.classList.add('hidden');
        grid.innerHTML = list.map(p => productCard(p)).join('');
      }

      function renderNews(list) {
        const grid = document.getElementById('news-grid'); if (!grid) return;
        if (!list || !list.length) { grid.innerHTML = '<div class="col-span-full text-center py-20"><p class="text-accent text-lg">No articles yet</p></div>'; return; }
        grid.innerHTML = list.map(n => `<article class="bg-white rounded-2xl overflow-hidden border border-gray-100 hover:shadow-lg transition"><img src="${n.img}" alt="${n.title}" class="w-full h-48 object-cover" loading="lazy" onload="handleImageLoad(this)" onerror="this.style.display='none'"><div class="p-4 sm:p-6"><time class="text-[10px] font-semibold uppercase text-accent">${new Date(n.date).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</time><h3 class="font-bold text-lg mt-2 mb-3 text-primary">${n.title}</h3><p class="text-xs text-accent line-clamp-3">${n.excerpt}</p><a href="${n.link||'#'}" class="inline-flex items-center gap-2 mt-4 text-xs font-semibold text-blue no-underline hover:gap-3 transition">Read More <i class="fa-solid fa-arrow-right text-[10px]"></i></a></div></article>`).join('');
      }

      window.slideCarousel = function(carouselId, direction) {
        const carousel = document.getElementById(carouselId); if (!carousel) return;
        const cardWidth = carousel.querySelector('.carousel-card')?.offsetWidth || 260;
        const gap = parseInt(getComputedStyle(carousel).gap) || 16;
        carousel.scrollBy({ left: direction === 'next' ? (cardWidth + gap) * 2 : -(cardWidth + gap) * 2, behavior: 'smooth' });
      };

      function updateScrollProgress(carouselId) {
        const carousel = document.getElementById(carouselId);
        const progressBar = document.getElementById(carouselId.replace('carousel', 'progress-bar'));
        if (!carousel || !progressBar) return;
        const scrollLeft = carousel.scrollLeft;
        const scrollWidth = carousel.scrollWidth - carousel.clientWidth;
        progressBar.style.width = scrollWidth > 0 ? `${Math.min((scrollLeft / scrollWidth) * 100, 100)}%` : '0%';
      }

      function renderHomepageSections() {
        if (!currentData.products || currentData.products.length === 0) return;
        if (typeof window.renderNewArrival === 'function') { window.renderNewArrival(currentData.products.filter(p => p.is_new_arrival === true)); }
        if (typeof window.renderTrendingNow === 'function') { window.renderTrendingNow(currentData.products.filter(p => p.is_hot === true)); }
        if (typeof window.renderFeaturedProducts === 'function') { window.renderFeaturedProducts(currentData.products.filter(p => p.is_featured === true)); }
        if (typeof window.renderBestSeller === 'function') { window.renderBestSeller(currentData.products.filter(p => p.is_best === true)); }
        if (typeof window.renderOnSale === 'function') { window.renderOnSale(currentData.products.filter(p => p.is_on_sale === true)); }
        if (typeof window.renderLimitedEdition === 'function') { window.renderLimitedEdition(currentData.products.filter(p => p.is_limited_edition === true)); }
      }

      function initLazyImages() {
        if ('IntersectionObserver' in window) {
          const imageObserver = new IntersectionObserver((entries) => { entries.forEach(entry => { if (entry.isIntersecting) { const img = entry.target; if (img.dataset.src) { img.src = img.dataset.src; img.removeAttribute('data-src'); } img.onload = () => handleImageLoad(img); img.onerror = () => img.style.display = 'none'; imageObserver.unobserve(img); } }); }, { rootMargin: '200px 0px', threshold: 0.01 });
          document.querySelectorAll('img[loading="lazy"]').forEach(img => { if (!img.dataset.src && img.src) { imageObserver.observe(img); } });
        }
      }

      function initCarouselTouchSupport() {
        document.querySelectorAll('.carousel-track').forEach(carousel => {
          let isDown = false, startX, scrollLeft, velocity = 0, momentumID, lastMoveX = 0, lastMoveTime = 0;
          const endMomentum = () => { if (momentumID) { cancelAnimationFrame(momentumID); momentumID = null; } };
          const beginMomentum = () => { endMomentum(); if (Math.abs(velocity) > 0.5) { const deceleration = 0.95; momentumID = requestAnimationFrame(function animate() { carousel.scrollLeft -= velocity * 16; velocity *= deceleration; if (Math.abs(velocity) > 0.1) { momentumID = requestAnimationFrame(animate); } else { velocity = 0; updateScrollProgress(carousel.id); } }); } };
          carousel.addEventListener('touchstart', (e) => { endMomentum(); isDown = true; startX = e.touches[0].pageX - carousel.offsetLeft; scrollLeft = carousel.scrollLeft; velocity = 0; lastMoveX = startX; lastMoveTime = Date.now(); }, { passive: true });
          carousel.addEventListener('touchmove', (e) => { if (!isDown) return; e.preventDefault(); const x = e.touches[0].pageX - carousel.offsetLeft; carousel.scrollLeft = scrollLeft - (x - startX); const now = Date.now(); const dt = now - lastMoveTime; if (dt > 0) velocity = (x - lastMoveX) / dt * 16; lastMoveX = x; lastMoveTime = now; }, { passive: false });
          carousel.addEventListener('touchend', () => { isDown = false; beginMomentum(); });
          carousel.addEventListener('mousedown', (e) => { endMomentum(); isDown = true; startX = e.pageX - carousel.offsetLeft; scrollLeft = carousel.scrollLeft; velocity = 0; lastMoveX = startX; lastMoveTime = Date.now(); carousel.style.cursor = 'grabbing'; });
          window.addEventListener('mousemove', (e) => { if (!isDown) return; e.preventDefault(); const x = e.pageX - carousel.offsetLeft; carousel.scrollLeft = scrollLeft - (x - startX); const now = Date.now(); const dt = now - lastMoveTime; if (dt > 0) velocity = (x - lastMoveX) / dt * 16; lastMoveX = x; lastMoveTime = now; });
          window.addEventListener('mouseup', () => { if (isDown) { isDown = false; carousel.style.cursor = 'grab'; beginMomentum(); } });
          carousel.addEventListener('scroll', () => { if (carousel.id) updateScrollProgress(carousel.id); }, { passive: true });
        });
      }

      window.handleCookieAccept = function() { localStorage.setItem('jayenware_consent', 'accepted'); document.getElementById('cookieConsent')?.classList.remove('show'); };
      window.handleCookieDecline = function() { localStorage.setItem('jayenware_consent', 'declined'); document.getElementById('cookieConsent')?.classList.remove('show'); };

      document.addEventListener('click', e => { if (!e.target.closest('#sort-container')) document.getElementById('sort-dropdown')?.classList.add('hidden'); });
      window.addEventListener('popstate', () => { handleInitialRoute(); });

      async function loadData() {
        try {
          const [hero, cats, prods, newsData, heroVideosData, heroSecondaryData] = await Promise.all([
            fetchAPI('/api/hero'), fetchAPI('/api/categories'), fetchAPI('/api/products'),
            fetchAPI('/api/news'), fetchAPI('/api/hero-videos'), fetchAPI('/api/hero-secondary')
          ]);
          if (hero?.length) currentData.hero = hero;
          if (cats?.length) currentData.categories = cats;
          if (prods?.length) currentData.products = prods;
          if (newsData) currentData.news = newsData;
          if (heroVideosData?.length) currentData.heroVideos = heroVideosData;
          if (heroSecondaryData?.length) currentData.hero_secondary = heroSecondaryData;

          if (typeof window.renderCategoryShow === 'function' && currentData.categories) { window.renderCategoryShow(currentData.categories); }
          window.dispatchEvent(new CustomEvent('jayenware:dataLoaded', { detail: { hero: currentData.hero, heroVideos: currentData.heroVideos, hero_secondary: currentData.hero_secondary } }));
          renderCategories(); renderProducts(currentData.products); renderNews(currentData.news);
          renderHomepageSections(); handleInitialRoute();
          setTimeout(initLazyImages, 100);
        } catch (err) { console.error('[App] Error:', err); }
      }

      function handleInitialRoute() {
        const path = window.location.pathname;
        if (path.startsWith('/category/') || path.startsWith('/product/')) return;
        const sp = new URLSearchParams(window.location.search);
        if (path === '/search' && sp.get('q')) { navigate('products'); renderProducts(currentData.products.filter(p => p.title.toLowerCase().includes(sp.get('q').toLowerCase()))); return; }
        navigate({ '/': 'home', '/products': 'products', '/wishlist': 'wishlist', '/journal': 'news' }[path] || 'home');
      }

      window.onload = async () => {
        const consent = localStorage.getItem('jayenware_consent');
        if (!consent) setTimeout(() => document.getElementById('cookieConsent')?.classList.add('show'), 2000);
        await loadData();
        setTimeout(() => { initCarouselTouchSupport(); initLazyImages(); }, 300);
      };

      let resizeTimeout;
      window.addEventListener('resize', () => { clearTimeout(resizeTimeout); resizeTimeout = setTimeout(() => { document.querySelectorAll('.carousel-track').forEach(carousel => { if (carousel.id) updateScrollProgress(carousel.id); }); }, 250); });
    })();
  </script>
